rst."}},{"t":"q","q":{"ar":"يختصّ NIOSH أساساً بـ:","en":"NIOSH is primarily responsible for:"},"opts":[{"ar":"إصدار الغرامات","en":"Issuing fines"},{"ar":"البحث والتوصيات في السلامة","en":"Research and safety recommendations"},{"ar":"إنفاذ القانون","en":"Law enforcement"}],"a":1,"ex":{"ar":"البحث، بينما OSHA تُنفّذ.","en":"Research, while OSHA enforces."}},{"t":"q","q":{"ar":"«الهندسة البشرية» (Ergonomics) تُعنى بـ:","en":"Ergonomics is concerned with:"},"opts":[{"ar":"تصميم الشعارات","en":"Logo design"},{"ar":"الرواتب","en":"Salaries"},{"ar":"تكييف العمل وأدواته مع قدرات الجسم لتقليل الإجهاد","en":"Fitting work and tools to the body to reduce strain"}],"a":2,"ex":{"ar":"تقلّل إصابات الإجهاد المتكرّر.","en":"It reduces repetitive-strain injuries."}},{"t":"q","q":{"ar":"تحمي المادة 11(c) من OSHA:","en":"OSHA Section 11(c) protects:"},"opts":[{"ar":"الموظف من الانتقام للإبلاغ عن مخاطر السلامة","en":"Employees from retaliation for reporting safety hazards"},{"ar":"أسرار الشركة","en":"Company secrets"},{"ar":"الأرباح","en":"Profits"}],"a":0,"ex":{"ar":"حماية المُبلِّغين عن السلامة.","en":"Safety whistleblower protection."}},{"t":"q","q":{"ar":"«خطة العمل في الطوارئ» (EAP) تحدّد:","en":"An Emergency Action Plan specifies:"},"opts":[{"ar":"الأجور","en":"Wages"},{"ar":"إجراءات الإخلاء والاستجابة للطوارئ","en":"Evacuation and emergency response procedures"},{"ar":"التوظيف","en":"Hiring"}],"a":1,"ex":{"ar":"استعداد منظّم للطوارئ.","en":"Organized emergency readiness."}},{"t":"q","q":{"ar":"«الحادث الوشيك» (Near-Miss):","en":"A near-miss is:"},"opts":[{"ar":"إصابة خطيرة","en":"A serious injury"},{"ar":"غرامة","en":"A fine"},{"ar":"واقعة كادت تسبّب ضرراً وتُبلَّغ للوقاية","en":"An event that nearly caused harm, reported to prevent recurrence"}],"a":2,"ex":{"ar":"فرصة للتعلّم والوقاية.","en":"A chance to learn and prevent."}},{"t":"q","q":{"ar":"«ثقافة السلامة» القوية تعني:","en":"A strong safety culture means:"},"opts":[{"ar":"التزام جماعي بالسلامة على كل المستويات","en":"Shared commitment to safety at all levels"},{"ar":"اللوائح فقط","en":"Rules only"},{"ar":"تجاهل المخاطر","en":"Ignoring hazards"}],"a":0,"ex":{"ar":"السلامة قيمة مشتركة.","en":"Safety as a shared value."}},{"t":"q","q":{"ar":"«الإحلال» (Substitution) في ضبط المخاطر يعني:","en":"Substitution in hazard control means:"},"opts":[{"ar":"إزالة الخطر تماماً","en":"Removing the hazard entirely"},{"ar":"استبدال الخطر بآخر أقل خطورة","en":"Replacing a hazard with a less dangerous one"},{"ar":"ارتداء قفازات","en":"Wearing gloves"}],"a":1,"ex":{"ar":"استبدال بأقل خطورة.","en":"Swap for something safer."}},{"t":"q","q":{"ar":"«استمرارية الأعمال» (Business Continuity):","en":"Business continuity is:"},"opts":[{"ar":"التوظيف","en":"Recruiting"},{"ar":"التسويق","en":"Marketing"},{"ar":"خطط لاستمرار العمليات الحرجة أثناء الأزمات","en":"Plans to keep critical operations running during crises"}],"a":2,"ex":{"ar":"الصمود التشغيلي وقت الأزمات.","en":"Operational resilience in crises."}},{"t":"q","q":{"ar":"تُعدّ الإصابة «قابلة للتسجيل» في OSHA إذا:","en":"An injury is OSHA-recordable if it:"},"opts":[{"ar":"تطلّبت علاجاً يتجاوز الإسعافات الأولية أو سبّبت فقدان عمل/وعي","en":"Needs care beyond first aid or causes lost time/consciousness"},{"ar":"كانت خدشاً بسيطاً","en":"Is a minor scratch"},{"ar":"حدثت في المنزل","en":"Happened at home"}],"a":0,"ex":{"ar":"معايير محدّدة للتسجيل.","en":"Specific recordability criteria."}},{"t":"q","q":{"ar":"الوقاية من «العنف في مكان العمل» تشمل:","en":"Workplace-violence prevention includes:"},"opts":[{"ar":"تجاهل التهديدات","en":"Ignoring threats"},{"ar":"تقييم المخاطر وسياسة واضحة وتدريباً وإجراءات إبلاغ","en":"Risk assessment, a clear policy, training, and reporting"},{"ar":"السرّية التامة","en":"Total secrecy"}],"a":1,"ex":{"ar":"نهج وقائي متكامل.","en":"An integrated preventive approach."}}]},{"id":"wp-global","ar":"القوى العاملة العالمية","en":"Global Workforce","icon":"🌍","boss":false,"segs":[{"t":"t","h":{"ar":"إدارة القوى العاملة العالمية","en":"Managing a Global Workforce"},"body":{"ar":"تتطلّب إدارة القوى العاملة العالمية مواءمة ممارسات HR عبر الحدود. يشمل «التنقّل العالمي» اختيار المغتربين وتدريبهم قبل المغادرة، وتأمين تأشيرات العمل والإقامة، والامتثال لقوانين العمل في الدولة المضيفة ومعايير منظمة العمل الدولية (ILO). وفي التعويض تُستخدم مناهج كـ«الميزانية» أو «المعدّل السائد» مع بدلات المشقّة وغلاء المعيشة و«معادلة الضرائب» و«اتفاقات التجميع» للضمان الاجتماعي. ويُراعى أيضاً خصوصية البيانات عبر الحدود (مثل GDPR) وإدارة المواهب العالمية والفرق الافتراضية وتخطيط إعادة الدمج.","en":"Managing a global workforce requires aligning HR practices across borders. Global mobility covers selecting and pre-departure training of expatriates, securing work visas and residency, and complying with host-country labor law and ILO standards. Compensation uses approaches like the balance sheet or going rate, with hardship and cost-of-living allowances, tax equalization, and totalization agreements for social security. It also addresses cross-border data privacy (e.g., GDPR), global talent management, virtual teams, and repatriation planning."}},{"t":"q","q":{"ar":"«التنقّل العالمي» (Global Mobility) في HR يشمل:","en":"Global mobility in HR includes:"},"opts":[{"ar":"إدارة انتقال الموظفين للعمل عبر الدول","en":"Managing employee moves to work across countries"},{"ar":"التوظيف المحلي فقط","en":"Local hiring only"},{"ar":"تصميم المنتجات","en":"Product design"}],"a":0,"ex":{"ar":"إدارة المهام الدولية كاملةً.","en":"Managing international assignments end-to-end."}},{"t":"q","q":{"ar":"«المُغترَب» (Expatriate) هو موظف:","en":"An expatriate is an employee:"},"opts":[{"ar":"يعمل في وطنه","en":"Working in their home country"},{"ar":"يُرسَل للعمل في دولة أخرى","en":"Sent to work in another country"},{"ar":"متقاعد","en":"Retired"}],"a":1,"ex":{"ar":"يعمل خارج وطنه.","en":"Working outside the home country."}},{"t":"q","q":{"ar":"قبل العمل في دولة أخرى يحتاج الموظف غالباً:","en":"Before working abroad an employee usually needs:"},"opts":[{"ar":"ترقية","en":"A promotion"},{"ar":"إجازة","en":"Leave"},{"ar":"تأشيرة/تصريح عمل","en":"A work visa/permit"}],"a":2,"ex":{"ar":"تصريح قانوني للعمل.","en":"Legal authorization to work."}},{"t":"q","q":{"ar":"«منظمة العمل الدولية» (ILO):","en":"The International Labour Organization (ILO):"},"opts":[{"ar":"تضع معايير عمل دولية","en":"Sets international labor standards"},{"ar":"تبيع المنتجات","en":"Sells products"},{"ar":"تحدّد أسعار العملات","en":"Sets currency rates"}],"a":0,"ex":{"ar":"معايير عمل عالمية.","en":"Global labor standards."}},{"t":"q","q":{"ar":"«الإرسال للخارج» (Offshoring):","en":"Offshoring is:"},"opts":[{"ar":"نقل العمل لمورّد محلي","en":"Moving work to a local vendor"},{"ar":"نقل عمليات الشركة إلى دولة أخرى","en":"Relocating company operations to another country"},{"ar":"الفصل","en":"Termination"}],"a":1,"ex":{"ar":"نقل العمليات لدولة أخرى.","en":"Relocating operations abroad."}},{"t":"q","q":{"ar":"«الإسناد الخارجي» (Outsourcing):","en":"Outsourcing is:"},"opts":[{"ar":"أداء العمل داخلياً","en":"Doing work internally"},{"ar":"التوظيف الدائم","en":"Permanent hiring"},{"ar":"تكليف طرف خارجي بأداء وظيفة","en":"Contracting an external party to perform a function"}],"a":2,"ex":{"ar":"إسناد وظيفة لجهة خارجية.","en":"Delegating a function externally."}},{"t":"q","q":{"ar":"نهج «المعدّل السائد» (Going Rate) لتعويض المغتربين:","en":"The going-rate approach to expat pay:"},"opts":[{"ar":"يربط الأجر بمستوى الدولة المضيفة","en":"Ties pay to the host-country market level"},{"ar":"يتجاهل السوق","en":"Ignores the market"},{"ar":"يخفض الأجر دائماً","en":"Always cuts pay"}],"a":0,"ex":{"ar":"أجر وفق السوق المضيف.","en":"Pay per the host market."}},{"t":"q","q":{"ar":"«بدل المشقّة» (Hardship Allowance) يُمنح بسبب:","en":"A hardship allowance is granted due to:"},"opts":[{"ar":"الترقية","en":"A promotion"},{"ar":"ظروف المعيشة الصعبة في الموقع","en":"Difficult living conditions at the location"},{"ar":"الأقدمية","en":"Seniority"}],"a":1,"ex":{"ar":"تعويض صعوبة الموقع.","en":"Compensating a tough location."}},{"t":"q","q":{"ar":"«اتفاقات التجميع» (Totalization) تتعلّق بـ:","en":"Totalization agreements concern:"},"opts":[{"ar":"الإجازات","en":"Leave"},{"ar":"التدريب","en":"Training"},{"ar":"تجنّب ازدواج اشتراكات الضمان الاجتماعي عبر الدول","en":"Avoiding double social-security contributions across countries"}],"a":2,"ex":{"ar":"تنسيق الضمان الاجتماعي دولياً.","en":"Coordinating social security internationally."}},{"t":"q","q":{"ar":"«معادلة الضرائب» (Tax Equalization):","en":"Tax equalization ensures:"},"opts":[{"ar":"ألا يدفع المغترب ضرائب أكثر مما لو بقي في وطنه","en":"The expat pays no more tax than if they had stayed home"},{"ar":"إعفاء كامل","en":"Total exemption"},{"ar":"مضاعفة الضريبة","en":"Doubling the tax"}],"a":0,"ex":{"ar":"حياد ضريبي للمغترب.","en":"Tax neutrality for the expat."}},{"t":"q","q":{"ar":"«اللائحة العامة لحماية البيانات» (GDPR):","en":"The GDPR is:"},"opts":[{"ar":"قانون أجور","en":"A wage law"},{"ar":"تنظيم أوروبي لحماية البيانات الشخصية","en":"An EU regulation protecting personal data"},{"ar":"اتفاق تجاري","en":"A trade deal"}],"a":1,"ex":{"ar":"يقيّد نقل بيانات الموظفين.","en":"It restricts employee-data transfer."}},{"t":"q","q":{"ar":"«التدريب قبل المغادرة» (Pre-Departure):","en":"Pre-departure training:"},"opts":[{"ar":"غير ضروري","en":"Is unnecessary"},{"ar":"تأديبي","en":"Is disciplinary"},{"ar":"يُعدّ المغترب ثقافياً ولغوياً ولوجستياً","en":"Prepares the expat culturally, linguistically, logistically"}],"a":2,"ex":{"ar":"يرفع فرص نجاح المهمة.","en":"It raises assignment success."}},{"t":"q","q":{"ar":"التخطيط لـ«إعادة الدمج» (Repatriation) مهم لأن:","en":"Repatriation planning matters because:"},"opts":[{"ar":"كثيراً ما يُهمَل فيغادر العائدون بسبب سوء إعادة الإدماج","en":"It is often neglected, causing returnees to quit from poor reintegration"},{"ar":"لا قيمة له","en":"It is worthless"},{"ar":"يخفض الأجر","en":"It cuts pay"}],"a":0,"ex":{"ar":"الإهمال يفقد المواهب العائدة.","en":"Neglect loses returning talent."}},{"t":"q","q":{"ar":"«مواطن الدولة الثالثة» (TCN) هو موظف:","en":"A third-country national (TCN) is an employee:"},"opts":[{"ar":"من الوطن الأم","en":"From the home country"},{"ar":"من دولة غير الوطن الأم وغير المضيفة","en":"From a country other than the home and host"},{"ar":"من الدولة المضيفة","en":"From the host country"}],"a":1,"ex":{"ar":"لا من الوطن ولا المضيف.","en":"Neither home nor host country."}},{"t":"q","q":{"ar":"عند التوظيف في دولة أخرى يجب:","en":"When hiring in another country, you must:"},"opts":[{"ar":"تطبيق قانون الوطن الأم فقط","en":"Apply only home-country law"},{"ar":"تجاهل القوانين","en":"Ignore the laws"},{"ar":"الامتثال لقانون العمل في الدولة المضيفة","en":"Comply with host-country labor law"}],"a":2,"ex":{"ar":"قانون الدولة المضيفة يسري.","en":"Host-country law applies."}},{"t":"q","q":{"ar":"من أهمّ معايير اختيار المغتربين الناجحين:","en":"A key criterion for selecting successful expats:"},"opts":[{"ar":"التكيّف الثقافي ودعم الأسرة لا الكفاءة الفنية وحدها","en":"Cultural adaptability and family support, not just technical skill"},{"ar":"الطول","en":"Height"},{"ar":"العمر فقط","en":"Age only"}],"a":0,"ex":{"ar":"التكيّف الثقافي حاسم.","en":"Cultural fit is decisive."}},{"t":"q","q":{"ar":"«صاحب العمل المسجّل» (EOR/Global PEO) يتيح:","en":"An Employer of Record (EOR/Global PEO) enables:"},"opts":[{"ar":"إلغاء التوظيف","en":"Eliminating hiring"},{"ar":"توظيف موظفين في دول دون تأسيس كيان قانوني محلي","en":"Hiring staff abroad without a local legal entity"},{"ar":"خفض الأجور","en":"Cutting wages"}],"a":1,"ex":{"ar":"توظيف دولي سريع وممتثل.","en":"Fast, compliant global hiring."}},{"t":"q","q":{"ar":"«بدل غلاء المعيشة» (COLA) يعوّض عن:","en":"A cost-of-living allowance (COLA) offsets:"},"opts":[{"ar":"الترقية","en":"A promotion"},{"ar":"الأداء","en":"Performance"},{"ar":"فرق تكلفة المعيشة بين الموقعين","en":"The cost-of-living difference between locations"}],"a":2,"ex":{"ar":"حفظ القوة الشرائية.","en":"Preserving purchasing power."}},{"t":"q","q":{"ar":"من تحدّيات «الفرق العالمية الافتراضية»:","en":"A challenge of virtual global teams is:"},"opts":[{"ar":"فروق المناطق الزمنية والثقافة والتواصل","en":"Time-zone, cultural, and communication differences"},{"ar":"لا تحدّيات","en":"No challenges"},{"ar":"نقص التقنية فقط","en":"Only lack of technology"}],"a":0,"ex":{"ar":"تنسيق عبر الزمن والثقافة.","en":"Coordinating across time and culture."}},{"t":"q","q":{"ar":"«إدارة المواهب العالمية»:","en":"Global talent management is:"},"opts":[{"ar":"التوظيف المحلي فقط","en":"Local hiring only"},{"ar":"جذب وتطوير ونشر المواهب عبر الأسواق العالمية","en":"Attracting, developing, and deploying talent across global markets"},{"ar":"تجاهل المواهب","en":"Ignoring talent"}],"a":1,"ex":{"ar":"منظور عالمي للمواهب.","en":"A global view of talent."}}]},{"id":"wp-csr","ar":"المسؤولية الاجتماعية CSR","en":"Corporate Social Responsibility","icon":"🌱","boss":true,"segs":[{"t":"t","h":{"ar":"المسؤولية الاجتماعية للشركات","en":"Corporate Social Responsibility"},"body":{"ar":"تعني «المسؤولية الاجتماعية للشركات» (CSR) التزام المنظمة بالمساهمة الإيجابية في المجتمع والبيئة إلى جانب الربح. وتتجسّد في «المحصّلة الثلاثية» (الناس، الكوكب، الربح) ومعايير «الحوكمة البيئية والاجتماعية» (ESG). ويصنّفها هرم كارول إلى مسؤوليات اقتصادية فقانونية فأخلاقية فخيرية. وتراعي CSR أصحاب المصلحة كافّةً لا المساهمين وحدهم، وتشمل الاستدامة والمواطنة المؤسسية والمشاركة المجتمعية وسلاسل التوريد الأخلاقية. ولـ HR دور محوري عبر «الموارد البشرية المستدامة» وبرامج التطوّع والتنوّع وربط CSR بسمعة صاحب العمل.","en":"CSR is an organization commitment to contribute positively to society and the environment alongside profit. It is captured in the triple bottom line (people, planet, profit) and ESG criteria. Carroll pyramid ranks it into economic, legal, ethical, and philanthropic responsibilities. CSR considers all stakeholders, not only shareholders, and spans sustainability, corporate citizenship, community involvement, and ethical supply chains. HR plays a central role through sustainable HR, volunteer and diversity programs, and linking CSR to employer reputation."}},{"t":"q","q":{"ar":"«المسؤولية الاجتماعية للشركات» (CSR):","en":"Corporate Social Responsibility (CSR) is:"},"opts":[{"ar":"التزام المنظمة بالمساهمة الإيجابية في المجتمع والبيئة مع الربح","en":"An organization commitment to benefit society and the environment alongside profit"},{"ar":"تعظيم الربح فقط","en":"Maximizing profit only"},{"ar":"التسويق فقط","en":"Marketing only"}],"a":0,"ex":{"ar":"مسؤولية تتجاوز الربح.","en":"Responsibility beyond profit."}},{"t":"q","q":{"ar":"«المحصّلة الثلاثية» (Triple Bottom Line):","en":"The triple bottom line is:"},"opts":[{"ar":"الربح ثلاث مرات","en":"Profit, tripled"},{"ar":"الناس والكوكب والربح","en":"People, planet, and profit"},{"ar":"ثلاثة مديرين","en":"Three managers"}],"a":1,"ex":{"ar":"توازن اجتماعي وبيئي ومالي.","en":"Social, environmental, financial balance."}},{"t":"q","q":{"ar":"«أصحاب المصلحة» (Stakeholders) يشملون:","en":"Stakeholders include:"},"opts":[{"ar":"المساهمين فقط","en":"Shareholders only"},{"ar":"الإدارة فقط","en":"Management only"},{"ar":"كل المتأثّرين بالمنظمة (موظفون، مجتمع، عملاء)","en":"All affected by the organization (employees, community, customers)"}],"a":2,"ex":{"ar":"أوسع من المالكين.","en":"Broader than owners."}},{"t":"q","q":{"ar":"معايير «ESG» ترمز إلى:","en":"ESG stands for:"},"opts":[{"ar":"البيئة والمجتمع والحوكمة","en":"Environmental, Social, and Governance"},{"ar":"الاقتصاد والمبيعات والنموّ","en":"Economy, Sales, Growth"},{"ar":"التوظيف والتدريب","en":"Hiring and Training"}],"a":0,"ex":{"ar":"إطار قياس الاستدامة.","en":"A sustainability measurement frame."}},{"t":"q","q":{"ar":"قاعدة «هرم كارول» للمسؤولية:","en":"The base of Carroll pyramid is:"},"opts":[{"ar":"الخيرية","en":"Philanthropic"},{"ar":"الاقتصادية (تحقيق الربح)","en":"Economic (being profitable)"},{"ar":"الأخلاقية","en":"Ethical"}],"a":1,"ex":{"ar":"الربحية أساس البقاء.","en":"Profitability is the foundation."}},{"t":"q","q":{"ar":"«المسؤولية الخيرية» في هرم كارول:","en":"The philanthropic level of Carroll pyramid is:"},"opts":[{"ar":"الالتزام بالقانون","en":"Obeying the law"},{"ar":"تحقيق الربح","en":"Making profit"},{"ar":"التبرّع والإسهام الطوعي في المجتمع","en":"Voluntary giving and community contribution"}],"a":2,"ex":{"ar":"قمّة الهرم.","en":"The top of the pyramid."}},{"t":"q","q":{"ar":"«القيمة المشتركة» (Shared Value) لبورتر وكرامر:","en":"Shared value (Porter and Kramer) means:"},"opts":[{"ar":"خلق قيمة اقتصادية ومجتمعية معاً","en":"Creating economic and social value together"},{"ar":"الربح على حساب المجتمع","en":"Profit at society expense"},{"ar":"التبرّع فقط","en":"Donation only"}],"a":0,"ex":{"ar":"الربح والمجتمع معاً.","en":"Profit and society together."}},{"t":"q","q":{"ar":"«الاستدامة» (Sustainability):","en":"Sustainability is:"},"opts":[{"ar":"الربح قصير المدى","en":"Short-term profit"},{"ar":"تلبية احتياجات الحاضر دون الإضرار بالأجيال القادمة","en":"Meeting present needs without harming future generations"},{"ar":"تجاهل البيئة","en":"Ignoring the environment"}],"a":1,"ex":{"ar":"توازن بين الحاضر والمستقبل.","en":"Balancing present and future."}},{"t":"q","q":{"ar":"«الغسل الأخضر» (Greenwashing):","en":"Greenwashing is:"},"opts":[{"ar":"ممارسة بيئية حقيقية","en":"Genuine environmental practice"},{"ar":"تقرير شفّاف","en":"Transparent reporting"},{"ar":"ادّعاء بيئي مضلّل دون التزام حقيقي","en":"Misleading green claims without real commitment"}],"a":2,"ex":{"ar":"تضليل لا التزام.","en":"Deception, not commitment."}},{"t":"q","q":{"ar":"«المواطنة المؤسسية» (Corporate Citizenship):","en":"Corporate citizenship is:"},"opts":[{"ar":"تصرّف المنظمة كعضو مسؤول في المجتمع","en":"The organization acting as a responsible member of society"},{"ar":"التهرّب الضريبي","en":"Tax evasion"},{"ar":"تجاهل القوانين","en":"Ignoring laws"}],"a":0,"ex":{"ar":"مساهمة مجتمعية مسؤولة.","en":"Responsible societal contribution."}},{"t":"q","q":{"ar":"«الميثاق العالمي للأمم المتحدة» وأهداف التنمية المستدامة (SDGs):","en":"The UN Global Compact and SDGs are:"},"opts":[{"ar":"اتفاق تجاري","en":"A trade deal"},{"ar":"أُطر عالمية توجّه ممارسات الاستدامة والمسؤولية","en":"Global frameworks guiding sustainability and responsibility"},{"ar":"قانون ضرائب","en":"A tax law"}],"a":1,"ex":{"ar":"مرجعيات عالمية للمسؤولية.","en":"Global responsibility references."}},{"t":"q","q":{"ar":"«التوريد الأخلاقي» (Ethical Sourcing):","en":"Ethical sourcing means:"},"opts":[{"ar":"أرخص مورّد دائماً","en":"Always the cheapest supplier"},{"ar":"تجاهل ظروف العمل","en":"Ignoring labor conditions"},{"ar":"ضمان معايير عمل وبيئة عادلة في سلسلة التوريد","en":"Ensuring fair labor and environmental standards in the supply chain"}],"a":2,"ex":{"ar":"مسؤولية تمتدّ للموردين.","en":"Responsibility extends to suppliers."}},{"t":"q","q":{"ar":"ترتبط CSR بـ HR عبر:","en":"CSR links to HR through:"},"opts":[{"ar":"تعزيز سمعة صاحب العمل وجذب المواهب وانخراطها","en":"Boosting employer reputation and attracting/engaging talent"},{"ar":"خفض الأجور","en":"Cutting wages"},{"ar":"إلغاء التدريب","en":"Cutting training"}],"a":0,"ex":{"ar":"CSR محرّك للعلامة والانخراط.","en":"CSR drives brand and engagement."}},{"t":"q","q":{"ar":"«برامج التطوّع» المؤسسية:","en":"Corporate volunteer programs:"},"opts":[{"ar":"إلزامية بأجر إضافي","en":"Mandatory with overtime"},{"ar":"تتيح للموظفين خدمة المجتمع وتعزّز الانخراط","en":"Let employees serve the community and boost engagement"},{"ar":"بلا فائدة","en":"Useless"}],"a":1,"ex":{"ar":"تربط الموظف بالقيم والمجتمع.","en":"They link staff to values and community."}},{"t":"q","q":{"ar":"«تقارير الاستدامة/CSR»:","en":"Sustainability/CSR reporting:"},"opts":[{"ar":"سرّية","en":"Is confidential"},{"ar":"تسويقية فقط","en":"Is marketing only"},{"ar":"تُفصح بشفافية عن الأثر البيئي والاجتماعي","en":"Transparently discloses environmental and social impact"}],"a":2,"ex":{"ar":"مساءلة وشفافية.","en":"Accountability and transparency."}},{"t":"q","q":{"ar":"«الموارد البشرية المستدامة» (Sustainable HR):","en":"Sustainable HR is:"},"opts":[{"ar":"دمج الاستدامة والمسؤولية في ممارسات HR","en":"Embedding sustainability and responsibility into HR practices"},{"ar":"خفض عدد الموظفين","en":"Cutting headcount"},{"ar":"تجاهل الرفاه","en":"Ignoring wellbeing"}],"a":0,"ex":{"ar":"HR تقود الاستدامة داخلياً.","en":"HR drives internal sustainability."}},{"t":"q","q":{"ar":"«نموذج أصحاب المصلحة» مقابل «نموذج المساهمين»:","en":"The stakeholder model versus the shareholder model:"},"opts":[{"ar":"يركّز على الربح فقط","en":"Focuses on profit only"},{"ar":"يوازن مصالح كل الأطراف لا المالكين وحدهم","en":"Balances all parties interests, not only owners"},{"ar":"يلغي الربح","en":"Abolishes profit"}],"a":1,"ex":{"ar":"توازن أوسع للمصالح.","en":"A broader balance of interests."}},{"t":"q","q":{"ar":"من المسؤولية البيئية للمنظمة:","en":"An environmental responsibility of the organization is:"},"opts":[{"ar":"زيادة الانبعاثات","en":"Increasing emissions"},{"ar":"تجاهل النفايات","en":"Ignoring waste"},{"ar":"تقليل البصمة الكربونية وترشيد الموارد","en":"Reducing carbon footprint and conserving resources"}],"a":2,"ex":{"ar":"أثر بيئي أقل.","en":"A lighter environmental footprint."}},{"t":"q","q":{"ar":"«الحجّة التجارية» لـ CSR تشمل:","en":"The business case for CSR includes:"},"opts":[{"ar":"تحسين السمعة والاحتفاظ بالمواهب وإدارة المخاطر","en":"Better reputation, talent retention, and risk management"},{"ar":"زيادة التكاليف فقط","en":"Higher costs only"},{"ar":"لا فائدة","en":"No benefit"}],"a":0,"ex":{"ar":"CSR استثمار لا تكلفة فقط.","en":"CSR is an investment, not just a cost."}},{"t":"q","q":{"ar":"«حوكمة الشركات» (Corporate Governance):","en":"Corporate governance is:"},"opts":[{"ar":"تجاهل المساءلة","en":"Ignoring accountability"},{"ar":"نظام التوجيه والرقابة الذي يضمن المساءلة والنزاهة","en":"The system of direction and oversight ensuring accountability and integrity"},{"ar":"التسويق","en":"Marketing"}],"a":1,"ex":{"ar":"إطار المساءلة المؤسسية.","en":"The framework of corporate accountability."}}]}]}];

const SJI=[{"sc": {"ar": "يخبرك موظف سرّاً بأن مشرفه يضايقه لفظياً لكنه يطلب عدم اتخاذ أي إجراء خوفاً من الانتقام. ما أفضل تصرّف؟", "en": "An employee confidentially says their supervisor verbally harasses them but asks you to take no action for fear of retaliation. BEST action?"}, "opts": [{"ar": "تتجاهل احتراماً لرغبته", "en": "Ignore it to respect their wish"}, {"ar": "توضّح التزامك بالسرّية قدر الإمكان وواجبك في التحقيق وحماية القانون من الانتقام", "en": "Explain you will keep it as confidential as possible but must investigate, and clarify legal protection from retaliation"}, {"ar": "تواجه المشرف علناً فوراً", "en": "Confront the supervisor publicly at once"}, {"ar": "تنصحه بالبحث عن وظيفة أخرى", "en": "Advise them to find another job"}], "a": 1, "why": {"ar": "لا يمكن لـ HR تجاهل بلاغ مضايقة؛ الواجب القانوني يقتضي التحقيق مع طمأنة الموظف بالسرّية قدر الإمكان وحمايته من الانتقام.", "en": "HR cannot ignore a harassment report; the duty is to investigate while reassuring on confidentiality and protection from retaliation."}}, {"sc": {"ar": "موظف في فريقك تراجع أداؤه مؤخراً رغم أنه كان جيداً. ما أفضل خطوة أولى؟", "en": "A team member performance has recently declined though they used to do well. BEST first step?"}, "opts": [{"ar": "إصدار إنذار كتابي مباشرة", "en": "Issue a written warning immediately"}, {"ar": "محادثة خاصة لفهم الأسباب وتقديم الدعم وتوضيح التوقّعات", "en": "A private talk to understand causes, offer support, and clarify expectations"}, {"ar": "تجاهل الأمر لعلّه مؤقّت", "en": "Ignore it as possibly temporary"}, {"ar": "نقله لفريق آخر", "en": "Transfer them to another team"}], "a": 1, "why": {"ar": "التراجع المفاجئ غالباً له سبب؛ الحوار الداعم وتوضيح التوقّعات يسبق الإجراءات الرسمية.", "en": "A sudden decline usually has a cause; supportive dialogue precedes formal action."}}, {"sc": {"ar": "يتنازع موظفان في فريقك ويؤثّر ذلك على العمل. ما أفضل تصرّف؟", "en": "Two employees on your team are in conflict that affects work. BEST action?"}, "opts": [{"ar": "تنحاز للأكثر أداءً", "en": "Side with the higher performer"}, {"ar": "تتجاهل حتى يحلّاه بنفسيهما", "en": "Ignore it until they resolve it themselves"}, {"ar": "تجمعهما لحوار محايد ميسَّر يركّز على المصالح المشتركة", "en": "Bring them together for a neutral, facilitated, interest-focused dialogue"}, {"ar": "تنقل أحدهما فوراً", "en": "Transfer one immediately"}], "a": 2, "why": {"ar": "الوساطة المحايدة القائمة على المصالح أكثر استدامةً من الانحياز أو التجاهل.", "en": "Neutral, interest-based mediation is more durable than taking sides or ignoring."}}, {"sc": {"ar": "يطلب مدير الكشف عن التفاصيل الطبية لموظف طلب تعديلاً لإعاقته. ما أفضل تصرّف؟", "en": "A manager asks you to disclose the medical details of an employee who requested a disability accommodation. BEST action?"}, "opts": [{"ar": "تشارك كل التفاصيل لأنه المدير", "en": "Share all details since they are the manager"}, {"ar": "ترفض بلباقة وتوضّح سرّية المعلومات الطبية وتشارك فقط القيود الوظيفية والتعديل اللازم", "en": "Politely decline, explain medical info is confidential, and share only work restrictions and the needed accommodation"}, {"ar": "ترفض دون تفسير", "en": "Refuse without explanation"}, {"ar": "تطلب من الموظف إخبار مديره بنفسه", "en": "Tell the employee to inform the manager themselves"}], "a": 1, "why": {"ar": "تُحفظ سرّية المعلومات الطبية (ADA)؛ يكفي إبلاغ المدير بالقيود الوظيفية والتعديل دون التشخيص.", "en": "Medical info stays confidential (ADA); the manager only needs restrictions and accommodation, not the diagnosis."}}, {"sc": {"ar": "يطلب مدير التوظيف استبعاد المرشّحين فوق سنّ معيّنة لأنهم «لن يبقوا طويلاً». ما أفضل تصرّف؟", "en": "A hiring manager asks to screen out candidates above a certain age because they will not stay long. BEST action?"}, "opts": [{"ar": "تنفّذ الطلب", "en": "Comply with the request"}, {"ar": "توضّح أنه تمييز عمري مخالف لـ ADEA وتعيد التركيز على معايير مرتبطة بالوظيفة", "en": "Explain this is age discrimination under the ADEA and refocus on job-related criteria"}, {"ar": "تنفّذ بهدوء دون توثيق", "en": "Quietly comply without documenting"}, {"ar": "تشتكي للإدارة العليا دون التحدّث للمدير", "en": "Report to senior management without talking to the manager"}], "a": 1, "why": {"ar": "الاستبعاد بسبب السن محظور (ADEA)؛ دور HR توعية المدير والتركيز على الكفاءة المرتبطة بالوظيفة.", "en": "Screening by age is prohibited (ADEA); HR should educate and refocus on job-related competence."}}, {"sc": {"ar": "تلاحظ موظفاً يتجاهل معدّات الوقاية في منطقة خطرة. ما أفضل تصرّف؟", "en": "You notice an employee skipping protective equipment in a hazardous area. BEST action?"}, "opts": [{"ar": "تتجاهل لأنها ليست مسؤوليتك", "en": "Ignore it since it is not your job"}, {"ar": "تبلّغ عنه تأديبياً فوراً", "en": "Report them for discipline immediately"}, {"ar": "تتدخّل فوراً لإيقاف الخطر وتذكّره بالإجراء وتعالج السبب الجذري", "en": "Intervene at once to stop the hazard, remind of the procedure, and address the root cause"}, {"ar": "تنتظر وقوع حادث", "en": "Wait for an incident"}], "a": 2, "why": {"ar": "السلامة أولوية فورية؛ يُوقَف الخطر ويُعالَج السبب، والتأديب ليس الخطوة الأولى عادةً.", "en": "Safety is an immediate priority; stop the hazard and fix the cause; discipline is not usually first."}}, {"sc": {"ar": "يقاوم فريقك نظاماً جديداً وتسمع تذمّراً متزايداً. ما أفضل تصرّف؟", "en": "Your team resists a new system and complaints are growing. BEST action?"}, "opts": [{"ar": "تفرض النظام وتتجاهل التذمّر", "en": "Enforce it and ignore complaints"}, {"ar": "تنصت لمخاوفهم وتوضّح «لماذا» التغيير وتشركهم وتوفّر التدريب", "en": "Listen to concerns, explain the why, involve them, and provide training"}, {"ar": "تؤجّل التغيير بلا أجل", "en": "Postpone the change indefinitely"}, {"ar": "تستبدل المقاومين", "en": "Replace those who resist"}], "a": 1, "why": {"ar": "إدارة التغيير الفعّالة تعالج المقاومة بالتواصل والمشاركة والتدريب لا بالفرض.", "en": "Effective change management addresses resistance via communication, involvement, and training, not coercion."}}, {"sc": {"ar": "تكتشف أن زميلاً في HR يشارك في توظيف قريب له. ما أفضل تصرّف؟", "en": "You discover an HR colleague is involved in hiring a relative. BEST action?"}, "opts": [{"ar": "تتجاهل لتجنّب الإحراج", "en": "Ignore it to avoid awkwardness"}, {"ar": "تخبر القريب ألا يتقدّم", "en": "Tell the relative not to apply"}, {"ar": "تشير لسياسة تضارب المصالح وتوصي بأن يتنحّى الزميل عن قرار التوظيف", "en": "Cite the conflict-of-interest policy and recommend the colleague recuse themselves"}, {"ar": "تنشر الأمر بين الزملاء", "en": "Spread it among colleagues"}], "a": 2, "why": {"ar": "تضارب المصالح يُعالَج بالإفصاح والتنحّي وفق السياسة، لا بالتجاهل أو الإشاعة.", "en": "A conflict of interest is handled by disclosure and recusal per policy, not by ignoring or gossip."}}, {"sc": {"ar": "عليك إبلاغ موظف مجتهد بأن أداءه دون المتوقّع. ما أفضل أسلوب؟", "en": "You must tell a hard-working employee their performance is below expectations. BEST approach?"}, "opts": [{"ar": "تعمّم بأن «الجميع مقصّر»", "en": "Generalize that everyone is underperforming"}, {"ar": "تؤجّل المحادثة لتجنّب الإحراج", "en": "Delay the talk to avoid awkwardness"}, {"ar": "تغذية راجعة محدّدة قائمة على السلوك والأثر، بخصوصية، مع خطة تحسين متّفق عليها", "en": "Specific, behavior-and-impact feedback, privately, with an agreed improvement plan"}, {"ar": "ترسلها عبر بريد عام", "en": "Send it in a group email"}], "a": 2, "why": {"ar": "التغذية الراجعة الفعّالة محدّدة وسلوكية وخاصّة وبنّاءة مع خطة واضحة.", "en": "Effective feedback is specific, behavioral, private, and constructive with a clear plan."}}, {"sc": {"ar": "في اجتماع، يقاطع موظفٌ زميلةً مراراً وينسب أفكارها لنفسه. ما أفضل تصرّف كقائد؟", "en": "In a meeting, an employee repeatedly interrupts a colleague and takes credit for her ideas. BEST action as a leader?"}, "opts": [{"ar": "تتجاهل لتجنّب التوتّر", "en": "Ignore it to avoid tension"}, {"ar": "تعيد الفضل لصاحبته وتضع قواعد لحوار منصف وتعالج النمط لاحقاً بخصوصية", "en": "Redirect credit to its owner, set fair-discussion rules, and address the pattern privately later"}, {"ar": "توبّخه علناً بحدّة", "en": "Reprimand him harshly in public"}, {"ar": "تطلب منها الدفاع عن نفسها", "en": "Ask her to defend herself"}], "a": 1, "why": {"ar": "القيادة الشاملة تضمن عدالة المشاركة وتعالج السلوك بهدوء وفاعلية دون إذلال.", "en": "Inclusive leadership ensures fair participation and addresses behavior calmly and effectively without humiliation."}}, {"sc": {"ar": "يطلب مدير من موظفين غير معفيين إنهاء مهام «بعد تسجيل الخروج» دون أجر. ما أفضل تصرّف؟", "en": "A manager asks non-exempt staff to finish tasks after clocking out, unpaid. BEST action?"}, "opts": [{"ar": "تسمح به لأنه قرار المدير", "en": "Allow it since it is the manager decision"}, {"ar": "توضّح أن ساعات غير المعفيين يجب أن تُدفع وفق FLSA وتصحّح الممارسة", "en": "Explain non-exempt hours must be paid under FLSA, and correct the practice"}, {"ar": "تتجاهل المخالفة", "en": "Ignore the violation"}, {"ar": "تخصم من المدير شخصياً", "en": "Deduct from the manager personally"}], "a": 1, "why": {"ar": "العمل بلا أجر لغير المعفيين مخالف لـ FLSA؛ على HR تصحيح الممارسة وحماية الأجر.", "en": "Off-the-clock work for non-exempt staff violates FLSA; HR must correct it and protect pay."}}, {"sc": {"ar": "يطلب موظف مؤهَّل إجازة لرعاية والده المريض، ويبدو مديره منزعجاً. ما أفضل تصرّف؟", "en": "An eligible employee requests leave to care for a sick parent, and the manager seems annoyed. BEST action?"}, "opts": [{"ar": "ترفض الطلب لإرضاء المدير", "en": "Deny the request to please the manager"}, {"ar": "تعالج الطلب وفق FMLA وتوضّح للمدير حقّ الموظف وحمايته من الانتقام", "en": "Process it under FMLA and explain the employee right and protection from retaliation"}, {"ar": "تؤجّل الردّ بلا سبب", "en": "Delay the response without reason"}, {"ar": "تطلب تفاصيل طبية كاملة علنية", "en": "Demand full medical details publicly"}], "a": 1, "why": {"ar": "رعاية فرد من العائلة بحالة صحية خطيرة سبب مؤهَّل لـ FMLA، والموظف محميّ من الانتقام.", "en": "Caring for a family member with a serious health condition is FMLA-qualifying, and the employee is protected from retaliation."}}, {"sc": {"ar": "يكتشف HR أن موظفاً نشر معلومات مالية سرّية للشركة على وسائل التواصل. ما أفضل تصرّف؟", "en": "HR finds an employee posted confidential company financial information on social media. BEST action?"}, "opts": [{"ar": "التحقيق وفق سياسة السرّية وتطبيق تأديب متناسب مع التوثيق", "en": "Investigate per the confidentiality policy and apply proportionate, documented discipline"}, {"ar": "فصله فوراً دون تحقيق", "en": "Terminate immediately without investigation"}, {"ar": "تجاهل الأمر", "en": "Ignore it"}, {"ar": "الرد علناً على المنشور", "en": "Reply publicly to the post"}], "a": 0, "why": {"ar": "الإجراء العادل يتطلّب تحقيقاً وتطبيق السياسة وتأديباً متناسباً موثّقاً لا فصلاً متسرّعاً.", "en": "Fair process requires investigation, policy application, and proportionate documented discipline, not a rushed firing."}}, {"sc": {"ar": "لديك مرشّحان داخليان مؤهّلان لترقية، أحدهما صديقك. ما أفضل تصرّف؟", "en": "You have two qualified internal candidates for a promotion; one is your friend. BEST action?"}, "opts": [{"ar": "ترقّي صديقك", "en": "Promote your friend"}, {"ar": "تعتمد معايير موضوعية وتفصح عن أي علاقة قد تؤثّر", "en": "Use objective criteria and disclose any relationship that could bias it"}, {"ar": "تترك القرار للصدفة", "en": "Leave it to chance"}, {"ar": "تؤجّل بلا سبب", "en": "Delay without reason"}], "a": 1, "why": {"ar": "النزاهة تقتضي معايير موضوعية والإفصاح عن أي تضارب مصالح محتمل.", "en": "Integrity requires objective criteria and disclosure of any potential conflict of interest."}}, {"sc": {"ar": "يرفض مدير الدخول في «الحوار التفاعلي» لطلب تعديل معقول قائلاً إنه مكلّف. ما أفضل تصرّف؟", "en": "A manager refuses the interactive process for a reasonable-accommodation request, saying it is costly. BEST action?"}, "opts": [{"ar": "توافق وترفض الطلب", "en": "Agree and deny the request"}, {"ar": "تتجاهل الطلب", "en": "Ignore the request"}, {"a ear conduct standards and fair consequences."}}, {"sc": {"ar": "يطلب موظف تعديل جدوله لأداء عبادة أسبوعية. ما أفضل تصرّف؟", "en": "An employee requests a schedule adjustment for a weekly religious observance. BEST action?"}, "opts": [{"ar": "ترفض لأنه غير مريح", "en": "Deny it as inconvenient"}, {"ar": "تبحث تعديلاً معقولاً ما لم يسبّب تكلفة كبيرة (Groff 2023)", "en": "Explore a reasonable accommodation unless it causes substantial cost (Groff 2023)"}, {"ar": "تطلب دليلاً على معتقده", "en": "Demand proof of belief"}, {"ar": "توافق ثم تعاقبه لاحقاً", "en": "Agree then penalize later"}], "a": 1, "why": {"ar": "Title VII يُلزم بتعديل ديني معقول، ومعيار Groff 2023 رفع العتبة إلى «تكلفة كبيرة».", "en": "Title VII requires reasonable religious accommodation, and Groff 2023 raised the bar to substantial cost."}}, {"sc": {"ar": "تُجدوَل اجتماعات الفريق العالمي دائماً في وقت يناسب المقرّ ويرهق فريق آسيا. ما أفضل تصرّف؟", "en": "Global team meetings are always scheduled to suit HQ and burden the Asia team. BEST action?"}, "opts": [{"ar": "تُبقي الوضع لأن المقرّ أهم", "en": "Keep it since HQ matters more"}, {"ar": "تلغي مشاركة آسيا", "en": "Drop Asia participation"}, {"ar": "تناوب أوقات الاجتماعات لتوزيع العبء بإنصاف عبر المناطق", "en": "Rotate meeting times to distribute the burden fairly across regions"}, {"ar": "تتجاهل الشكوى", "en": "Ignore the complaint"}], "a": 2, "why": {"ar": "العقلية العالمية والإنصاف يقتضيان تناوب العبء الزمني بدل تحميله جهة واحدة دائماً.", "en": "A global mindset and fairness call for rotating the time burden rather than always loading one region."}}, {"sc": {"ar": "موظف جديد موهوب يكافح ويبدو مرتبكاً بعد أسبوعين. ما أفضل تصرّف؟", "en": "A talented new hire is struggling and seems lost after two weeks. BEST action?"}, "opts": [{"ar": "تحكم بأنه اختيار خاطئ", "en": "Conclude it was a bad hire"}, {"ar": "تنتظر حتى فترة التقييم", "en": "Wait until the review period"}, {"ar": "تنقله لقسم آخر", "en": "Move them to another department"}, {"ar": "تراجع فاعلية الاندماج وتوفّر توجيهاً وتوقّعات واضحة ودعماً", "en": "Review onboarding effectiveness and provide mentoring, clear expectations, and support"}], "a": 3, "why": {"ar": "التعثّر المبكّر غالباً نتيجة اندماج ضعيف؛ الدعم والتوجيه يسبقان الحكم على الاختيار.", "en": "Early struggle often reflects weak onboarding; support and mentoring precede judging the hire."}}, {"sc": {"ar": "تكتشف أن موظفة تؤدّي العمل نفسه بأجر أقل من زميلها دون مبرّر موضوعي. ما أفضل تصرّف؟", "en": "You find a woman doing equal work for less pay than a male peer with no objective justification. BEST action?"}, "opts": [{"ar": "تحلّل السبب وتصحّح الفجوة غير المبرّرة امتثالاً لقانون المساواة في الأجر", "en": "Analyze the cause and correct the unjustified gap to comply with Equal Pay"}, {"ar": "تتجاهل لتجنّب التكلفة", "en": "Ignore it to avoid cost"}, {"ar": "تخفض أجر الزميل", "en": "Cut the peer pay"}, {"ar": "تطلب منها عدم المقارنة", "en": "Tell her not to compare"}], "a": 0, "why": {"ar": "فجوة الأجر غير المبرّرة للعمل نفسه مخالفة لقانون المساواة في الأجر وتستوجب التصحيح.", "en": "An unjustified pay gap for equal work violates the Equal Pay Act and must be corrected."}}, {"sc": {"ar": "يرفض موظف حضور تدريب إلزامي قائلاً إنه مضيعة للوقت. ما أفضل تصرّف؟", "en": "An employee refuses mandatory training, calling it a waste of time. BEST action?"}, "opts": [{"ar": "تجبره دون تفسير", "en": "Force him without explanation"}, {"ar": "توضّح أهمية التدريب وربطه بعمله وتستمع لمخاوفه", "en": "Explain the training relevance to his role and listen to his concerns"}, {"ar": "تعفيه منه", "en": "Exempt him"}, {"ar": "تعاقبه فوراً", "en": "Discipline him at once"}], "a": 1, "why": {"ar": "توضيح القيمة والربط بالعمل والإنصات يرفع القبول أكثر من الإجبار الأعمى.", "en": "Explaining value, linking to the job, and listening raises buy-in more than blind enforcement."}}, {"sc": {"ar": "يبلّغك موظف عن احتيال مالي محتمل من مدير كبير. ما أفضل تصرّف؟", "en": "An employee reports possible financial fraud by a senior manager. BEST action?"}, "opts": [{"ar": "تتجاهل لأنه مدير كبير", "en": "Ignore it because he is senior"}, {"ar": "تخبر المدير المتّهم", "en": "Tell the accused manager"}, {"ar": "تحمي المُبلِّغ وتصعّد البلاغ عبر القنوات المناسبة للتحقيق", "en": "Protect the whistleblower and escalate through proper channels for investigation"}, {"ar": "تطلب من المُبلِّغ الصمت", "en": "Ask the reporter to stay silent"}], "a": 2, "why": {"ar": "حماية المُبلِّغ (SOX) والتصعيد للتحقيق المستقل واجب مهني وقانوني.", "en": "Protecting the whistleblower (SOX) and escalating for independent investigation is a professional and legal duty."}}, {"sc": {"ar": "يشكو فريق من أن مديرهم يعطي تقييمات غامضة كـ«حسّن نفسك». ما أفضل تصرّف كـ HR؟", "en": "A team complains their manager gives vague feedback like improve yourself. BEST HR action?"}, "opts": [{"ar": "تتجاهل", "en": "Ignore it"}, {"ar": "تكتب التقييمات بدلاً عنه", "en": "Write the reviews for him"}, {"ar": "تنقل الفريق", "en": "Transfer the team"}, {"ar": "تدرّب المدير على تغذية راجعة محدّدة قائمة على السلوك والأثر", "en": "Coach the manager on specific, behavior-and-impact feedback"}], "a": 3, "why": {"ar": "بناء قدرة المدير على تغذية راجعة محدّدة وبنّاءة هو الحل المستدام.", "en": "Building the manager capability for specific, constructive feedback is the sustainable fix."}}, {"sc": {"ar": "يقترح مشرف عدم تسجيل إصابة طفيفة «حتى لا ترتفع الأرقام». ما أفضل تصرّف؟", "en": "A supervisor suggests not recording a minor injury so the numbers do not rise. BEST action?"}, "opts": [{"ar": "تسجّل الإصابة وفق متطلّبات OSHA وتعالج ثقافة الإبلاغ", "en": "Record the injury per OSHA requirements and address the reporting culture"}, {"ar": "توافق للحفاظ على السجل", "en": "Agree to keep the record clean"}, {"ar": "تسجّلها بشكل خاطئ", "en": "Record it inaccurately"}, {"ar": "تتجاهل", "en": "Ignore it"}], "a": 0, "why": {"ar": "إخفاء إصابة قابلة للتسجيل مخالفة لـ OSHA؛ الدقّة والثقافة الآمنة أهم من الأرقام.", "en": "Concealing a recordable injury violates OSHA; accuracy and a safety culture outweigh the numbers."}}, {"sc": {"ar": "أثناء المقابلة يسأل مدير مرشّحاً: هل لديك أي إعاقة قد تعيق العمل؟ ما أفضل تصرّف؟", "en": "During an interview a manager asks a candidate: do you have any disability that could hinder work? BEST action?"}, "opts": [{"ar": "تسمح بالسؤال", "en": "Allow the question"}, {"ar": "توضّح أن هذا السؤال محظور قبل العرض، ويُسأل فقط عن القدرة على أداء المهام الأساسية", "en": "Explain such a pre-offer question is prohibited; only ability to perform essential functions may be asked"}, {"ar": "تسأل عن التشخيص", "en": "Ask for the diagnosis"}, {"ar": "ترفض المرشّح", "en": "Reject the candidate"}], "a": 1, "why": {"ar": "ADA تحظر الاستفسار عن الإعاقة قبل العرض؛ يُسأل فقط عن أداء المهام الأساسية.", "en": "The ADA bars pre-offer disability inquiries; only ability to perform essential functions may be asked."}}, {"sc": {"ar": "يبدأ موظفون حملة تنظيم نقابي، ويريد مدير تهديدهم بإغلاق القسم. ما أفضل تصرّف؟", "en": "Employees begin a union organizing drive and a manager wants to threaten closing the department. BEST action?"}, "opts": [{"ar": "تدعم التهديد", "en": "Support the threat"}, {"ar": "تستجوب المنظّمين", "en": "Interrogate the organizers"}, {"ar": "توضّح أن التهديد ممارسة غير عادلة محظورة (NLRA) وللموظفين حقّ التنظيم", "en": "Explain threatening is a prohibited unfair labor practice (NLRA) and employees have the right to organize"}, {"ar": "تعد بمكافآت لمن ينسحب", "en": "Promise rewards to those who withdraw"}], "a": 2, "why": {"ar": "التهديد أو الاستجواب أو الوعود لعرقلة التنظيم ممارسات غير عادلة تحظرها NLRA (المادة 8أ).", "en": "Threats, interrogation, or promises to deter organizing are unfair labor practices barred by the NLRA (Section 8a)."}}, {"sc": {"ar": "موظف مجتهد تظهر عليه علامات الإرهاق ويعمل ساعات طويلة باستمرار. ما أفضل تصرّف؟", "en": "A dedicated employee shows burnout signs and consistently works long hours. BEST action?"}, "opts": [{"ar": "تشيد به وتطلب المزيد", "en": "Praise him and ask for more"}, {"ar": "تتجاهل", "en": "Ignore it"}, {"ar": "تنتظر انهياره", "en": "Wait for him to break down"}, {"ar": "تتحدّث معه بشأن العبء والتوازن وتعيد توزيع المهام وتذكّره بموارد الدعم", "en": "Discuss workload and balance, redistribute tasks, and point to support resources"}], "a": 3, "why": {"ar": "رعاية رفاه الموظف واستدامة الأداء تقتضي معالجة العبء لا استغلال التفاني.", "en": "Employee wellbeing and sustainable performance require addressing workload, not exploiting dedication."}}, {"sc": {"ar": "يُكتشف تسرّب في بيانات موظفين حسّاسة. ما أفضل تصرّف أولاً؟", "en": "A breach of sensitive employee data is discovered. BEST first action?"}, "opts": [{"ar": "احتواء الخرق وتقييم الأثر وإخطار المتأثّرين والامتثال لمتطلّبات الإبلاغ", "en": "Contain the breach, assess impact, notify affected parties, and comply with reporting requirements"}, {"ar": "إخفاء الأمر", "en": "Hide it"}, {"ar": "لوم قسم IT علناً", "en": "Publicly blame IT"}, {"ar": "الانتظار", "en": "Wait"}], "a": 0, "why": {"ar": "الاستجابة للحوادث تبدأ بالاحتواء والتقييم والإخطار والامتثال لا بالإخفاء.", "en": "Incident response starts with containment, assessment, notification, and compliance, not concealment."}}, {"sc": {"ar": "يشعر فريق بأن المدير يمنح المناوبات المفضّلة لمقرّبين منه. ما أفضل تصرّف؟", "en": "A team feels the manager gives preferred shifts to his favorites. BEST action?"}, "opts": [{"ar": "تتجاهل الإدراك", "en": "Ignore the perception"}, {"ar": "تراجع معايير الجدولة وتضع نظاماً شفّافاً وعادلاً", "en": "Review scheduling criteria and set a transparent, fair system"}, {"ar": "تعاقب المشتكين", "en": "Punish the complainers"}, {"ar": "تنقل المدير", "en": "Transfer the manager"}], "a": 1, "why": {"ar": "الإنصاف المُدرَك مهم؛ معايير شفّافة للجدولة تعالج المحاباة الحقيقية أو المتصوَّرة.", "en": "Perceived fairness matters; transparent scheduling criteria address real or perceived favoritism."}}, {"sc": {"ar": "تكشف عدة مقابلات خروج شكوى متكرّرة من مدير واحد. ما أفضل تصرّف؟", "en": "Several exit interviews reveal , "en": "Explain the limits of confidentiality and the duty to investigate while protecting the employee"}], "a": 3, "why": {"ar": "لا يمكن ضمان سرّية تامة تمنع التحقيق؛ يُوازَن الواجب مع حماية الموظف من الانتقام.", "en": "Full secrecy that blocks investigation cannot be promised; balance the duty with protecting the employee from retaliation."}}, {"sc": {"ar": "يقدّم مورّد لك هدية قيّمة أثناء التفاوض على عقد خدمات HR. ما أفضل تصرّف؟", "en": "A vendor offers you a valuable gift during an HR services contract negotiation. BEST action?"}, "opts": [{"ar": "ترفضها بلباقة أو تفصح عنها وفق سياسة الأخلاقيات لتجنّب تضارب المصالح", "en": "Politely decline or disclose it per the ethics policy to avoid a conflict of interest"}, {"ar": "تقبلها بصمت", "en": "Accept it quietly"}, {"ar": "تطلب أكثر", "en": "Ask for more"}, {"ar": "تقبلها وتوقّع العقد", "en": "Accept it and sign the contract"}], "a": 0, "why": {"ar": "قبول هدية مؤثّرة أثناء التفاوض تضارب مصالح؛ الرفض أو الإفصاح يحفظ النزاهة.", "en": "Accepting an influential gift during negotiation is a conflict of interest; declining or disclosing preserves integrity."}}, {"sc": {"ar": "تلاحظ أن أداة فرز بالذكاء الاصطناعي تستبعد نسبة عالية من كبار السن. ما أفضل تصرّف؟", "en": "You notice an AI screening tool rejects a high share of older applicants. BEST action?"}, "opts": [{"ar": "تثق بالأداة", "en": "Trust the tool"}, {"ar": "توقف/تراجع الأداة لاحتمال تحيّز وأثر متباين وتُدقّق معاييرها", "en": "Pause/audit the tool for possible bias and adverse impact and review its criteria"}, {"ar": "تتجاهل", "en": "Ignore it"}, {"ar": "تزيد الاعتماد عليها", "en": "Rely on it more"}], "a": 1, "why": {"ar": "قد تُنتج الخوارزميات أثراً متبايناً؛ التدقيق واجب لتجنّب التمييز (ADEA).", "en": "Algorithms can produce adverse impact; auditing is required to avoid discrimination (ADEA)."}}, {"sc": {"ar": "يتصاعد خلاف بين موظفَين إلى صراخ أمام العملاء. ما أفضل تصرّف فوري؟", "en": "A dispute between two employees escalates to shouting in front of clients  "تتجاهل", "en": "Ignore it"}, {"ar": "تضخّم قليلاً فقط", "en": "Inflate just a little"}, {"ar": "ترفض بوضوح فالتلاعب بالبيانات مخالف للنزاهة، وتقترح تحسيناً حقيقياً", "en": "Clearly refuse, since data manipulation violates integrity, and propose genuine improvement"}], "a": 3, "why": {"ar": "التلاعب بالبيانات خرق للنزاهة المهنية مهما كان المبرّر.", "en": "Data manipulation breaches professional integrity regardless of the justification."}}];
const KEY='shrm-quest-v1';
let st=Object.assign({xp:0,done:{},streak:0,lastDay:null,lang:'ar'},JSON.parse(localStorage.getItem(KEY)||'{}'));
function persist(){localStorage.setItem(KEY,JSON.stringify(st));}
(function(){const t=new Date().toDateString();if(st.lastDay!==t){const y=new Date(Date.now()-864e5).toDateString();st.streak=(st.lastDay===y)?(st.streak||0)+1:1;st.lastDay=t;persist();}})();
let cur={ch:null,realm:null,i:0,ok:0,tot:0,hearts:5,ans:false};
const L_=()=>T[st.lang];

/* ═══════════ HELPERS ═══════════ */
function rankFor(xp){let r=RANKS[0];for(const x of RANKS)if(xp>=x.xp)r=x;return r;}
function nextRank(xp){return RANKS.find(x=>x.xp>xp);}
function lvl(){return Math.floor(st.xp/100)+1;}
function tr(o){return o[st.lang];}

function applyLang(){
 document.documentElement.lang=st.lang;document.documentElement.dir=st.lang==='ar'?'rtl':'ltr';
 document.getElementById('langLbl').textContent=st.lang==='ar'?'EN':'ع';
 renderLanding();
}
function toggleLang(){st.lang=st.lang==='ar'?'en':'ar';persist();applyLang();
 if(document.getElementById('s-map').classList.contains('on'))renderMap();
 if(document.getElementById('s-play').classList.contains('on'))renderSeg();
}

function hud(){document.getElementById('hXp').textContent=st.xp;document.getElementById('hStreak').textContent=st.streak||0;document.getElementById('hHeart').textContent=cur.hearts;}
function go(s){try{if(typeof mock!=='undefined'&&mock&&mock.timer&&s!=='mock'&&s!=='res'){clearInterval(mock.timer);mock.timer=null;}}catch(e){}document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById('s-'+s).classList.add('on');window.scrollTo(0,0);if(s==='map')renderMap();if(s==='land')renderLanding();hud();}

/* ═══════════ LANDING ═══════════ */
function renderLanding(){
 const t=L_();
 document.getElementById('title').textContent=t.title;
 document.getElementById('tagline').textContent=t.tag;
 document.getElementById('ringLbl').textContent=t.level;document.getElementById('ringLv').textContent=lvl();
 const into=st.xp%100;document.getElementById('ringFill').style.strokeDashoffset=327-(327*into/100);
 const r=rankFor(st.xp),nx=nextRank(st.xp);
 document.getElementById('rankName').textContent='🏅 '+tr(r);
 document.getElementById('rankNext').textContent=nx?((nx.xp-st.xp)+' ✦ '+t.nextRank):'★ MAX';
 const started=Object.keys(st.done).length>0;
 document.getElementById('btnStart').textContent=started?t.cont:t.start;
 document.getElementById('btnSJI').textContent=t.sjiStart;
 document.getElementById('btnRev').innerHTML=t.review+'<br><small style="opacity:.55;font-weight:400">'+Object.keys(st.wrong||{}).length+' '+t.reviewN+'</small>';
 document.getElementById('btnHeat').textContent=t.heatmap;
 document.getElementById('btnQuiz').textContent=t.quiz;
 document.getElementById('btnMock').textContent=t.mock;
 document.getElementById('btnCard').textContent=t.card;
 document.getElementById('collTitle').textContent=t.collTitle;
 document.getElementById('collRef').textContent=t.collRef;
 document.getElementById('collPlan').textContent=t.collPlan;
 document.getElementById('collCards').textContent=t.collCards;
 document.getElementById('collGame').textContent=t.collGame;
 document.getElementById('creditLine').innerHTML=t.credit;
 var hb=document.getElementById('homeBtn');if(hb)hb.textContent=t.home;
 const f=st.lang==='ar'?['🌐 باللغتين','🏅 رُتب مهنية','🔥 سلسلة يومية','✦ مستويات']:['🌐 Bilingual','🏅 Career ranks','🔥 Daily streak','✦ Levels'];
 document.getElementById('featRow').innerHTML=f.map(x=>`<span>${x}</span>`).join('');
}

/* ═══════════ MAP ═══════════ */
function chDone(c){return !!st.done[c.id];}
function realmPct(w){const n=w.chapters.length,d=w.chapters.filter(chDone).length;return Math.round(d/n*100);}
function renderMap(){
 const t=L_();document.getElementById('mapTitle').textContent=t.map;
 {var mb=document.getElementById('mapBack');if(mb)mb.textContent='← '+t.back;}
 document.getElementById('mapFoot').innerHTML=t.foot+' · <a href="https://shrm-arabic-hub.netlify.app/">Hub ↩</a>';
 const host=document.getElementById('realms');host.innerHTML='';
 WORLDS.forEach(w=>{
  const pct=realmPct(w);
  const el=document.createElement('div');el.className='realm';el.style.setProperty('--rc',w.c);el.style.setProperty('--rcl',w.cl);
  let chaps='';
  w.chapters.forEach((c,i)=>{
   const done=chDone(c);const locked=false;
   const nq=c.segs.filter(s=>s.t==='q').length;
   const sub=done?('⭐ '+nq+' '+(st.lang==='ar'?'سؤال':'Q')):(locked?t.locked:(c.boss?('👹 '+t.boss):nq+' '+(st.lang==='ar'?'سؤال':'Q')));
   chaps+=`<div class="chap ${done?'done':''} ${c.boss?'boss':''} ${locked?'locked':''}" ${locked?'':`onclick="start('${w.id}','${c.id}')"`}>
     <div class="cnode">${done?'✓':c.icon}</div>
     <div class="cinfo"><b>${tr({ar:c.ar,en:c.en})}</b><small>${sub}</small></div>
     <div class="cgo">${done?'⭐':(locked?'🔒':'▶')}</div></div>`;
  });
  el.innerHTML=`<div class="rtop"><div class="ric">${w.icon}</div><div><div class="rname">${tr({ar:w.ar,en:w.en})}</div><div class="rsub">${tr({ar:w.sub_ar,en:w.sub_en})} · ${w.chapters.length} ${t.chapters}</div></div></div>
   <div class="rbar"><span style="width:${pct}%"></span></div><div class="rpct">${pct}%</div>${chaps}`;
  host.appendChild(el);
 });
}

/* ═══════════ PLAY ═══════════ */
function start(wid,cid){const w=WORLDS.find(x=>x.id===wid);const c=w.chapters.find(x=>x.id===cid);
 cur={ch:c,realm:w,i:0,ok:0,tot:0,hearts:5,ans:false};hud();go('play');renderSeg();}
function renderSeg(){
 const t=L_(),segs=cur.ch.segs,s=segs[cur.i];
 document.getElementById('pfill').style.width=Math.round(cur.i/segs.length*100)+'%';
 const host=document.getElementById('host');
 if(s.t==='t'){
  host.innerHTML=`<div class="card"><span class="tag t">📖 ${t.teach}</span><h2>${tr(s.h)}</h2><div class="body">${tr(s.body)}</div>
    <button class="btn btn-go" onclick="nextSeg()">${t.next} →</button></div>`;
 }else{
  cur.ans=false;
  host.innerHTML=`<div class="card"><span class="tag q">❓ ${t.question}</span><div class="qtext">${tr(s.q)}</div>
   <div class="opts" id="opts">${s.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})">${tr(o)}</button>`).join('')}</div>
   <div class="fb" id="fb"></div><button class="btn btn-dis" id="cb" disabled>${t.choose}</button></div>`;
 }
}
function answer(i){
 if(cur.ans)return;cur.ans=true;const t=L_(),s=cur.ch.segs[cur.i],opts=[...document.querySelectorAll('#opts .opt')];
 opts.forEach(o=>o.disabled=true);const ok=i===s.a;cur.tot++;trackAns(cur.ch.id,cur.i,ok);
 opts[i].classList.add(ok?'correct':'wrong');if(!ok)opts[s.a].classList.add('correct');
 const fb=document.getElementById('fb');
 if(ok){cur.ok++;st.xp+=10;persist();fb.className='fb ok show';fb.innerHTML='<b>✅ '+t.correct+' +10 ✦</b>'+tr(s.ex);}
 else{cur.hearts--;fb.className='fb no show';fb.innerHTML='<b>❌ '+t.incorrect+'</b>'+tr(s.ex);}
 hud();const cb=document.getElementById('cb');cb.disabled=false;cb.className='btn '+(ok?'btn-ok':'btn-go');cb.textContent=t.next+' →';
 cb.onclick=()=>{if(cur.hearts<=0)return fail();nextSeg();};
}
function nextSeg(){cur.i++;if(cur.i>=cur.ch.segs.length)return complete();renderSeg();}
function quit(){if(confirm(L_().quit))go('map');}
function complete(){
 const t=L_(),first=!st.done[cur.ch.id];const before=rankFor(st.xp);
 if(first)st.xp+=25;st.done[cur.ch.id]=true;persist();const after=rankFor(st.xp);hud();
 const acc=cur.tot?Math.round(cur.ok/cur.tot*100):100;confetti();
 const up=(after!==before)?`<div class="up">🎖️ <b>${t.rankUp} ${tr(after)}</b></div>`:'';
 document.getElementById('s-res').innerHTML=`<div class="res"><div class="big">${cur.ch.boss?'👑':'🏆'}</div>
  <h2>${t.complete}</h2><p>${tr({ar:cur.ch.ar,en:cur.ch.en})}</p>${up}
  <div class="rs"><div><div class="n">${cur.ok}/${cur.tot}</div><div class="l">${t.right}</div></div>
   <div><div class="n">${acc}%</div><div class="l">${t.acc}</div></div>
   <div><div class="n">+${cur.ok*10+(first?25:0)}</div><div class="l">${t.pts}</div></div></div>
  <button class="btn btn-ok" onclick="go('map')">${t.toMap} →</button></div>`;
 go('res');
}
function fail(){const t=L_();document.getElementById('s-res').innerHTML=`<div class="res"><div class="big">💔</div>
  <h2>${t.outHearts}</h2><p>${t.outMsg}</p>
  <button class="btn btn-ok" onclick="start(cur.realm.id,cur.ch.id)">${t.retry} ↻</button>
  <button class="btn btn-go" onclick="go('map')">${t.toMap}</button></div>`;go('res');}
function confetti(){const e=['🎉','✦','🏅','✨','🎊','👑'];for(let i=0;i<26;i++){const c=document.createElement('div');c.className='conf';c.textContent=e[i%e.length];c.style.left=Math.random()*100+'vw';c.style.animationDuration=(2+Math.random()*2)+'s';c.style.fontSize=(13+Math.random()*16)+'px';document.body.appendChild(c);setTimeout(()=>c.remove(),4200);}}

let sji={i:0,ok:0,tot:0,ans:false};
function startSJI(){sji={i:0,ok:0,tot:0,ans:false,items:SJI.slice()};for(var qk=sji.items.length-1;qk>0;qk--){var qj=Math.floor(Math.random()*(qk+1));var qt=sji.items[qk];sji.items[qk]=sji.items[qj];sji.items[qj]=qt;}go('play');renderSJIcard();}
function renderSJIcard(){const t=L_(),it=sji.items[sji.i];document.getElementById('pfill').style.width=Math.round(sji.i/sji.items.length*100)+'%';document.getElementById('host').innerHTML='<div class="card"><span class="tag q">\ud83c\udfaf '+t.sji+' '+(sji.i+1)+'/'+sji.items.length+'</span><div class="qtext">'+tr(it.sc)+'</div><div class="opts" id="opts">'+it.opts.map(function(o,i){return '<button class="opt" onclick="sjiAns('+i+')">'+tr(o)+'</button>';}).join('')+'</div><div class="fb" id="fb"></div><button class="btn btn-dis" id="cb" disabled>'+t.choose+'</button></div>';sji.ans=false;}
function sjiAns(i){if(sji.ans)return;sji.ans=true;const t=L_(),it=sji.items[sji.i],opts=[].slice.call(document.querySelectorAll('#opts .opt'));opts.forEach(function(o){o.disabled=true;});const ok=i===it.a;sji.tot++;opts[i].classList.add(ok?'correct':'wrong');if(!ok)opts[it.a].classList.add('correct');const fb=document.getElementById('fb');if(ok){sji.ok++;st.xp+=15;persist();fb.className='fb ok show';fb.innerHTML='<b>\u2705 '+t.sjiBest+' +15 \u2726</b>'+tr(it.why);}else{fb.className='fb no show';fb.innerHTML='<b>\u21aa '+t.sjiBest2+'</b>'+tr(it.why);}hud();const cb=document.getElementById('cb');cb.disabled=false;cb.className='btn '+(ok?'btn-ok':'btn-go');cb.textContent=t.next+' \u2192';cb.onclick=function(){sji.i++;if(sji.i>=sji.items.length)return sjiDone();renderSJIcard();};}
function sjiDone(){const t=L_();const acc=sji.tot?Math.round(sji.ok/sji.tot*100):0;confetti();document.getElementById('s-res').innerHTML='<div class="res"><div class="big">\ud83c\udfaf</div><h2>'+t.sjiResult+'</h2><div class="rs"><div><div class="n">'+sji.ok+'/'+sji.tot+'</div><div class="l">'+t.right+'</div></div><div><div class="n">'+acc+'%</div><div class="l">'+t.acc+'</div></div></div><button class="btn btn-ok" onclick="go(\'land\')">\u2190</button></div>';go('res');}

function trackAns(cid,si,ok){st.stats=st.stats||{};var s=st.stats[cid]||{s:0,c:0};s.s++;if(ok)s.c++;st.stats[cid]=s;st.wrong=st.wrong||{};var k=cid+'|'+si;if(ok){if(st.wrong[k])delete st.wrong[k];}else{st.wrong[k]=1;}persist();}
function findChap(cid){for(var wi=0;wi<WORLDS.length;wi++){var cs=WORLDS[wi].chapters;for(var ci=0;ci<cs.length;ci++){if(cs[ci].id===cid)return cs[ci];}}return null;}
let sess={list:[],i:0,ok:0,tot:0,ans:false,mode:''};
function playSession(list,mode){if(!list.length)return;sess={list:list,i:0,ok:0,tot:0,ans:false,mode:mode};go('play');renderSess();}
function renderSess(){var t=L_(),it=sess.list[sess.i],q=it.q;document.getElementById('pfill').style.width=Math.round(sess.i/sess.list.length*100)+'%';var tag=sess.mode==='review'?('\ud83d\udd01 '+t.reviewTag):('\ud83c\udfb2 '+t.quizTag);document.getElementById('host').innerHTML='<div class="card"><span class="tag q">'+tag+' '+(sess.i+1)+'/'+sess.list.length+'</span><div class="qtext">'+tr(q.q)+'</div><div class="opts" id="opts">'+q.opts.map(function(o,i){return '<button class="opt" onclick="sessAns('+i+')">'+tr(o)+'</button>';}).join('')+'</div><div class="fb" id="fb"></div><button class="btn btn-dis" id="cb" disabled>'+t.choose+'</button></div>';sess.ans=false;}
function sessAns(i){if(sess.ans)return;sess.ans=true;var t=L_(),it=sess.list[sess.i],q=it.q,opts=[].slice.call(document.querySelectorAll('#opts .opt'));opts.forEach(function(o){o.disabled=true;});var ok=i===q.a;sess.tot++;opts[i].classList.add(ok?'correct':'wrong');if(!ok)opts[q.a].classList.add('correct');trackAns(it.cid,it.si,ok);var fb=document.getElementById('fb');if(ok){sess.ok++;st.xp+=10;persist();fb.className='fb ok show';fb.innerHTML='<b>\u2705 '+t.correct+' +10 \u2726</b>'+tr(q.ex);}else{fb.className='fb no show';fb.innerHTML='<b>\u274c '+t.incorrect+'</b>'+tr(q.ex);}hud();var cb=document.getElementById('cb');cb.disabled=false;cb.className='btn '+(ok?'btn-ok':'btn-go');cb.textContent=t.next+' \u2192';cb.onclick=function(){sess.i++;if(sess.i>=sess.list.length)return sessDone();renderSess();};}
function sessDone(){var t=L_();var acc=sess.tot?Math.round(sess.ok/sess.tot*100):0;confetti();document.getElementById('s-res').innerHTML='<div class="res"><div class="big">\ud83c\udf93</div><h2>'+t.sessDoneL+'</h2><div class="rs"><div><div class="n">'+sess.ok+'/'+sess.tot+'</div><div class="l">'+t.right+'</div></div><div><div class="n">'+acc+'%</div><div class="l">'+t.acc+'</div></div></div><button class="btn btn-ok" onclick="go(\'land\')">\u2190</button></div>';go('res');}
function startReview(){var keys=Object.keys(st.wrong||{}),list=[];keys.forEach(function(k){var p=k.split('|'),c=findChap(p[0]);if(c){var q=c.segs[+p[1]];if(q&&q.t==='q')list.push({cid:p[0],si:+p[1],q:q});}});if(!list.length){alert(L_().reviewEmpty);return;}playSession(list,'review');}
function startQuiz(n){var all=[];WORLDS.forEach(function(w){w.chapters.forEach(function(c){c.segs.forEach(function(s,i){if(s.t==='q')all.push({cid:c.id,si:i,q:s});});});});for(var k=all.length-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var tmp=all[k];all[k]=all[j];all[j]=tmp;}playSession(all.slice(0,n),'quiz');}
function renderHeat(){var t=L_();document.getElementById('heatTitle').textContent=t.heatTitle;var html='';WORLDS.forEach(function(w){html+='<div class="realm" style="--rc:'+w.c+'"><div class="rtop"><div class="ric" style="background:'+w.cl+'">'+w.icon+'</div><div class="rname">'+tr({ar:w.ar,en:w.en})+'</div></div>';w.chapters.forEach(function(c){var s2=(st.stats||{})[c.id];var acc=(s2&&s2.s)?Math.round(s2.c/s2.s*100):-1;var col=acc<0?'rgba(255,255,255,.15)':(acc<60?'#e8556b':(acc<80?'#e0a93b':'#22c08a'));var lbl=acc<0?t.noData:acc+'%';html+='<div class="hrow"><span class="hname">'+tr({ar:c.ar,en:c.en})+'</span><span class="hbar"><span style="width:'+(acc<0?0:acc)+'%;background:'+col+'"></span></span><span class="hpct" style="color:'+col+'">'+lbl+'</span></div>';});html+='</div>';});document.getElementById('heatBody').innerHTML=html;}
function openHeat(){renderHeat();go('heat');}

let mock={list:[],i:0,ans:[],rem:0,timer:null};
function startMock(){var all=[];WORLDS.forEach(function(w){w.chapters.forEach(function(c){c.segs.forEach(function(s,i){if(s.t==='q')all.push({cid:c.id,si:i,q:s});});});});for(var k=all.length-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var tmp=all[k];all[k]=all[j];all[j]=tmp;}mock={list:all.slice(0,Math.min(134,all.length)),i:0,ans:[],rem:220*60,timer:null};go('mock');mock.timer=setInterval(mockTick,1000);updTimer();renderMock();}
function mockTick(){mock.rem--;updTimer();if(mock.rem<=0){clearInterval(mock.timer);mock.timer=null;mockSubmit();}}
function updTimer(){var m=Math.floor(mock.rem/60),s=mock.rem%60;var el=document.getElementById('mockTimer');if(el)el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
function renderMock(){var t=L_(),it=mock.list[mock.i],q=it.q;document.getElementById('mockProg').textContent=(mock.i+1)+' / '+mock.list.length;document.getElementById('mockFin').textContent=t.finish;var sel=mock.ans[mock.i];document.getElementById('mockHost').innerHTML='<div class="card"><span class="tag q">'+t.mockTag+'</span><div class="qtext">'+tr(q.q)+'</div><div class="opts" id="opts">'+q.opts.map(function(o,i){return '<button class="opt'+(sel===i?' sel':'')+'" onclick="mockPick('+i+')">'+tr(o)+'</button>';}).join('')+'</div><button class="btn '+(sel===undefined?'btn-dis':'btn-go')+'" id="mnext" '+(sel===undefined?'disabled':'')+' onclick="mockNext()">'+(mock.i>=mock.list.length-1?t.finish:(t.next+' \u2192'))+'</button></div>';}
function mockPick(i){mock.ans[mock.i]=i;renderMock();}
function mockNext(){if(mock.ans[mock.i]===undefined)return;mock.i++;if(mock.i>=mock.list.length)return mockSubmit();renderMock();}
function mockSubmit(){if(mock.timer){clearInterval(mock.timer);mock.timer=null;}var ok=0;mock.list.forEach(function(it,idx){var correct=mock.ans[idx]===it.q.a;if(correct)ok++;if(mock.ans[idx]!==undefined)trackAns(it.cid,it.si,correct);});var pct=Math.round(ok/mock.list.length*100);var t=L_();var info=pct>=80?{l:t.passHigh,c:'#22c08a'}:(pct>=70?{l:t.passLikely,c:'#7fd63f'}:(pct>=60?{l:t.passBorder,c:'#e0a93b'}:{l:t.passLow,c:'#e8556b'}));confetti();document.getElementById('s-res').innerHTML='<div class="res"><div class="big">\ud83d\udcdd</div><h2>'+t.mockResult+'</h2><div class="rs"><div><div class="n">'+ok+'/'+mock.list.length+'</div><div class="l">'+t.right+'</div></div><div><div class="n">'+pct+'%</div><div class="l">'+t.acc+'</div></div></div><div style="margin:8px 0 4px;font-size:.8rem;color:var(--muted)">'+t.passLabel+' \u00b7 '+(st.lang==='ar'?'\u0639\u062a\u0628\u0629 \u0627\u0644\u0646\u062c\u0627\u062d \u224870%':'pass \u224870%')+'</div><div class="pmeter"><span style="width:'+pct+'%;background:'+info.c+'"></span><i style="left:70%"></i></div><div style="font-weight:900;font-size:1.2rem;color:'+info.c+';margin:12px 0 20px">'+info.l+'</div><button class="btn btn-ok" onclick="go(\'land\')">\u2190</button></div>';go('res');}

function rankNow(){var r=RANKS[0];for(var i=0;i<RANKS.length;i++){if(st.xp>=RANKS[i].xp)r=RANKS[i];}return r;}
function cardStats(){var stt=st.stats||{},s=0,c=0,topics=0;for(var k in stt){topics++;s+=stt[k].s;c+=stt[k].c;}return{topics:topics,acc:s?Math.round(c/s*100):0};}
function rr2(x,px,py,w,hh,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+hh,r);x.arcTo(px+w,py+hh,px,py+hh,r);x.arcTo(px,py+hh,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function drawCard(){var cv=document.getElementById('cardCanvas'),x=cv.getContext('2d'),W=900,H=472;var g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#171b30');g.addColorStop(1,'#0b0d18');x.fillStyle=g;x.fillRect(0,0,W,H);var rg=x.createRadialGradient(W-150,80,10,W-150,80,260);rg.addColorStop(0,'rgba(212,175,55,.20)');rg.addColorStop(1,'rgba(212,175,55,0)');x.fillStyle=rg;x.fillRect(0,0,W,H);x.strokeStyle='rgba(212,175,55,.55)';x.lineWidth=3;x.strokeRect(16,16,W-32,H-32);x.textAlign='left';x.fillStyle='#e6c34d';x.font='700 22px Outfit,Arial,sans-serif';x.fillText('\u2605 HR MASTERY QUEST  \u00b7  SHRM-CP PREP',54,74);var r=rankNow(),s=cardStats();var nm=(st.name||'').trim();if(nm){x.fillStyle='#ffffff';x.font='800 50px Outfit,Arial,sans-serif';x.fillText(nm,54,150);x.fillStyle='#e6c34d';x.font='700 23px Outfit,Arial,sans-serif';x.fillText(r.en+'  \u00b7  Level '+lvl(),54,188);}else{x.fillStyle='#ffffff';x.font='800 46px Outfit,Arial,sans-serif';x.fillText(r.en,54,152);x.fillStyle='#e6c34d';x.font='700 23px Outfit,Arial,sans-serif';x.fillText('Level '+lvl(),54,188);}var items=[[String(st.xp),'XP'],[String(s.topics),'Topics'],[s.acc+'%','Accuracy']];var bw=248,bh=112,gap=14,bx=54,by=300;items.forEach(function(it,i){var px=bx+i*(bw+gap);x.fillStyle='rgba(255,255,255,.05)';rr2(x,px,by,bw,bh,16);x.fill();x.strokeStyle='rgba(212,175,55,.25)';x.lineWidth=1;rr2(x,px,by,bw,bh,16);x.stroke();x.fillStyle='#f2c94c';x.font='800 46px Outfit,Arial,sans-serif';x.textAlign='center';x.fillText(it[0],px+bw/2,by+60);x.fillStyle='#aeb2c8';x.font='600 18px Outfit,Arial,sans-serif';x.fillText(it[1],px+bw/2,by+92);});x.textAlign='left';x.fillStyle='rgba(255,255,255,.42)';x.font='500 15px Outfit,Arial,sans-serif';x.fillText('shrm-arabic-hub.netlify.app  \u00b7  bilingual AR / EN',54,H-30);}
function setCardName(v){st.name=v;persist();drawCard();}
function openCard(){var t=L_();var ni=document.getElementById('cardName');if(ni){ni.value=st.name||'';ni.placeholder=t.namePh;}drawCard();document.getElementById('cardTitle').textContent=t.cardTitle;document.getElementById('cardDl').textContent=t.cardDl;document.getElementById('cardCopy').textContent=t.cardCopy;document.getElementById('cardHint').textContent=t.cardHint;go('card');}
function downloadCard(){var cv=document.getElementById('cardCanvas');var a=document.createElement('a');a.download='HR-Mastery-Quest.png';a.href=cv.toDataURL('image/png');a.click();}
function copyPost(){var r=rankNow(),s=cardStats();var nm=(st.name||'').trim();var post='\ud83c\udf93 '+(nm?nm+' \u2014 ':'')+'On my journey to SHRM-CP certification!\n\nCurrently '+r.en+' (Level '+lvl()+') with '+st.xp+' XP, having practiced '+s.topics+' HR topics at ~'+s.acc+'% accuracy on my bilingual HR Mastery Quest.\n\nInvesting in HR expertise, one level at a time. \ud83d\udcaa\n\n#SHRM #SHRMCP #HR #HumanResources #CertificationJourney #LifelongLearning\n\n\u2014\u2014\u2014\n'+(nm?nm+' \u2014 ':'')+'\ud83c\udf93 \u0641\u064a \u0637\u0631\u064a\u0642\u064a \u0644\u0634\u0647\u0627\u062f\u0629 SHRM-CP!\n\u0631\u062a\u0628\u062a\u064a \u0627\u0644\u062d\u0627\u0644\u064a\u0629: '+r.ar+' \u2014 \u0627\u0644\u0645\u0633\u062a\u0648\u0649 '+lvl()+' \u0628\u0640'+st.xp+' \u0646\u0642\u0637\u0629 \u062e\u0628\u0631\u0629\u060c \u0648\u062a\u062f\u0631\u0651\u0628\u062a \u0639\u0644\u0649 '+s.topics+' \u0645\u0648\u0636\u0648\u0639\u0627\u064b \u0641\u064a \u0627\u0644\u0645\u0648\u0627\u0631\u062f \u0627\u0644\u0628\u0634\u0631\u064a\u0629 \u0628\u062f\u0642\u0651\u0629 ~'+s.acc+'\u066a \u0639\u0628\u0631 \u0631\u062d\u0644\u0629 \u0625\u062a\u0642\u0627\u0646 \u0627\u0644\u0645\u0648\u0627\u0631\u062f \u0627\u0644\u0628\u0634\u0631\u064a\u0629.';if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(post).then(function(){alert(L_().cardCopied);},function(){prompt('copy:',post);});}else{prompt('copy:',post);}}

applyLang();hud();
</script>
