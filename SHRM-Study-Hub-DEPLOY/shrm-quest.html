<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Mastery Quest · رحلة إتقان الموارد البشرية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0d1b2e;--navy2:#11243f;--gold:#d4af37;--gold2:#f0d77b;
  --green:#22c08a;--red:#e8556b;--blue:#4a90e2;--purple:#9b6dff;
  --ink:#0d1b2e;--paper:#fbf9f4;--muted:#8b93a3;--line:rgba(255,255,255,.1);
}
html[lang="en"]{--font:'Outfit',sans-serif;}
body{font-family:'Tajawal','Outfit',sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#16304f,#0d1b2e 60%);color:#fff;min-height:100vh;overflow-x:hidden;}
html[dir=ltr] body{font-family:'Outfit','Tajawal',sans-serif;}
.app{max-width:540px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:40px;}

/* HUD */
.hud{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(10,22,40,.75);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hud .grp{display:flex;gap:7px;align-items:center;}
.pill{display:flex;align-items:center;gap:5px;font-weight:800;font-size:13px;background:rgba(255,255,255,.07);padding:5px 10px;border-radius:30px;font-family:'Outfit',sans-serif;}
.pill.xp{color:var(--gold2);}.pill.heart{color:#ff9aa8;}.pill.streak{color:#ffd27a;}
.langbtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;font-weight:800;font-size:12px;padding:6px 12px;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.iconbtn{background:none;border:none;color:#fff;font-size:19px;cursor:pointer;opacity:.85;}

.screen{display:none;padding:18px 16px;animation:fade .4s ease;}
.screen.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.18);}100%{transform:scale(1);}}

/* LANDING */
.land{text-align:center;padding:30px 16px;}
.crest{width:96px;height:96px;margin:6px auto 14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#1c3a5e,#0d1b2e);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 0 40px rgba(212,175,55,.3);animation:pop .6s;}
.land h1{font-family:'Outfit',sans-serif;font-size:1.9rem;font-weight:900;letter-spacing:.5px;background:linear-gradient(135deg,#fff,var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.land .tag{color:var(--muted);font-size:.96rem;margin:8px auto 22px;max-width:420px;}
.rankcard{background:linear-gradient(135deg,rgba(212,175,55,.12),rgba(255,255,255,.04));border:1px solid rgba(212,175,55,.3);border-radius:20px;padding:18px;margin:18px 0;}
.rankcard .rk{font-size:1.3rem;font-weight:900;color:var(--gold2);}
.rankcard .rkx{font-size:12px;color:var(--muted);margin-top:2px;}
.ring{position:relative;width:120px;height:120px;margin:6px auto 10px;}
.ring svg{transform:rotate(-90deg);}
.ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .lv{font-size:1.7rem;font-weight:900;font-family:'Outfit',sans-serif;color:#fff;}
.ring .lvl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.cta{display:block;width:100%;border:none;border-radius:16px;padding:16px;font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;margin-top:14px;transition:transform .12s;}
.cta:active{transform:translateY(1px);}
.cta-go{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);box-shadow:0 8px 30px rgba(212,175,55,.35);}
.cta-ghost{background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--line);}
.feat{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px;}
.feat span{font-size:11px;color:var(--muted);background:rgba(255,255,255,.05);padding:5px 11px;border-radius:20px;}

/* MAP */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px;}
.sec-h h2{font-size:1.35rem;font-weight:900;}
.realm{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px;border-top:3px solid var(--rc,var(--gold));}
.realm .rtop{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.realm .ric{width:46px;height:46px;border-radius:13px;background:var(--rcl,#1c3a5e);display:flex;align-items:center;justify-content:center;font-size:23px;}
.realm .rname{font-size:1.1rem;font-weight:900;}
.realm .rsub{font-size:.78rem;color:var(--muted);}
.realm .rbar{height:7px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden;margin:10px 0 4px;}
.realm .rbar>span{display:block;height:100%;background:var(--rc,var(--gold));transition:width .5s;}
.realm .rpct{font-size:11px;color:var(--muted);font-weight:700;}
.chap{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:12px;cursor:pointer;transition:background .15s;margin-top:4px;}
.chap:hover{background:rgba(255,255,255,.04);}
.chap.locked{opacity:.4;cursor:not-allowed;}
.chap .cnode{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,.08);border:2px solid var(--line);flex-shrink:0;}
.chap.done .cnode{background:var(--green);border-color:var(--green);}
.chap.boss .cnode{background:linear-gradient(135deg,#e8556b,#9b6dff);border-color:transparent;}
.chap .cinfo b{font-size:.96rem;}
.chap .cinfo small{display:block;font-size:.72rem;color:var(--muted);}
.chap .cgo{margin-inline-start:auto;font-size:17px;opacity:.7;}

.back{background:none;border:none;color:var(--gold2);font-weight:800;font-size:14px;cursor:pointer;margin-bottom:10px;}

/* PLAY */
.ptop{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.ptop .x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.prog{flex:1;height:13px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden;}
.prog>span{display:block;height:100%;background:linear-gradient(90deg,var(--green),#3fd6a0);transition:width .4s;}
.card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:22px;padding:24px 20px;min-height:230px;animation:fade .3s;}
.tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 12px;border-radius:20px;margin-bottom:14px;font-family:'Outfit',sans-serif;}
.tag.t{background:rgba(74,144,226,.18);color:#8fc0f5;}
.tag.q{background:rgba(212,175,55,.18);color:var(--gold2);}
.card h2{font-size:1.2rem;font-weight:900;margin-bottom:12px;line-height:1.45;}
.body{font-size:1rem;color:#dfe4ec;margin-bottom:10px;line-height:1.7;}
.qtext{font-size:1.12rem;font-weight:800;margin-bottom:18px;line-height:1.55;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:600;cursor:pointer;text-align:start;font-family:inherit;color:#fff;transition:all .15s;}
.opt:active{transform:scale(.99);}
.opt.correct{border-color:var(--green);background:rgba(34,192,138,.16);}
.opt.wrong{border-color:var(--red);background:rgba(232,85,107,.16);}
.fb{margin-top:15px;border-radius:14px;padding:14px;font-size:.92rem;display:none;line-height:1.6;}
.fb.show{display:block;animation:fade .25s;}
.fb.ok{background:rgba(34,192,138,.12);border:1px solid var(--green);}
.fb.no{background:rgba(232,85,107,.12);border:1px solid var(--red);}
.fb b{display:block;margin-bottom:4px;}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:1.05rem;font-weight:800;cursor:pointer;margin-top:15px;}
.btn-go{background:#fff;color:var(--navy);}
.btn-ok{background:var(--green);color:#fff;}
.btn-dis{background:rgba(255,255,255,.12);color:var(--muted);cursor:default;}

/* RESULT */
.res{text-align:center;padding:40px 16px;}
.res .big{font-size:4.2rem;animation:pop .5s;}
.res h2{font-size:1.6rem;font-weight:900;margin:6px 0 6px;}
.res p{color:var(--muted);margin-bottom:22px;}
.res .rs{display:flex;gap:12px;justify-content:center;margin-bottom:22px;}
.res .rs div{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:14px 18px;}
.res .rs .n{font-size:1.5rem;font-weight:900;color:var(--gold2);font-family:'Outfit',sans-serif;}
.res .rs .l{font-size:10px;color:var(--muted);}
.up{background:linear-gradient(135deg,rgba(212,175,55,.15),transparent);border:1px solid var(--gold);border-radius:16px;padding:14px;margin-bottom:18px;}
.up b{color:var(--gold2);}
.conf{position:fixed;top:-10px;font-size:18px;animation:fall linear forwards;z-index:80;pointer-events:none;}
@keyframes fall{to{transform:translateY(106vh) rotate(380deg);opacity:.3;}}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:16px;}
.foot a{color:var(--gold2);}

.lrow{display:flex;gap:8px;margin-top:12px;}
.lbtn{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff;border-radius:14px;padding:11px 6px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;line-height:1.3;}
.lbtn:active{transform:translateY(1px);}
.hrow{display:flex;align-items:center;gap:10px;padding:7px 2px;}
.hname{flex:1;font-size:.86rem;}
.hbar{width:84px;height:8px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden;flex-shrink:0;}
.hbar>span{display:block;height:100%;border-radius:20px;}
.hpct{width:52px;text-align:end;font-size:.78rem;font-weight:800;font-family:'Outfit',sans-serif;}

.mocktop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;padding:8px 4px;}
.mtimer{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.15rem;color:var(--gold2);}
.mprog{font-size:.82rem;color:var(--muted);font-weight:700;}
.mfin{background:var(--red);border:none;color:#fff;border-radius:20px;padding:6px 13px;font-family:inherit;font-weight:800;font-size:.8rem;cursor:pointer;}
.opt.sel{border-color:var(--gold);background:rgba(212,175,55,.14);}
.pmeter{position:relative;height:12px;background:rgba(255,255,255,.08);border-radius:20px;margin:6px auto 4px;max-width:300px;}
.pmeter>span{display:block;height:100%;border-radius:20px;transition:width .6s;}
.pmeter>i{position:absolute;top:-3px;width:2px;height:18px;background:#fff;opacity:.65;}

.coll{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);}
.coll h3{font-size:.9rem;color:var(--gold2);margin:0 0 12px;font-weight:800;}
.collgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.colllink{display:flex;align-items:center;gap:7px;justify-content:center;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:12px 8px;color:#fff;text-decoration:none;font-size:.82rem;font-weight:700;transition:background .15s;}
.colllink:active{background:rgba(212,175,55,.14);}
.credit{margin-top:18px;font-size:.78rem;color:var(--muted);line-height:1.6;}
.credit b{color:var(--gold2);font-weight:800;}
</style>
</head>
<body>
<div class="app">
  <div class="hud">
    <button class="iconbtn" onclick="go('map')" title="Map">🗺️</button>
    <div class="grp">
      <span class="pill streak">🔥 <span id="hStreak">0</span></span>
      <span class="pill xp">✦ <span id="hXp">0</span></span>
      <span class="pill heart">❤ <span id="hHeart">5</span></span>
      <button class="langbtn" onclick="toggleLang()">🌐 <span id="langLbl">EN</span></button>
    </div>
  </div>

  <!-- LANDING -->
  <div class="screen on" id="s-land">
    <div class="land">
      <a href="https://shrm-arabic-hub.netlify.app/" id="homeBtn" style="display:inline-block;margin:0 0 14px;padding:7px 16px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:20px;color:var(--gold2);font-weight:800;font-size:13px;text-decoration:none"></a>
      <div class="crest">🎓</div>
      <h1 id="title"></h1>
      <p class="tag" id="tagline"></p>
      <div class="ring">
        <svg width="120" height="120"><circle cx="60" cy="60" r="52" stroke="rgba(255,255,255,.08)" stroke-width="9" fill="none"/>
          <circle id="ringFill" cx="60" cy="60" r="52" stroke="url(#g)" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/>
          <defs><linearGradient id="g"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f0d77b"/></linearGradient></defs></svg>
        <div class="ctr"><div class="lv" id="ringLv">1</div><div class="lvl" id="ringLbl">LEVEL</div></div>
      </div>
      <div class="rankcard"><div class="rk" id="rankName">—</div><div class="rkx" id="rankNext"></div></div>
      <button class="cta cta-go" onclick="go('map')" id="btnStart"></button>
      <button class="cta cta-ghost" onclick="startSJI()" id="btnSJI" style="margin-top:10px"></button>
      <div class="lrow"><button class="lbtn" onclick="startReview()" id="btnRev"></button><button class="lbtn" onclick="openHeat()" id="btnHeat"></button><button class="lbtn" onclick="startQuiz(20)" id="btnQuiz"></button></div>
      <button class="cta cta-ghost" onclick="startMock()" id="btnMock" style="margin-top:10px"></button>
      <button class="cta cta-ghost" onclick="openCard()" id="btnCard" style="margin-top:10px"></button>
      <div class="feat" id="featRow"></div>
      <div class="coll">
        <h3 id="collTitle"></h3>
        <div class="collgrid">
          <a class="colllink" href="https://shrm-arabic-hub.netlify.app/reference"><span>📚</span><span id="collRef"></span></a>
          <a class="colllink" href="https://shrm-arabic-hub.netlify.app/study-plan"><span>🗓️</span><span id="collPlan"></span></a>
          <a class="colllink" href="https://shrm-arabic-hub.netlify.app/shrm-flash-cards"><span>🃏</span><span id="collCards"></span></a>
          <a class="colllink" href="https://shrm-arabic-hub.netlify.app/game"><span>🎮</span><span id="collGame"></span></a>
        </div>
        <div class="credit" id="creditLine"></div>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="screen" id="s-map">
    <button class="back" onclick="go('land')" id="mapBack">←</button>
    <div class="sec-h"><h2 id="mapTitle"></h2></div>
    <div id="realms"></div>
    <div class="foot" id="mapFoot"></div>
  </div>

  <!-- PLAY -->
  <div class="screen" id="s-play">
    <div class="ptop"><button class="x" onclick="quit()">✕</button><div class="prog"><span id="pfill"></span></div></div>
    <div id="host"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-res"></div>

  <!-- HEATMAP -->
  <div class="screen" id="s-heat">
    <button class="back" onclick="go('land')">←</button>
    <div class="sec-h"><h2 id="heatTitle"></h2></div>
    <div id="heatBody"></div>
  </div>

  <!-- MOCK EXAM -->
  <div class="screen" id="s-mock">
    <div class="mocktop"><span class="mtimer" id="mockTimer">--:--</span><span class="mprog" id="mockProg"></span><button class="mfin" id="mockFin" onclick="mockSubmit()"></button></div>
    <div id="mockHost"></div>
  </div>

  <!-- LINKEDIN CARD -->
  <div class="screen" id="s-card">
    <button class="back" onclick="go('land')">←</button>
    <div class="sec-h"><h2 id="cardTitle"></h2></div>
    <div style="text-align:center">
      <input id="cardName" type="text" maxlength="28" oninput="setCardName(this.value)" style="width:100%;max-width:440px;box-sizing:border-box;margin:0 auto 12px;display:block;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:#fff;font-family:inherit;font-size:.95rem;text-align:center">
      <canvas id="cardCanvas" width="900" height="472" style="width:100%;max-width:440px;border-radius:16px;border:1px solid var(--line)"></canvas>
      <div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-go" style="flex:1" onclick="downloadCard()" id="cardDl"></button><button class="btn btn-ok" style="flex:1" onclick="copyPost()" id="cardCopy"></button></div>
      <div id="cardHint" style="font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.5"></div>
    </div>
  </div>
</div>

const WORLDS=[{"id":"comp","ar":"الكفاءات","en":"Competencies","sub_ar":"الكفاءات السلوكية","sub_en":"Behavioral competencies","icon":"📘","c":"#4a90e2","cl":"#16345a","chapters":[{"id":"comp-lead","ar":"القيادة والتحفيز","en":"Leadership & Motivation","icon":"👑","segs":[{"t":"t","h":{"ar":"القيادة والتحفيز","en":"Leadership & Motivation"},"body":{"ar":"القيادة والتحفيز جوهر الكفاءات السلوكية. تطوّرت نظريات القيادة من «السمات» (القائد يُولد بصفات) إلى «السلوكية» (شبكة بليك-موتون) إلى «الظرفية» التي تربط الأسلوب بالموقف ونضج الموظف. وتتقاطع معها أساليب جولمان القائمة على الذكاء العاطفي، والقيادة التحويلية التي تُلهم وتغيّر القيم، والقيادة الخادمة التي تضع الفريق أولاً. أمّا التحفيز فيُفسَّر بنظريات المحتوى (ماسلو، هيرزبرغ، ماكليلاند) التي تحدّد «ماذا» يحفّز، ونظريات العملية (فروم، آدامز، لوك) التي تشرح «كيف» تتشكّل الدافعية.","en":"Leadership and motivation are the heart of the behavioral competencies. Leadership theory evolved from trait (leaders are born) to behavioral (the Blake-Mouton grid) to contingency/situational, linking style to the situation and follower readiness. Alongside are Goleman emotional-intelligence styles, transformational leadership that inspires and reshapes values, and servant leadership that puts the team first. Motivation is explained by content theories (Maslow, Herzberg, McClelland) defining what motivates, and process theories (Vroom, Adams, Locke) explaining how motivation forms."}},{"t":"q","q":{"ar":"«نظرية السمات» في القيادة ترى أن القائد:","en":"Trait theory holds that a leader:"},"opts":[{"ar":"يُولد بسمات فطرية مميِّزة","en":"Is born with distinguishing innate traits"},{"ar":"يُصنع بالتدريب فقط","en":"Is made only by training"},{"ar":"لا يحتاج سمات","en":"Needs no traits"}],"a":0,"ex":{"ar":"تركّز على صفات فطرية.","en":"It focuses on innate qualities."}},{"t":"q","q":{"ar":"النمط الأمثل (9,9) في شبكة Blake-Mouton:","en":"The ideal (9,9) style on the Blake-Mouton grid is:"},"opts":[{"ar":"نادي الريف","en":"Country club"},{"ar":"قيادة الفريق","en":"Team leader"},{"ar":"متهالك","en":"Impoverished"}],"a":1,"ex":{"ar":"اهتمام عالٍ بالإنتاج والناس.","en":"High concern for production and people."}},{"t":"q","q":{"ar":"وفق فيدلر، نُحسّن الفعالية بـ:","en":"Per Fiedler, effectiveness improves by:"},"opts":[{"ar":"تغيير شخصية القائد","en":"Changing the leader personality"},{"ar":"تغيير الموظفين","en":"Changing employees"},{"ar":"تغيير الموقف ليلائم الأسلوب الثابت","en":"Changing the situation to fit the fixed style"}],"a":2,"ex":{"ar":"الأسلوب ثابت فنغيّر الموقف.","en":"Style is fixed, so change the situation."}},{"t":"q","q":{"ar":"في نظرية «المسار-الهدف» القائد:","en":"In Path-Goal theory the leader:"},"opts":[{"ar":"يزيل العقبات ويكيّف أسلوبه نحو الهدف","en":"Removes obstacles and adapts style toward the goal"},{"ar":"يصدر أوامر فقط","en":"Only issues orders"},{"ar":"يتجاهل الموظف","en":"Ignores the employee"}],"a":0,"ex":{"ar":"يمهّد الطريق للهدف.","en":"Clears the path to the goal."}},{"t":"q","q":{"ar":"القيادة الظرفية (هيرسي-بلانشارد) تكيّف الأسلوب حسب:","en":"Situational leadership adapts style to:"},"opts":[{"ar":"الأجر","en":"Pay"},{"ar":"جاهزية/نضج الموظف","en":"Follower readiness/maturity"},{"ar":"حجم الشركة","en":"Company size"}],"a":1,"ex":{"ar":"حسب نضج الموظف للمهمة.","en":"To the follower task-readiness."}},{"t":"q","q":{"ar":"القائد الذي يُلهم رؤية ويغيّر قيم فريقه:","en":"A leader who inspires vision and reshapes team values is:"},"opts":[{"ar":"تبادلي","en":"Transactional"},{"ar":"قسري","en":"Coercive"},{"ar":"تحويلي","en":"Transformational"}],"a":2,"ex":{"ar":"القيادة التحويلية تُلهم وتغيّر.","en":"Transformational leadership inspires and changes."}},{"t":"q","q":{"ar":"«القيادة الخادمة» تضع أولاً:","en":"Servant leadership puts first:"},"opts":[{"ar":"نموّ الفريق وتمكينه","en":"Team growth and empowerment"},{"ar":"أرباح المساهمين","en":"Shareholder profit"},{"ar":"سلطة القائد","en":"The leader authority"}],"a":0,"ex":{"ar":"الفريق قبل السلطة.","en":"The team before authority."}},{ ime"}],"a":0,"ex":{"ar":"معادلة ضربية.","en":"A multiplicative model."}},{"t":"q","q":{"ar":"نظرية العدالة (آدامز) تقوم على:","en":"Adams equity theory is based on:"},"opts":[{"ar":"الحاجات الخمس","en":"Five needs"},{"ar":"مقارنة نسبة المخرجات/المدخلات بالآخرين","en":"Comparing one outcome/input ratio to others"},{"ar":"التعزيز","en":"Reinforcement"}],"a":1,"ex":{"ar":"الإحساس بالإنصاف يؤثّر بالدافعية.","en":"Perceived fairness affects motivation."}},{"t":"q","q":{"ar":"حاجات ماكليلاند المكتسبة الثلاث:","en":"McClelland three acquired needs:"},"opts":[{"ar":"الأمان والانتماء والتقدير","en":"Safety, belonging, esteem"},{"ar":"البقاء والنمو","en":"Survival, growth"},{"ar":"الإنجاز والانتماء والسلطة","en":"Achievement, affiliation, power"}],"a":2,"ex":{"ar":"nAch / nAff / nPow.","en":"nAch / nAff / nPow."}},{"t":"q","q":{"ar":"«التعزيز السلبي» (Negative Reinforcement):","en":"Negative reinforcement is:"},"opts":[{"ar":"إزالة مُنفّر لتقوية سلوك (ليس عقاباً)","en":"Removing an aversive to strengthen behavior (not punishment)"},{"ar":"عقاب","en":"Punishment"},{"ar":"إطفاء","en":"Extinction"}],"a":0,"ex":{"ar":"ليس عقاباً بل إزالة مزعج.","en":"Not punishment; removing an aversive."}},{"t":"q","q":{"ar":"نظرية تحديد الأهداف (لوك): الأداء يرتفع بـ:","en":"Goal-setting theory: performance rises with:"},"opts":[{"ar":"أهداف غامضة","en":"Vague goals"},{"ar":"أهداف محدّدة وصعبة (واقعية) مع تغذية راجعة","en":"Specific, difficult-yet-attainable goals with feedback"},{"ar":"غياب الأهداف","en":"No goals"}],"a":1,"ex":{"ar":"أساس أهداف SMART.","en":"The basis of SMART goals."}},{"t":"q","q":{"ar":"الفرق الجوهري بين القائد والمدير:","en":"The core leader-vs-manager distinction:"},"opts":[{"ar":"متطابقان","en":"Identical"},{"ar":"القائد ينفّذ والمدير يُلهم","en":"Leader executes, manager inspires"},{"ar":"القائد يضع الرؤية ويُلهم والمدير ينفّذ ويضبط","en":"Leader sets vision and inspires; manager executes and controls"}],"a":2,"ex":{"ar":"الرؤية مقابل التنفيذ.","en":"Vision versus execution."}},{"t":"q","q":{"ar":"من مكوّنات الذكاء العاطفي (جولمان):","en":"A component of emotional intelligence (Goleman):"},"opts":[{"ar":"الوعي الذاتي وتنظيم الذات والتعاطف","en":"Self-awareness, self-regulation, empathy"},{"ar":"الذكاء الرياضي","en":"Mathematical intelligence"},{"ar":"القوة البدنية","en":"Physical strength"}],"a":0,"ex":{"ar":"الوعي الذاتي ركيزة EI.","en":"Self-awareness is an EI pillar."}},{"t":"q","q":{"ar":"نظرية «تبادل القائد-العضو» (LMX) تركّز على:","en":"Leader-Member Exchange (LMX) focuses on:"},"opts":[{"ar":"سمات القائد فقط","en":"Leader traits only"},{"ar":"جودة العلاقة الفردية بين القائد وكل عضو","en":"The quality of the individual leader-member relationship"},{"ar":"حجم الفريق","en":"Team size"}],"a":1,"ex":{"ar":"جودة العلاقة الثنائية.","en":"The quality of the dyadic relationship."}}]},{"id":"comp-inter","ar":"التفاعل والأعمال","en":"Interaction & Business","icon":"💬","segs":[{"t":"t","h":{"ar":"التفاعل والأعمال","en":"Interaction & Business"},"body":{"ar":"يجمع هذا الموضوع كفاءتين: التفاعل والأعمال. في التفاعل، يقوم الاتصال الفعّال على نموذج (مُرسِل ← رسالة ← مُستقبِل ← تغذية راجعة) مع تجاوز «التشويش»، ويُدار النزاع بأنماط ثوماس-كيلمان الخمسة، ويُبنى الاتفاق عبر التفاوض التوزيعي أو التكاملي مع وعي بـ BATNA. وفي الأعمال، تقرأ HR القوائم المالية الثلاث وتستخدم أدوات الاستراتيجية (SWOT، PESTLE، بورتر)، وتميّز الموثوقية عن الصحة، وتطبّق التحليل (النزعة المركزية، الارتباط مقابل السببية) ونموذج الاستشارة المنهجي.","en":"This topic spans two competencies: interaction and business. In interaction, effective communication follows a model (sender to message to receiver to feedback) overcoming noise; conflict is managed via the five Thomas-Kilmann modes; and agreement is built through distributive or integrative negotiation with awareness of BATNA. In business, HR reads the three financial statements, uses strategy tools (SWOT, PESTLE, Porter), distinguishes reliability from validity, and applies analytics (central tendency, correlation vs causation) and a systematic consulting model."}},{"t":"q","q":{"ar":"نموذج عملية الاتصال يتدفّق:","en":"The communication process flows:"},"opts":[{"ar":"مُرسِل ← ترميز ← قناة ← فكّ ترميز ← مُستقبِل ← تغذية راجعة","en":"Sender to encode to channel to decode to receiver to feedback"},{"ar":"مُستقبِل ← مُرسِل","en":"Receiver to sender"},{"ar":"رسالة فقط","en":"Message only"}],"a":0,"ex":{"ar":"مع «تشويش» قد يشوّه أي مرحلة.","en":"With noise possibly distorting any stage."}},{"t":"q","q":{"ar":"«الإصغاء الفعّال» يتضمّن:","en":"Active listening involves:"},"opts":[{"ar":"المقاطعة","en":"Interrupting"},{"ar":"الانتباه الكامل وإعادة الصياغة وتأجيل الحكم","en":"Full attention, paraphrasing, suspending judgment"},{"ar":"الرد السريع","en":"Replying quickly"}],"a":1,"ex":{"ar":"تأكيد الفهم قبل الرد.","en":"Confirming understanding before replying."}},{"t":"q","q":{"ar":"التغذية الراجعة في الاتصال هي:","en":"Feedback in communication is:"},"opts":[{"ar":"تشويش","en":"Noise"},{"ar":"ترميز","en":"Encoding"},{"ar":"دليل على فهم الرسالة","en":"Proof the message was understood"}],"a":2,"ex":{"ar":"تثبت وصول المعنى الصحيح.","en":"It proves the meaning got through."}},{"t":"q","q":{"ar":"الأساليب الخمسة لإدارة النزاع تُنسب إلى:","en":"The five conflict modes belong to:"},"opts":[{"ar":"Thomas-Kilmann","en":"Thomas-Kilmann"},{"ar":"Blake-Mouton","en":"Blake-Mouton"},{"ar":"Maslow","en":"Maslow"}],"a":0,"ex":{"ar":"Thomas-Kilmann لا Blake-Mouton.","en":"Thomas-Kilmann, not Blake-Mouton."}},{"t":"q","q":{"ar":"النمط عالي الحزم منخفض التعاون في النزاع:","en":"The high-assertive, low-cooperative conflict mode:"},"opts":[{"ar":"التكيّف","en":"Accommodating"},{"ar":"التنافس","en":"Competing"},{"ar":"التجنّب","en":"Avoiding"}],"a":1,"ex":{"ar":"التنافس (رابح-خاسر).","en":"Competing (win-lose)."}},{"t":"q","q":{"ar":"النمط الذي يسعى لحلّ يُرضي الطرفين (رابح-رابح):","en":"The mode seeking a solution satisfying both (win-win):"},"opts":[{"ar":"التجنّب","en":"Avoiding"},{"ar":"التسوية","en":"Compromising"},{"ar":"التعاون","en":"Collaborating"}],"a":2,"ex":{"ar":"التعاون يدمج مصالح الطرفين.","en":"Collaborating integrates both interests."}},{"t":"q","q":{"ar":"«التسوية» (Compromising) في النزاع تعني:","en":"Compromising in conflict means:"},"opts":[{"ar":"تنازل كل طرف عن جزء للوصول لحلّ وسط","en":"Each side gives up part for a middle ground"},{"ar":"فرض رأي طرف","en":"Imposing one view"},{"ar":"تجاهل النزاع","en":"Ignoring the conflict"}],"a":0,"ex":{"ar":"حلّ وسط متبادل.","en":"A mutual middle ground."}},{"t":"q","q":{"ar":"«التفاوض التوزيعي» (Distributive):","en":"Distributive negotiation is:"},"opts":[{"ar":"توسيع المنفعة المشتركة","en":"Expanding mutual gain"},{"ar":"كعكة ثابتة رابح-خاسر","en":"A fixed pie, win-lose"},{"ar":"لا تفاوض","en":"No negotiation"}],"a":1,"ex":{"ar":"مكسب طرف على حساب الآخر.","en":"One gains at the other expense."}},{"t":"q","q":{"ar":"«التفاوض التكاملي» (Integrative):","en":"Integrative negotiation is:"},"opts":[{"ar":"رابح-خاسر","en":"Win-lose"},{"ar":"تنازلي","en":"Concessionary"},{"ar":"توسيع القيمة المشتركة رابح-رابح","en":"Expanding shared value, win-win"}],"a":2,"ex":{"ar":"يوسّع المنفعة المشتركة.","en":"It expands mutual benefit."}},{"t":"q","q":{"ar":"«أفضل بديل عن الاتفاق» الذي يحدّد نقطة انسحابك:","en":"Your best fallback setting the walk-away point is:"},"opts":[{"ar":"BATNA","en":"BATNA"},{"ar":"ZOPA","en":"ZOPA"},{"ar":"SWOT","en":"SWOT"}],"a":0,"ex":{"ar":"كلما قوي BATNA قوي موقفك.","en":"A stronger BATNA means more leverage."}},{"t":"q","q":{"ar":"القائمة المالية التي تصوّر المركز في لحظة زمنية:","en":"The statement showing position at a moment in time:"},"opts":[{"ar":"قائمة الدخل","en":"Income statement"},{"ar":"الميزانية العمومية","en":"Balance sheet"},{"ar":"التدفق النقدي","en":"Cash flow"}],"a":1,"ex":{"ar":"أصول = خصوم + حقوق ملكية.","en":"Assets = liabilities + equity."}},{"t":"q","q":{"ar":"القائمة التي تغطّي أداء فترة (إيرادات ومصروفات):","en":"The statement covering a period (revenue and expenses):"},"opt "en":"Reliability is consistency; validity is accuracy."}},{"t":"q","q":{"ar":"«الوسيط» (Median) هو:","en":"The median is:"},"opts":[{"ar":"الأكثر تكراراً","en":"The most frequent"},{"ar":"المتوسط الحسابي","en":"The arithmetic mean"},{"ar":"القيمة الوسطى عند الترتيب","en":"The middle value when ordered"}],"a":2,"ex":{"ar":"يقاوم تأثير القيم المتطرّفة.","en":"It resists outliers."}},{"t":"q","q":{"ar":"«الارتباط لا يعني السببية» يعني:","en":"Correlation is not causation means:"},"opts":[{"ar":"تلازم متغيّرين لا يثبت أن أحدهما يسبّب الآخر","en":"Two variables moving together does not prove one causes the other"},{"ar":"الارتباط يثبت السبب","en":"Correlation proves cause"},{"ar":"لا علاقة بينهما","en":"They are unrelated"}],"a":0,"ex":{"ar":"التلازم لا يثبت السبب.","en":"Co-movement is not proof of cause."}},{"t":"q","q":{"ar":"الترتيب الصحيح لنموذج الاستشارة:","en":"The correct order of the consulting model:"},"opts":[{"ar":"تدخّل ← تقييم","en":"Intervene then assess"},{"ar":"تقييم ← تشخيص ← تدخّل ← متابعة","en":"Assess, diagnose, intervene, evaluate"},{"ar":"تشخيص فقط","en":"Diagnose only"}],"a":1,"ex":{"ar":"تقييم ثم تشخيص ثم تدخّل ثم متابعة.","en":"Assess, diagnose, intervene, evaluate."}}]},{"id":"comp-ethics","ar":"الأخلاق والتنوّع","en":"Ethics & DEI","icon":"🤝","boss":false,"segs":[{"t":"t","h":{"ar":"الأخلاق والتنوّع","en":"Ethics & DEI"},"body":{"ar":"تتكامل الممارسة الأخلاقية مع التنوّع والإنصاف والشمول (DEI) كركيزة لمصداقية HR. تقتضي الأخلاق النزاهة والعمل كبوصلة أخلاقية للمنظمة عبر مدوّنة سلوك واضحة وإدارة تضارب المصالح وحماية المُبلِّغين والسرّية. أمّا DEI فيميّز بين التنوّع (الاختلافات الظاهرة والخفية)، والإنصاف (العدالة التي تراعي اختلاف الاحتياجات لا التطابق)، والشمول (شعور الجميع بالانتماء والتقدير). ويتطلّب النجاح وعياً بالتحيّز اللاواعي وقيادة شاملة ومجموعات موارد الموظفين (ERGs).","en":"Ethical practice integrates with diversity, equity, and inclusion (DEI) as a pillar of HR credibility. Ethics requires integrity and acting as the organization moral compass through a clear code of conduct, managing conflicts of interest, protecting whistleblowers, and confidentiality. DEI distinguishes diversity (visible and invisible differences), equity (fairness accounting for differing needs rather than identical treatment), and inclusion (everyone feeling they belong and are valued). Success requires awareness of unconscious bias, inclusive leadership, and employee resource groups (ERGs)."}},{"t":"q","q":{"ar":"«الممارسة الأخلاقية» في HR تعني:","en":"Ethical practice in HR means:"},"opts":[{"ar":"النزاهة والعمل كبوصلة أخلاقية للمنظمة","en":"Integrity and acting as the organization moral compass"},{"ar":"اتباع الأوامر فقط","en":"Just following orders"},{"ar":"تعظيم الربح بأي وسيلة","en":"Maximizing profit by any means"}],"a":0,"ex":{"ar":"النزاهة أساس المهنة.","en":"Integrity anchors the profession."}},{"t":"q","q":{"ar":"«مدوّنة السلوك» (Code of Conduct):","en":"A code of conduct is:"},"opts":[{"ar":"وثيقة تسويقية","en":"A marketing document"},{"ar":"قواعد تحدّد السلوك المتوقّع والقيم","en":"Rules defining expected behavior and values"},{"ar":"عقد العمل","en":"The employment contract"}],"a":1,"ex":{"ar":"توجّه السلوك الأخلاقي.","en":"It guides ethical behavior."}},{"t":"q","q":{"ar":"«تضارب المصالح» يحدث عندما:","en":"A conflict of interest arises when:"},"opts":[{"ar":"يعمل الموظف بجدّ","en":"An employee works hard"},{"ar":"يطلب إجازة","en":"Requests leave"},{"ar":"تتعارض مصلحة شخصية مع واجبه المهني","en":"A personal interest conflicts with a professional duty"}],"a":2,"ex":{"ar":"تعارض المصلحة الشخصية والواجب.","en":"Personal interest versus duty."}},{"t":"q","q":{"ar":"حماية المُبلِّغين عن الاحتيال يكفلها أساساً:","en":"Whistleblower protection is primarily provided by:"},"opts":[{"ar":"Sarbanes-Oxley (SOX)","en":"Sarbanes-Oxley (SOX)"},{"ar":"FLSA","en":"FLSA"},{"ar":"ADA","en":"ADA"}],"a":0,"ex":{"ar":"SOX يحمي المُبلِّغين.","en":"SOX protects whistleblowers."}},{"t":"q","q":{"ar":"مبدأ «السرّية» يُلزم HR بـ:","en":"The confidentiality principle requires HR to:"},"opts":[{"ar":"نشر بيانات الموظفين","en":"Publish employee data"},{"ar":"حماية المعلومات الحسّاسة وعدم إفشائها","en":"Protect sensitive information from disclosure"},{"ar":"تجاهل الخصوصية","en":"Ignore privacy"}],"a":1,"ex":{"ar":"حماية المعلومات الحسّاسة.","en":"Safeguard sensitive information."}},{"t":"q","q":{"ar":"الفرق بين الامتثال والأخلاق:","en":"Compliance versus ethics:"},"opts":[{"ar":"متطابقان","en":"Identical"},{"ar":"الأخلاق قانونية فقط","en":"Ethics is only legal"},{"ar":"الامتثال يتبع القانون والأخلاق تتجاوزه لفعل الصواب","en":"Compliance follows the law; ethics goes beyond it to do right"}],"a":2,"ex":{"ar":"الأخلاق أوسع من الامتثال.","en":"Ethics is broader than compliance."}},{"t":"q","q":{"ar":"«التنوّع» (Diversity) يشير إلى:","en":"Diversity refers to:"},"opts":[{"ar":"الاختلافات الظاهرة والخفية بين الأفراد","en":"Visible and invisible differences among people"},{"ar":"تطابق الجميع","en":"Everyone being the same"},{"ar":"العِرق فقط","en":"Race only"}],"a":0,"ex":{"ar":"يشمل الظاهر والخفي.","en":"It spans visible and invisible."}},{"t":"q","q":{"ar":"«الإنصاف» (Equity) يختلف عن «المساواة» في أنه:","en":"Equity differs from equality in that it:"},"opts":[{"ar":"يعطي الجميع نفس الشيء","en":"Gives everyone the same thing"},{"ar":"يراعي اختلاف الاحتياجات لتحقيق عدالة الفرص","en":"Accounts for differing needs to achieve fair opportunity"},{"ar":"يتجاهل الفروق","en":"Ignores differences"}],"a":1,"ex":{"ar":"الإنصاف يعدّل حسب الحاجة.","en":"Equity adjusts to need."}},{"t":"q","q":{"ar":"«الشمول» (Inclusion) يعني:","en":"Inclusion means:"},"opts":[{"ar":"توظيف متنوّعين فقط","en":"Hiring diverse people only"},{"ar":"الفصل بين المجموعات","en":"Separating groups"},{"ar":"شعور الجميع بالانتماء والتقدير والمشاركة","en":"Everyone feeling they belong, are valued, and participate"}],"a":2,"ex":{"ar":"الانتماء والمشاركة الفعلية.","en":"Belonging and genuine participation."}},{"t":"q","q":{"ar":"«التحيّز اللاواعي» (Unconscious Bias):","en":"Unconscious bias is:"},"opts":[{"ar":"أحكام مسبقة تلقائية تؤثّر على القرارات دون وعي","en":"Automatic prejudgments influencing decisions without awareness"},{"ar":"تمييز متعمّد","en":"Intentional discrimination"},{"ar":"لا وجود له","en":"Does not exist"}],"a":0,"ex":{"ar":"يؤثّر دون قصد واعٍ.","en":"It operates without conscious intent."}},{"t":"q","q":{"ar":"«تحيّز الألفة» (Affinity Bias) هو الميل إلى:","en":"Affinity bias is the tendency to:"},"opts":[{"ar":"رفض كل المتشابهين","en":"Reject all similar people"},{"ar":"تفضيل من يشبهوننا","en":"Favor those who are like us"},{"ar":"الحياد التام","en":"Be totally neutral"}],"a":1,"ex":{"ar":"نميل لمن يشبهنا.","en":"We favor the similar."}},{"t":"q","q":{"ar":"«الإساءات الصغرى» (Microaggressions):","en":"Microaggressions are:"},"opts":[{"ar":"مديح علني","en":"Public praise"},{"ar":"سياسات رسمية","en":"Formal policies"},{"ar":"تعليقات أو سلوكيات يومية خفية مهينة لفئة","en":"Subtle everyday comments or acts demeaning a group"}],"a":2,"ex":{"ar":"خفية لكنها مؤذية.","en":"Subtle yet harmful."}},{"t":"q","q":{"ar":"«مجموعات موارد الموظفين» (ERGs):","en":"Employee Resource Groups (ERGs) are:"},"opts":[{"ar":"مجموعات تطوّعية تجمع موظفين بخصائص مشتركة لدعم الشمول","en":"Voluntary groups uniting employees with shared traits to support inclusion"},{"ar":"نقابات","en":"Unions"},{"ar":"لجان تأديبية","en":"Disciplinary committees"}],"a":0,"ex":{"ar":"تدعم الانتماء والتطوّر.","en":"They support belonging and growth."}},{"t":"q","q":{"ar":"«الأبعاد الأولية» للتنوّع (كالعِرق والعمر):","en":"Primary diversity dimensions (like race, age):"},"opts":[{"ar":"قابلة للتغيير بسهولة","en":"Easily changeable"},{"ar":"فطرية يصعب تغييرها بعكس الثانوية (كالتعليم)","en":"Innate and hard to change, unlike secondary ones (like education)"},{"ar":"غير مهمة","en":"Unimportant"}],"a":1,"ex":{"ar":"الأولية فطرية، الثانوية مكتسبة.","en":"Primary innate; secondary acquired."}},{"t":"q","q":{"ar":"«السقف الزجاجي» (Glass Ceiling):","en":"The glass ceiling is:"},"opts":[{"ar":"سياسة ترقية","en":"A promotion policy"},{"ar":"مزية","en":"A perk"},{"ar":"حاجز غير مرئي يعيق ترقّي فئات معيّنة","en":"An invisible barrier blocking advancement of certain groups"}],"a":2,"ex":{"ar":"حاجز خفي أمام الترقّي.","en":"A hidden barrier to advancement."}},{"t":"q","q":{"ar":"«القيادة الشاملة» (Inclusive Leadership) تتميّز بـ:","en":"Inclusive leadership is marked by:"},"opts":[{"ar":"التواضع والإنصات وتقدير وجهات النظر المتنوّعة","en":"Humility, listening, and valuing diverse perspectives"},{"ar":"فرض رأي واحد","en":"Imposing one view"},{"ar":"تجاهل الاختلاف","en":"Ignoring differences"}],"a":0,"ex":{"ar":"تُقدّر التنوّع وتُنصت.","en":"It values diversity and listens."}},{"t":"q","q":{"ar":"«الانتماء» (Belonging) يتجاوز الشمول بأنه:","en":"Belonging goes beyond inclusion as:"},"opts":[{"ar":"مجرد وجود متنوّعين","en":"Mere presence of diverse people"},{"ar":"شعور الفرد بأنه مقبول ومُقدَّر على حقيقته","en":"The individual feeling accepted and valued for who they are"},{"ar":"سياسة توظيف","en":"A hiring policy"}],"a":1,"ex":{"ar":"الشعور العميق بالقبول.","en":"A deep sense of acceptance."}},{"t":"q","q":{"ar":"«الكفاءة الثقافية» تعني:","en":"Cultural competence means:"},"opts":[{"ar":"إتقان لغة واحدة","en":"Mastering one language"},{"ar":"تجاهل الثقافات","en":"Ignoring cultures"},{"ar":"القدرة على التفاعل بفاعلية عبر الثقافات","en":"The ability to interact effectively across cultures"}],"a":2,"ex":{"ar":"فاعلية عبر الثقافات.","en":"Effectiveness across cultures."}},{"t":"q","q":{"ar":"تطبيق «الإنصاف» عملياً قد يعني:","en":"Applying equity in practice may mean:"},"opts":[{"ar":"تخصيص دعم مختلف حسب احتياج كل فرد لتكافؤ الفرص","en":"Allocating different support per individual need for equal opportunity"},{"ar":"معاملة الجميع بالطريقة نفسها حرفياً","en":"Treating everyone literally the same"},{"ar":"تجاهل الاحتياجات","en":"Ignoring needs"}],"a":0,"ex":{"ar":"دعم متفاوت لتكافؤ الفرص.","en":"Differentiated support for equal opportunity."}},{"t":"q","q":{"ar":"من مبادئ أخلاقيات HR الأساسية:","en":"A core HR ethics principle is:"},"opts":[{"ar":"تحقيق الربح فقط","en":"Profit only"},{"ar":"النزاهة والعدالة والمسؤولية المهنية","en":"Integrity, fairness, and professional responsibility"},{"ar":"الولاء الأعمى للإدارة","en":"Blind loyalty to management"}],"a":1,"ex":{"ar":"النزاهة والعدالة والمسؤولية.","en":"Integrity, fairness, responsibility."}}]},{"id":"comp-global","ar":"العقلية العالمية","en":"Global Mindset","icon":"🌍","boss":true,"segs":[{"t":"t","h":{"ar":"العقلية العالمية","en":"Global Mindset"},"body":{"ar":"تعني «العقلية العالمية» قدرة HR على العمل بفاعلية عبر الثقافات والأسواق. وتُفهَم الاختلافات الثقافية عبر أُطر مثل أبعاد هوفستيد (مسافة السلطة، الفردية/الجماعية، تجنّب الغموض)، وسياق Hall العالي/المنخفض، وأبعاد ترومبينارز، ويُقاس التكيّف بـ«الذكاء الثقافي» (CQ). وفي إدارة القوى العاملة الدولية يحدّد نموذج EPRG توجّه الشركة، وتُوظَّف فئات المغتربين (PCN/HCN/TCN)، مع الانتباه لصدمة الثقافة وإعادة الدمج وأسباب فشل المغتربين.","en":"A global mindset is HR ability to operate effectively across cultures and markets. Cultural differences are understood through frameworks like Hofstede dimensions (power distance, individualism/collectivism, uncertainty avoidance), Hall high/low context, and Trompenaars dimensions, with adaptability measured by cultural intelligence (CQ). In international workforce management the EPRG model defines a firm orientation, expatriate categories (PCN/HCN/TCN) are deployed, with attention to culture shock, repatriation, and causes of expatriate failure."}},{"t":"q","q":{"ar":"«العقلية العالمية» (Global Mindset) تعني:","en":"A global mindset means:"},"opts":[{"ar":"القدرة على العمل بفاعلية عبر الثقافات والأسواق","en":"The ability to work effectively across cultures and markets"},{"ar":"إتقان لغة واحدة","en":"Mastering one language"},{"ar":"العمل محلياً فقط","en":"Working locally only"}],"a":0,"ex":{"ar":"فاعلية عبر الحدود الثقافية.","en":"Effectiveness across cultural borders."}},{"t":"q","q":{"ar":"أبعاد هوفستيد الثقافية تشمل:","en":"Hofstede cultural dimensions include:"},"opts":[{"ar":"الأجور فقط","en":"Wages only"},{"ar":"مسافة السلطة والفردية/الجماعية وتجنّب الغموض","en":"Power distance, individualism/collectivism, uncertainty avoidance"},{"ar":"حجم الشركة","en":"Company size"}],"a":1,"ex":{"ar":"ستة أبعاد لمقارنة الثقافات.","en":"Six dimensions comparing cultures."}},{"t":"q","q":{"ar":"«مسافة السلطة» العالية تعني:","en":"High power distance means:"},"opts":[{"ar":"مساواة تامة","en":"Total equality"},{"ar":"غياب التسلسل","en":"No hierarchy"},{"ar":"قبول التفاوت في السلطة والتسلسل الهرمي","en":"Acceptance of unequal power and hierarchy"}],"a":2,"ex":{"ar":"قبول التفاوت الهرمي.","en":"Acceptance of hierarchy."}},{"t":"q","q":{"ar":"الثقافة «الجماعية» (Collectivist):","en":"A collectivist culture:"},"opts":[{"ar":"تُغلّب مصلحة المجموعة على الفرد","en":"Prioritizes the group over the individual"},{"ar":"تُغلّب الفرد","en":"Prioritizes the individual"},{"ar":"ترفض الفرق","en":"Rejects teams"}],"a":0,"ex":{"ar":"الجماعة قبل الفرد.","en":"Group before individual."}},{"t":"q","q":{"ar":"«تجنّب الغموض» العالي يعني تفضيل:","en":"High uncertainty avoidance means preferring:"},"opts":[{"ar":"المخاطرة","en":"Risk-taking"},{"ar":"القواعد والوضوح وتقليل عدم اليقين","en":"Rules, clarity, and reduced uncertainty"},{"ar":"الفوضى","en":"Chaos"}],"a":1,"ex":{"ar":"القواعد لتقليل عدم اليقين.","en":"Rules to reduce uncertainty."}},{"t":"q","q":{"ar":"الثقافة «عالية السياق» (High-Context):","en":"A high-context culture:"},"opts":[{"ar":"تعتمد الصراحة والتوثيق","en":"Relies on explicit words and documentation"},{"ar":"لا تستخدم لغة","en":"Uses no language"},{"ar":"تعتمد التلميح والعلاقات","en":"Relies on implicit cues and relationships"}],"a":2,"ex":{"ar":"التلميح والعلاقات (اليابان، الخليج).","en":"Implicit cues and relationships."}},{"t":"q","q":{"ar":"أبعاد ترومبينارز تشمل توتراً مثل:","en":"Trompenaars dimensions include a tension like:"},"opts":[{"ar":"العالمية مقابل الخصوصية","en":"Universalism vs particularism"},{"ar":"الطول مقابل العرض","en":"Length vs width"},{"ar":"الربح مقابل الخسارة","en":"Profit vs loss"}],"a":0,"ex":{"ar":"العالمية مقابل الخصوصية مثال.","en":"Universalism vs particularism is one."}},{"t":"q","q":{"ar":"«الذكاء الثقافي» (CQ) هو:","en":"Cultural intelligence (CQ) is:"},"opts":[{"ar":"معدّل الذكاء العام","en":"General IQ"},{"ar":"القدرة على العمل بفاعلية عبر الثقافات","en":"The ability to function effectively across cultures"},{"ar":"إتقان الرياضيات","en":"Math mastery"}],"a":1,"ex":{"ar":"قدرة التكيّف الثقافي.","en":"Cross-cultural adaptability."}},{"t":"q","q":{"ar":"«المركزية العِرقية» (Ethnocentrism):","en":"Ethnocentrism is:"},"opts":[{"ar":"تقدير كل الثقافات","en":"Valuing all cultures"},{"ar":"الحياد الثقافي","en":"Cultural neutrality"},{"ar":"اعتبار ثقافة المرء الأفضل ومعياراً للحكم على غيرها","en":"Seeing one own culture as superior and the standard"}],"a":2,"ex":{"ar":"تحيّز لثقافة المرء.","en":"Bias toward one own culture."}},{"t":"q","q":{"ar":"التوجّه «العالمي» (Geocentric) في نموذج EPRG:","en":"The geocentric orientation in EPRG:"},"opts":[{"ar":"توظيف الأفضل عالمياً بغضّ النظر عن الجنسية","en":"Hiring the best globally regardless of nationality"},{"ar":"توظيف من الوطن الأم فقط","en":"Home-country only"},{"ar":"تجاهل الكفاءة","en":"Ignoring competence"}],"a":0,"ex":{"ar":"الأفضل عالمياً.","en":"The best worldwide."}},{"t":"q","q":{"ar":"«مواطن البلد المضيف» (HCN) هو موظّف:","en":"A host-country national (HCN) is an employee:"},"opts":[{"ar":"من الوطن الأم للشركة","en":"From the company home country"},{"ar":"من الدولة التي يعمل بها الفرع","en":"From the country where the subsidiary operates"},{"ar":"من دولة ثالثة","en":"From a third country"}],"a":1,"ex":{"ar":"من بلد الفرع المضيف.","en":"From the host subsidiary country."}},{"t":"q","q":{"ar":"من أبرز أسباب فشل المغتربين:","en":"A leading cause of expatriate failure is:"},"opts":[{"ar":"الكفاءة الفنية العالية al HR means:"},"opts":[{"ar":"لا فرق","en":"No difference"},{"ar":"الموازنة بين سياسات عالمية موحّدة ومتطلّبات محلية","en":"Balancing uniform global policies with local requirements"},{"ar":"إلغاء السياسات","en":"Abolishing policies"}],"a":1,"ex":{"ar":"موازنة العالمي والمحلي.","en":"Balancing global and local."}},{"t":"q","q":{"ar":"في الاتصال عبر الثقافات يجب الانتباه إلى:","en":"In cross-cultural communication one must attend to:"},"opts":[{"ar":"اللغة فقط","en":"Language only"},{"ar":"السرعة فقط","en":"Speed only"},{"ar":"اللغة وغير اللفظي والسياق والمعاني الثقافية","en":"Language, nonverbals, context, and cultural meanings"}],"a":2,"ex":{"ar":"أبعاد متعدّدة لا اللغة فقط.","en":"Multiple layers, not just language."}},{"t":"q","q":{"ar":"«النسبية الثقافية» (Cultural Relativism):","en":"Cultural relativism is:"},"opts":[{"ar":"فهم الثقافة وفق معاييرها لا الحكم عليها بمعايير المرء","en":"Understanding a culture by its own standards, not judging by one own"},{"ar":"تفضيل ثقافة المرء","en":"Preferring one own culture"},{"ar":"رفض كل الثقافات","en":"Rejecting all cultures"}],"a":0,"ex":{"ar":"فهم بلا حكم مسبق.","en":"Understanding without prejudgment."}},{"t":"q","q":{"ar":"«نهج الميزانية» في تعويض المغتربين يهدف إلى:","en":"The balance-sheet approach to expat pay aims to:"},"opts":[{"ar":"خفض الأجر","en":"Cut pay"},{"ar":"حفظ القوة الشرائية للمغترب كأنه في وطنه","en":"Keep the expat purchasing power as if at home"},{"ar":"إلغاء البدلات","en":"Remove allowances"}],"a":1,"ex":{"ar":"حفظ مستوى المعيشة.","en":"Preserve the standard of living."}}]}]},{"id":"people","ar":"الأفراد","en":"People","sub_ar":"المواهب والمكافآت","sub_en":"Talent & rewards","icon":"👥","c":"#22c08a","cl":"#0f3a2c","chapters":[{"id":"ppl-ta","ar":"الاستراتيجية والاستقطاب","en":"Strategy & Talent Acquisition","icon":"🎯","segs":[{"t":"t","h":{"ar":"الاستراتيجية والاستقطاب","en":"Strategy & Talent Acquisition"},"body":{"ar":"يبدأ الاستقطاب من الاستراتيجية: تعمل HR كشريك يربط ممارساتها بأهداف العمل عبر التخطيط الاستراتيجي (المسح ثم الصياغة ثم التنفيذ) وتخطيط القوى العاملة الذي يوازن الطلب على المواهب بالمعروض. ثم يحدّد تحليل الوظيفة وصفها ومواصفاتها، فتُختار مصادر التجنيد (داخلية/خارجية) مدعومةً بعرض القيمة (EVP) والعلامة. وتُقيَّم الكفاءة عبر المقابلات المنظّمة (أعلى صدقاً) وعيّنات العمل والاختبارات، وتُقاس الفاعلية بمؤشّرات مثل تكلفة التعيين وزمن الإشغال وجودة التعيين.","en":"Talent acquisition starts from strategy: HR acts as a partner linking practices to business goals through strategic planning (scan, formulate, execute) and workforce planning that balances talent demand and supply. Job analysis then defines the description and specification, sourcing channels (internal/external) are chosen, supported by the EVP and employer brand. Fit is assessed via structured interviews (highest validity), work samples, and tests, and effectiveness is measured by metrics like cost per hire, time to fill, and quality of hire."}},{"t":"q","q":{"ar":"أول مرحلة في التخطيط الاستراتيجي:","en":"The first stage of strategic planning:"},"opts":[{"ar":"المسح والتحليل البيئي","en":"Environmental scan and analysis"},{"ar":"التنفيذ","en":"Execution"},{"ar":"التقييم","en":"Evaluation"}],"a":0,"ex":{"ar":"يبدأ بالمسح قبل الصياغة.","en":"It starts with scanning before formulating."}},{"t":"q","q":{"ar":"دور HR كـ«شريك استراتيجي» يعني:","en":"HR as a strategic partner means:"},"opts":[{"ar":"إدارة الرواتب فقط","en":"Payroll only"},{"ar":"مواءمة HR مع استراتيجية العمل","en":"Aligning HR with business strategy"},{"ar":"حفظ الملفات","en":"Filing records"}],"a":1,"ex":{"ar":"ربط HR بأهداف العمل.","en":"Linking HR to business goals."}},{"t":"q","q":{"ar":"تخطيط القوى العاملة يقارن:","en":"Workforce planning compares:"},"opts":[{"ar":"الأرباح بالتكاليف","en":"Profit vs cost"},{"ar":"الأداء بالأقدمية","en":"Performance vs seniority"},{"ar":"الطلب على المواهب بالمعروض لتحديد الفجوة","en":"Talent demand vs supply to find the gap"}],"a":2,"ex":{"ar":"الطلب مقابل المعروض.","en":"Demand versus suppl  and aspiration to rise to bigger roles"},{"ar":"قريب من التقاعد","en":"Near retirement"},{"ar":"ضعيف الأداء","en":"A low performer"}],"a":0,"ex":{"ar":"قدرة + طموح + التزام.","en":"Ability, aspiration, engagement."}},{"t":"q","q":{"ar":"«نقل أثر التدريب» (Transfer of Training):","en":"Transfer of training is:"},"opts":[{"ar":"نسيان ما تعلّمه","en":"Forgetting what was learned"},{"ar":"تطبيق المتعلَّم فعلياً في العمل","en":"Applying the learning back on the job"},{"ar":"إلغاء التدريب","en":"Cancelling training"}],"a":1,"ex":{"ar":"الهدف النهائي من التدريب.","en":"The ultimate goal of training."}},{"t":"q","q":{"ar":"دورة التعلّم التجريبي (كولب) تبدأ غالباً من:","en":"Kolb experiential cycle often begins with:"},"opts":[{"ar":"الاختبار","en":"Testing"},{"ar":"التجريد","en":"Abstraction"},{"ar":"الخبرة الملموسة ثم التأمّل","en":"Concrete experience then reflection"}],"a":2,"ex":{"ar":"خبرة ← تأمّل ← تجريد ← تطبيق.","en":"Experience, reflect, conceptualize, apply."}},{"t":"q","q":{"ar":"«إدارة المعرفة» (Knowledge Management):","en":"Knowledge management is:"},"opts":[{"ar":"التقاط المعرفة التنظيمية ومشاركتها والحفاظ عليها","en":"Capturing, sharing, and retaining organizational knowledge"},{"ar":"حذف البيانات","en":"Deleting data"},{"ar":"التوظيف","en":"Recruiting"}],"a":0,"ex":{"ar":"منع ضياع المعرفة المؤسسية.","en":"Preventing loss of institutional knowledge."}},{"t":"q","q":{"ar":"«التعلّم المدمج» (Blended Learning):","en":"Blended learning:"},"opts":[{"ar":"إلكتروني بالكامل","en":"Fully online"},{"ar":"يمزج التعلّم الحضوري والإلكتروني","en":"Combines in-person and online learning"},{"ar":"بلا تقنية","en":"No technology"}],"a":1,"ex":{"ar":"يجمع مزايا الطريقتين.","en":"It combines both modes."}},{"t":"q","q":{"ar":"«التوجيه» (Mentoring) غالباً:","en":"Mentoring is usually:"},"opts":[{"ar":"قصير ومحدّد","en":"Short and specific"},{"ar":"تأديبي","en":"Disciplinary"},{"ar":"علاقة طويلة لتطوير مهني شامل","en":"A long relationship for broad career development"}],"a":2,"ex nsation) and voluntary (health insurance, 401k)."}},{"t":"q","q":{"ar":"«المكافآت الكلّية» (Total Rewards) تشمل:","en":"Total Rewards includes:"},"opts":[{"ar":"الأجر والمزايا والاعتراف والتطوّر وتوازن الحياة","en":"Pay, benefits, recognition, development, and work-life"},{"ar":"الراتب الأساسي فقط","en":"Base salary only"},{"ar":"المزايا فقط","en":"Benefits only"}],"a":0,"ex":{"ar":"منظور شامل لا الأجر فقط.","en":"A holistic view, not just pay."}},{"t":"q","q":{"ar":"«التعويض غير المباشر» (Indirect) يشير إلى:","en":"Indirect compensation refers to:"},"opts":[{"ar":"الأجر الأساسي","en":"Base pay"},{"ar":"المزايا (تأمين/تقاعد/إجازات)","en":"Benefits (insurance, retirement, leave)"},{"ar":"العمولة","en":"Commission"}],"a":1,"ex":{"ar":"المزايا غير النقدية المباشرة.","en":"Non-cash direct benefits."}},{"t":"q","q":{"ar":"«الأجر المتغيّر» (Variable Pay):","en":"Variable pay is:"},"opts":[{"ar":"ثابت شهرياً","en":"Fixed monthly"},{"ar":"الراتب الأساسي","en":"Base salary"},{"ar":"حوافز مرتبطة بالأداء (مكافآت/عمولات)","en":"Performance-linked incentives (bonuses/commissions)"}],"a":2,"ex":{"ar":"يتغيّر بحسب الأداء.","en":"It varies with performance."}},{"t":"q","q":{"ar":"«تقييم الوظائف» (Job Evaluation) يهدف إلى:","en":"Job evaluation aims to:"},"opts":[{"ar":"تحديد القيمة النسبية للوظائف للعدالة الداخلية","en":"Determine relative job worth for internal equity"},{"ar":"تقييم أداء الفرد","en":"Appraise individual performance"},{"ar":"تحديد الأرباح","en":"Set profits"}],"a":0,"ex":{"ar":"عدالة داخلية بين الوظائف.","en":"Internal equity among jobs."}},{"t":"q","q":{"ar":"«نسبة المقارنة» (Compa-ratio) = راتب الموظف ÷","en":"Compa-ratio = employee salary ÷"},"opts":[{"ar":"الحد الأدنى للنطاق","en":"Range minimum"},{"ar":"منتصف نطاق الأجر","en":"Pay range midpoint"},{"ar":"أعلى النطاق","en":"Range maximum"}],"a":1,"ex":{"ar":"1.0 = الراتب عند منتصف النطاق.","en":"1.0 = pay at the midpoint."}},{"t":"q","q":{"ar":"«اتساع النطاق» (Range Spread):","en":"Range spread is:"},"opts":[{"
