mance"},{"ar":"مكافأة عشوائية","en":"A random bonus"}],"a":1,"ex":{"ar":"يكافئ الأداء الفردي.","en":"It rewards individual performance."}},{"t":"q","q":{"ar":"«النطاقات العريضة» (Broadbanding):","en":"Broadbanding is:"},"opts":[{"ar":"زيادة عدد الدرجات","en":"Increasing the number of grades"},{"ar":"إلغاء الأجور","en":"Abolishing pay"},{"ar":"دمج درجات كثيرة في نطاقات قليلة عريضة","en":"Collapsing many grades into few wide bands"}],"a":2,"ex":{"ar":"مرونة أكبر في الأجر.","en":"Greater pay flexibility."}},{"t":"q","q":{"ar":"من المزايا الإلزامية فيدرالياً في أمريكا:","en":"A federally mandatory US benefit is:"},"opts":[{"ar":"الضمان الاجتماعي وتعويض العمال","en":"Social Security and workers compensation"},{"ar":"التأمين الصحي الخاص","en":"Private health insurance"},{"ar":"عضوية النادي","en":"Club membership"}],"a":0,"ex":{"ar":"إلزامية بنص القانون.","en":"Mandated by law."}},{"t":"q","q":{"ar":"خطة «401(k)» هي:","en":"A 401(k) plan is:"},"opts":[{"ar":"تأمين صحي","en":"Health insurance"},{"ar":"خطة تقاعد بمساهمة محدّدة","en":"A defined-contribution retirement plan"},{"ar":"إجازة مدفوعة","en":"Paid leave"}],"a":1,"ex":{"ar":"يتحمّل الموظف قرار الاستثمار.","en":"The employee directs the investment."}},{"t":"q","q":{"ar":"خطة «المنفعة المحدّدة» تختلف عن «المساهمة المحدّدة» بأنها:","en":"A defined-benefit plan differs from defined-contribution in that it:"},"opts":[{"ar":"يتحمّل الموظف المخاطرة","en":"The employee bears the risk"},{"ar":"بلا ضمان","en":"Has no guarantee"},{"ar":"تضمن معاشاً محدّداً ويتحمّل صاحب العمل المخاطرة","en":"Guarantees a set pension with the employer bearing the risk"}],"a":2,"ex":{"ar":"المنفعة مضمونة على صاحب العمل.","en":"The benefit is guaranteed by the employer."}},{"t":"q","q":{"ar":"فلسفة الأجر «القيادية» (Lead) تعني:","en":"A lead pay philosophy means:"},"opts":[{"ar":"الدفع أعلى من السوق لجذب الأفضل","en":"Paying above market to attract top talent"},{"ar":"الدفع أقل من السوق","en":"Paying below market"},{"ar":"تجاهل السوق","en":"Ignoring the market"}],"a":0,"ex":{"ar":"أعلى من السوق.","en":"Above the market."}},{"t":"q","q":{"ar":"«الأجر الأساسي» (Base Pay):","en":"Base pay is:"},"opts":[{"ar":"مكافأة أداء","en":"A performance bonus"},{"ar":"الأجر الثابت المنتظم مقابل الوظيفة","en":"The fixed regular pay for the job"},{"ar":"عمولة","en":"Commission"}],"a":1,"ex":{"ar":"الجزء الثابت من التعويض.","en":"The fixed part of compensation."}},{"t":"q","q":{"ar":"«برامج الاعتراف» (Recognition) في المكافآت:","en":"Recognition programs in total rewards are:"},"opts":[{"ar":"أجر أساسي","en":"Base pay"},{"ar":"تأمين","en":"Insurance"},{"ar":"تقدير معنوي/رمزي يعزّز الانخراط","en":"Symbolic appreciation that boosts engagement"}],"a":2,"ex":{"ar":"مكافأة غير نقدية مؤثّرة.","en":"An impactful non-cash reward."}},{"t":"q","q":{"ar":"«درجة الأجر» (Pay Grade):","en":"A pay grade is:"},"opts":[{"ar":"تجميع وظائف متقاربة القيمة في نطاق أجر واحد","en":"Grouping jobs of similar worth into one pay range"},{"ar":"راتب فرد","en":"One person salary"},{"ar":"مكافأة","en":"A bonus"}],"a":0,"ex":{"ar":"ينظّم هيكل الأجور.","en":"It organizes the pay structure."}},{"t":"q","q":{"ar":"من مكوّنات المكافآت الكلّية غير النقدية:","en":"A non-monetary total-rewards component is:"},"opts":[{"ar":"العمولة","en":"Commission"},{"ar":"فرص التطوّر وتوازن الحياة والاعتراف","en":"Development, work-life balance, and recognition"},{"ar":"الراتب الأساسي","en":"Base salary"}],"a":1,"ex":{"ar":"قيمة تتجاوز المال.","en":"Value beyond money."}}]},{"id":"ppl-engage","ar":"الانخراط والاحتفاظ","en":"Engagement & Retention","icon":"💚","boss":true,"segs":[{"t":"t","h":{"ar":"الانخراط والاحتفاظ","en":"Engagement & Retention"},"body":{"ar":"الانخراط حالة عاطفية ومعرفية تدفع الموظف لبذل جهد تقديري إضافي، وهو أعمق من مجرد الرضا. تتشكّل محرّكاته عبر تصميم الوظيفة (نموذج خصائص الوظيفة: تنوّع المهارات والاستقلالية والتغذية الراجعة) والعقد النفسي والقيادة والتقدير. ويُقاس بالاستبيانات (الشاملة والنبضية وeNPS) شريطة أن تتبعها إجراءات فعلية. أمّا الاحتفاظ فيُعزَّز باندماج فعّال (الـ4 Cs) ومقابلات البقاء والمرونة، ويُحلَّل الدوران بأنواعه (طوعي/غير طوعي، وظيفي/مختل، ومؤسف لعالي الأداء).","en":"Engagement is an emotional and cognitive state driving discretionary effort, deeper than mere satisfaction. Its drivers form through job design (the Job Characteristics Model: skill variety, autonomy, feedback), the psychological contract, leadership, and recognition. It is measured by surveys (census, pulse, eNPS) provided real action follows. Retention is strengthened by effective onboarding (the 4 Cs), stay interviews, and flexibility, and turnover is analyzed by type (voluntary/involuntary, functional/dysfunctional, and regrettable for top performers)."}},{"t":"q","q":{"ar":"كيف يختلف الانخراط عن الرضا الوظيفي؟","en":"How does engagement differ from job satisfaction?"},"opts":[{"ar":"الانخراط يتضمّن جهداً تقديرياً والتزاماً عاطفياً أعمق","en":"Engagement involves discretionary effort and deeper emotional commitment"},{"ar":"متطابقان","en":"They are identical"},{"ar":"الرضا أعمق","en":"Satisfaction is deeper"}],"a":0,"ex":{"ar":"الانخراط أعمق من الرضا.","en":"Engagement runs deeper than satisfaction."}},{"t":"q","q":{"ar":"وفق نموذج خصائص الوظيفة، أي بُعد يرفع الدافعية الداخلية؟","en":"Per the Job Characteristics Model, which raises intrinsic motivation?"},"opts":[{"ar":"طول الساعات","en":"Long hours"},{"ar":"الاستقلالية وتنوّع المهارات والتغذية الراجعة","en":"Autonomy, skill variety, and feedback"},{"ar":"صرامة الرقابة","en":"Strict control"}],"a":1,"ex":{"ar":"أبعاد التصميم ترفع الدافعية.","en":"Design dimensions raise motivation."}},{"t":"q","q":{"ar":"«العقد النفسي» (Psychological Contract):","en":"The psychological contract is:"},"opts":[{"ar":"عقد العمل المكتوب","en":"The written employment contract"},{"ar":"اتفاق النقابة","en":"The union agreement"},{"ar":"التوقّعات المتبادلة غير المكتوبة بين الموظف وصاحب العمل","en":"Unwritten mutual expectations between employee and employer"}],"a":2,"ex":{"ar":"إخلاله يضرّ الثقة والانخراط.","en":"Breaching it harms trust and engagement."}},{"t":"q","q":{"ar":"«الاستقلالية» (Autonomy) في تصميم الوظيفة ترفع:","en":"Autonomy in job design raises:"},"opts":[{"ar":"الدافعية الداخلية والمسؤولية","en":"Intrinsic motivation and ownership"},{"ar":"الدوران","en":"Turnover"},{"ar":"الرقابة","en":"Surveillance"}],"a":0,"ex":{"ar":"حرية القرار تعزّز الملكية.","en":"Decision freedom builds ownership."}},{"t":"q","q":{"ar":"الاستبيان القصير المتكرّر لقياس «نبض» الانخراط:","en":"The short, frequent survey gauging engagement pulse:"},"opts":[{"ar":"الاستبيان الشامل السنوي","en":"The annual census survey"},{"ar":"استبيان النبض (Pulse)","en":"A pulse survey"},{"ar":"مقابلة الخروج","en":"An exit interview"}],"a":1,"ex":{"ar":"قصير ومتكرّر لرصد سريع.","en":"Short and frequent for quick reads."}},{"t":"q","q":{"ar":"مؤشّر eNPS يقيس:","en":"The eNPS measures:"},"opts":[{"ar":"ربحية الموظف","en":"Employee profitability"},{"ar":"عدد ساعات العمل","en":"Hours worked"},{"ar":"مدى احتمال توصية الموظف بالمنظمة كمكان للعمل","en":"How likely an employee is to recommend the organization as a workplace"}],"a":2,"ex":{"ar":"صافي ترويج الموظفين.","en":"Employee net promoter score."}},{"t":"q","q":{"ar":"الفخّ الأكبر في استبيانات الانخراط:","en":"The biggest trap in engagement surveys:"},"opts":[{"ar":"إجراؤها دون إجراءات تالية فيتولّد التهكّم","en":"Running them without follow-up, breeding cynicism"},{"ar":"كثرة الأسئلة","en":"Too many questions"},{"ar":"إجراؤها سنوياً","en":"Running them annually"}],"a":0,"ex":{"ar":"استبيان بلا متابعة يضرّ.","en":"A survey with no action backfires."}},{"t":"q","q":{"ar":"«الاستبيان الشامل» (Census Survey):","en":"A census survey:"},"opts":[{"ar":"عيّنة صغيرة","en":"A small sample"},{"ar":"يشمل كل الموظفين","en":"Covers all employees"},{"ar":"مقابلة فردية","en":"An individual interview"}],"a":1,"ex":{"ar":"يستهدف كل الموظفين.","en":"It targets every employee."}},{"t":"q","q":{"ar":"متى تُجرى «مقابلة البقاء» (Stay Interview) بفاعلية؟","en":"When is a stay interview most effective?"},"opts":[{"ar":"عند تقديم الاستقالة","en":"At resignation"},{"ar":"بعد المغادرة","en":"After departure"},{"ar":"دورياً أثناء بقاء الموظف لاستباق المشكلات","en":"Periodically while the employee stays, to preempt issues"}],"a":2,"ex":{"ar":"استباقية لا متأخّرة.","en":"Proactive, not after the fact."}},{"t":"q","q":{"ar":"الهدف الأساسي من «مقابلة الخروج»:","en":"The main purpose of an exit interview:"},"opts":[{"ar":"فهم أنماط أسباب المغادرة لتحسين الاحتفاظ","en":"Understanding departure patterns to improve retention"},{"ar":"تأخير الاستقالة","en":"Delaying resignation"},{"ar":"معاقبة المغادر","en":"Punishing the leaver"}],"a":0,"ex":{"ar":"تكشف أسباباً قابلة للمعالجة.","en":"It surfaces fixable causes."}},{"t":"q","q":{"ar":"فصل موظف بقرار من صاحب العمل يُعدّ دوراناً:","en":"Termination by the employer is turnover that is:"},"opts":[{"ar":"طوعياً","en":"Voluntary"},{"ar":"غير طوعي (Involuntary)","en":"Involuntary"},{"ar":"وظيفياً","en":"Functional"}],"a":1,"ex":{"ar":"يبدأ من صاحب العمل.","en":"It originates with the employer."}},{"t":"q","q":{"ar":"أخطر أنواع الدوران على المنظمة:","en":"The most damaging turnover type:"},"opts":[{"ar":"تقاعد مخطّط","en":"Planned retirement"},{"ar":"غير الطوعي","en":"Involuntary"},{"ar":"الطوعي لعالي الأداء (Regrettable)","en":"Regrettable, voluntary by top performers"}],"a":2,"ex":{"ar":"فقدان عالي الأداء طوعاً.","en":"Losing top performers voluntarily."}},{"t":"q","q":{"ar":"مغادرة موظف ضعيف الأداء طوعاً تُصنّف دوراناً:","en":"A low performer leaving voluntarily is turnover that is:"},"opts":[{"ar":"وظيفياً (Functional) قد يكون مفيداً","en":"Functional, possibly beneficial"},{"ar":"مختلاً ضاراً","en":"Dysfunctional, harmful"},{"ar":"غير طوعي","en":"Involuntary"}],"a":0,"ex":{"ar":"قد يحسّن أداء الفريق.","en":"It may improve team performance."}},{"t":"q","q":{"ar":"معدّل الدوران يُحسب بـ:","en":"Turnover rate is calculated as:"},"opts":[{"ar":"الإيرادات ÷ الموظفين","en":"Revenue ÷ employees"},{"ar":"(عدد المغادرين ÷ متوسط عدد الموظفين) × 100","en":"(separations ÷ average headcount) × 100"},{"ar":"الساعات ÷ 200,000","en":"Hours ÷ 200,000"}],"a":1,"ex":{"ar":"نسبة المغادرين خلال فترة.","en":"The percent who left in a period."}},{"t":"q","q":{"ar":"«الـ4 Cs» لاندماج الموظفين الجدد:","en":"The 4 Cs of onboarding are:"},"opts":[{"ar":"المنافسة والرقابة","en":"Competition and control"},{"ar":"الراتب والمكتب","en":"Salary and office"},{"ar":"الامتثال والتوضيح والثقافة والترابط","en":"Compliance, Clarification, Culture, Connection"}],"a":2,"ex":{"ar":"إطار اندماج فعّال.","en":"An effective onboarding framework."}},{"t":"q","q":{"ar":"الاعتراف الفوري بالإنجاز مقارنةً بالمكافأة المالية:","en":"Immediate recognition versus a cash reward is:"},"opts":[{"ar":"غالباً قوي الأثر وأقل تكلفة","en":"Often high-impact and low-cost"},{"ar":"دائماً أضعف","en":"Always weaker"},{"ar":"بلا قيمة","en":"Worthless"}],"a":0,"ex":{"ar":"محرّك انخراط منخفض التكلفة.","en":"A low-cost engagement driver."}},{"t":"q","q":{"ar":"«المرونة في العمل» (Flexibility/WLB) تؤثّر على:","en":"Workplace flexibility (WLB) affects:"},"opts":[{"ar":"الضرائب","en":"Taxes"},{"ar":"الاحتفاظ والانخراط","en":"Retention and engagement"},{"ar":"أسعار الأسهم","en":"Stock prices"}],"a":1,"ex":{"ar":"من أقوى أدوات الاحتفاظ.","en":"A powerful retention lever."}},{"t":"q","q":{"ar":"الموظف العائد للمنظمة بعد مغادرته يُسمّى:","en":"An employee returning after leaving is a:"},"opts":[{"ar":"متعاقد","en":"Contractor"},{"ar":"مستقل","en":"Freelancer"},{"ar":"عائد (Boomerang)","en":"Boomerang"}],"a":2,"ex":{"ar":"يجلب خبرة ويقلّل التكلفة.","en":"Brings experience and cuts cost."}},{"t":"q","q":{"ar":"«إثراء الوظيفة» (Job Enrichment):","en":"Job enrichment means:"},"opts":[{"ar":"إضافة عمق ومسؤولية واستقلالية","en":"Adding depth, responsibility, and autonomy"},{"ar":"خفض الأجر","en":"Cutting pay"},{"ar":"زيادة مهام متشابهة فقط","en":"Only adding similar tasks"}],"a":0,"ex":{"ar":"توسيع رأسي لا أفقي.","en":"Vertical, not horizontal, loading."}},{"t":"q","q":{"ar":"من أبرز محرّكات الانخراط:","en":"A leading driver of engagement is:"},"opts":[{"ar":"الرقابة المشدّدة","en":"Tight surveillance"},{"ar":"عمل ذو معنى وقيادة داعمة وفرص نموّ وتقدير","en":"Meaningful work, supportive leadership, growth, recognition"},{"ar":"غياب التغذية الراجعة","en":"No feedback"}],"a":1,"ex":{"ar":"المعنى والدعم والنموّ.","en":"Meaning, support, and growth."}}]},{"id":"ppl-perf","ar":"إدارة الأداء","en":"Performance Management","icon":"📈","boss":false,"segs":[{"t":"t","h":{"ar":"إدارة الأداء","en":"Performance Management"},"body":{"ar":"إدارة الأداء عملية مستمرة تواءم أداء الموظف مع أهداف المنظمة، وهي أشمل من «تقييم الأداء» السنوي. تبدأ بتحديد أهداف واضحة (متتالية من الاستراتيجية، SMART، أو بأسلوب الإدارة بالأهداف MBO ومؤشّرات KPIs)، ثم متابعة وتغذية راجعة مستمرة (بما فيها 360 درجة)، فتقييم بأدوات كمقاييس BARS مع الحذر من أخطاء التقييم (الهالة، النزعة المركزية، الحداثة، التساهل). وتُختَم بقرارات تطوير ومكافأة، وعند الضعف بخطة تحسين الأداء (PIP) أو التأديب المتدرّج.","en":"Performance management is a continuous process aligning employee performance with organizational goals, broader than the annual appraisal. It starts with clear goals (cascaded from strategy, SMART, or via MBO and KPIs), then ongoing monitoring and feedback (including 360-degree), then evaluation using tools like BARS while guarding against rating errors (halo, central tendency, recency, leniency). It concludes with development and reward decisions, and on underperformance, a performance improvement plan (PIP) or progressive discipline."}},{"t":"q","q":{"ar":"«إدارة الأداء» (Performance Management):","en":"Performance management is:"},"opts":[{"ar":"عملية مستمرة تواءم الأداء مع أهداف المنظمة","en":"A continuous process aligning performance with organizational goals"},{"ar":"تقييم سنوي مرة واحدة فقط","en":"A once-a-year appraisal only"},{"ar":"حساب الرواتب","en":"Payroll calculation"}],"a":0,"ex":{"ar":"مستمرة لا حدثاً سنوياً.","en":"Continuous, not a yearly event."}},{"t":"q","q":{"ar":"«تقييم الأداء» (Appraisal) مقارنةً بـ«إدارة الأداء»:","en":"Appraisal compared to performance management is:"},"opts":[{"ar":"أشمل وأوسع","en":"Broader and wider"},{"ar":"حدث/مرحلة ضمن عملية أشمل ومستمرة","en":"An event within a broader, continuous process"},{"ar":"متطابقان","en":"Identical"}],"a":1,"ex":{"ar":"التقييم جزء من الإدارة.","en":"Appraisal is part of management."}},{"t":"q","q":{"ar":"أهداف الأداء الفعّالة تكون:","en":"Effective performance goals are:"},"opts":[{"ar":"غامضة","en":"Vague"},{"ar":"بلا مواعيد","en":"Without deadlines"},{"ar":"محدّدة وقابلة للقياس وواقعية ومحدّدة زمنياً (SMART)","en":"Specific, measurable, attainable, relevant, time-bound (SMART)"}],"a":2,"ex":{"ar":"معايير SMART.","en":"SMART criteria."}},{"t":"q","q":{"ar":"«الإدارة بالأهداف» (MBO):","en":"Management by Objectives (MBO):"},"opts":[{"ar":"اتفاق المدير والموظف على أهداف قابلة للقياس وتقييم الإنجاز","en":"Manager and employee agree on measurable goals and assess attainment"},{"ar":"ترقية تلقائية","en":"Automatic promotion"},{"ar":"تجاهل الأهداف","en":"Ignoring goals"}],"a":0,"ex":{"ar":"أهداف مشتركة قابلة للقياس.","en":"Jointly set measurable goals."}},{"t":"q","q":{"ar":"«التغذية الراجعة 360 درجة» تجمع تقييمات من:","en":"360-degree feedback gathers ratings from:"},"opts":[{"ar":"المدير فقط","en":"The manager only"},{"ar":"المدير والأقران والمرؤوسين والذات (وأحياناً العملاء)","en":"Manager, peers, subordinates, self (and sometimes customers)"},{"ar":"العملاء فقط","en":"Customers only"}],"a":1,"ex":{"ar":"مصادر متعدّدة لرؤية أشمل.","en":"Multiple sources for a fuller view."}},{"t":"q","q":{"ar":"«مقياس التقدير البياني» (Graphic Rating Scale):","en":"A graphic rating scale:"},"opts":[{"ar":"ترتيب إجباري","en":"Forced ranking"},{"ar":"أهداف","en":"Goals"},{"ar":"تقييم سمات/أداء على سُلّم رقمي","en":"Rates traits/performance on a numeric scale"}],"a":2,"ex":{"ar":"الأكثر شيوعاً وأبسطها.","en":"The most common, simplest tool."}},{"t":"q","q":{"ar":"«مقاييس التقدير المرتكزة سلوكياً» (BARS):","en":"Behaviorally Anchored Rating Scales (BARS):"},"opts":[{"ar":"تربط درجات التقييم بأمثلة سلوكية محدّدة","en":"Anchor rating levels to specific behavioral examples"},{"ar":"ترتّب الموظفين قسراً","en":"Force-rank employees"},{"ar":"تقيس الراتب","en":"Measure salary"}],"a":0,"ex":{"ar":"تقلّل الذاتية بربطها بسلوك.","en":"They reduce subjectivity via behaviors."}},{"t":"q","q":{"ar":"«التوزيع الإجباري» (Forced Distribution):","en":"Forced distribution:"},"opts":[{"ar":"يعطي الجميع نفس التقدير","en":"Gives everyone the same rating"},{"ar":"يوزّع الموظفين على فئات أداء بنسب محدّدة مسبقاً","en":"Distributes employees into tiers by preset percentages"},{"ar":"يلغي التقييم","en":"Abolishes rating"}],"a":1,"ex":{"ar":"منهج مثير للجدل.","en":"A controversial method."}},{"t":"q","q":{"ar":"«أثر الهالة» (Halo Effect) في التقييم:","en":"The halo effect in appraisal is:"},"opts":[{"ar":"ميل للتقييم المتوسط","en":"A tendency to rate average"},{"ar":"تذكّر الأحداث الأخيرة فقط","en":"Recalling only recent events"},{"ar":"ترك سمة إيجابية واحدة تُحسّن تقييم كل الجوانب","en":"Letting one positive trait inflate all ratings"}],"a":2,"ex":{"ar":"تعميم انطباع إيجابي واحد.","en":"Generalizing one positive impression."}},{"t":"q","q":{"ar":"«خطأ النزعة المركزية»:","en":"The central tendency error is:"},"opts":[{"ar":"تقييم الجميع قرب الوسط وتجنّب الأطراف","en":"Rating everyone near the middle, avoiding extremes"},{"ar":"تضخيم كل الدرجات","en":"Inflating all scores"},{"ar":"تذكّر الأحداث الأخيرة","en":"Recency recall"}],"a":0,"ex":{"ar":"تجنّب الدرجات المتطرّفة.","en":"Avoiding extreme scores."}},{"t":"q","q":{"ar":"«خطأ الحداثة» (Recency Error):","en":"The recency error is:"},"opts":[{"ar":"التساهل العام","en":"General leniency"},{"ar":"الاعتماد على الأحداث الأخيرة وتجاهل الفترة كاملة","en":"Relying on recent events and ignoring the full period"},{"ar":"الهالة","en":"The halo effect"}],"a":1,"ex":{"ar":"تجاهل أداء الفترة كاملة.","en":"Ignoring the whole period."}},{"t":"q","q":{"ar":"«خطأ التساهل» (Leniency):","en":"The leniency error is:"},"opts":[{"ar":"تقييم متشدّد","en":"Overly harsh rating"},{"ar":"تقييم متوسط","en":"Average rating"},{"ar":"منح درجات أعلى مما يستحق الجميع","en":"Giving everyone higher ratings than warranted"}],"a":2,"ex":{"ar":"تضخيم عام للدرجات.","en":"A general inflation of scores."}},{"t":"q","q":{"ar":"«خطأ التباين» (Contrast Error):","en":"The contrast error is:"},"opts":[{"ar":"تقييم موظف بالمقارنة بآخرين لا بالمعايير","en":"Rating an employee against others rather than standards"},{"ar":"التساهل","en":"Leniency"},{"ar":"الحداثة","en":"Recency"}],"a":0,"ex":{"ar":"المقارنة بدل المعيار.","en":"Comparison instead of the standard."}},{"t":"q","q":{"ar":"«المعايرة» (Calibration) في التقييم:","en":"Calibration in appraisal is:"},"opts":[{"ar":"إلغاء التقييمات","en":"Discarding ratings"},{"ar":"اجتماع المديرين لمواءمة معايير التقييم وتقليل التحيّز","en":"Managers meeting to align rating standards and reduce bias"},{"ar":"رفع كل الدرجات","en":"Raising all scores"}],"a":1,"ex":{"ar":"اتساق وعدالة عبر المقيّمين.","en":"Consistency and fairness across raters."}},{"t":"q","q":{"ar":"«خطة تحسين الأداء» (PIP):","en":"A Performance Improvement Plan (PIP) is:"},"opts":[{"ar":"مكافأة","en":"A reward"},{"ar":"ترقية","en":"A promotion"},{"ar":"خطة موثّقة بأهداف ومهلة لمعالجة ضعف الأداء","en":"A documented plan with goals and a timeline to fix underperformance"}],"a":2,"ex":{"ar":"فرصة موثّقة للتحسّن.","en":"A documented chance to improve."}},{"t":"q","q":{"ar":"«التأديب المتدرّج» (Progressive Discipline):","en":"Progressive discipline is:"},"opts":[{"ar":"خطوات متصاعدة من الإنذار الشفهي إلى الفصل","en":"Escalating steps from a verbal warning to termination"},{"ar":"الفصل الفوري دائماً","en":"Always immediate termination"},{"ar":"تجاهل المخالفة","en":"Ignoring the issue"}],"a":0,"ex":{"ar":"تصعيد عادل ومتدرّج.","en":"Fair, escalating steps."}},{"t":"q","q":{"ar":"«التغذية الراجعة المستمرة» (Continuous Feedback):","en":"Continuous feedback means:"},"opts":[{"ar":"مرة في السنة","en":"Once a year"},{"ar":"لقاءات ومتابعات منتظمة بدل التقييم السنوي فقط","en":"Regular check-ins instead of only an annual review"},{"ar":"لا تغذية راجعة","en":"No feedback"}],"a":1,"ex":{"ar":"اتجاه حديث في إدارة الأداء.","en":"A modern performance trend."}},{"t":"q","q":{"ar":"«التقييم الذاتي» (Self-Appraisal):","en":"Self-appraisal is:"},"opts":[{"ar":"يحلّ محلّ المدير","en":"Replaces the manager"},{"ar":"غير مفيد","en":"Useless"},{"ar":"تقييم الموظف لأدائه ليُثري الحوار","en":"The employee rating own performance to enrich dialogue"}],"a":2,"ex":{"ar":"يعزّز ملكية الموظف.","en":"It builds employee ownership."}},{"t":"q","q":{"ar":"«مؤشّرات الأداء الرئيسة» (KPIs):","en":"Key Performance Indicators (KPIs) are:"},"opts":[{"ar":"مقاييس كمّية لتتبّع التقدّم نحو الأهداف","en":"Quantifiable measures tracking progress toward goals"},{"ar":"قوائم رواتب","en":"Payroll lists"},{"ar":"شعارات","en":"Slogans"}],"a":0,"ex":{"ar":"تربط الأداء بالأهداف.","en":"They link performance to goals."}},{"t":"q","q":{"ar":"دورة إدارة الأداء تتضمّن:","en":"The performance-management cycle includes:"},"opts":[{"ar":"التوظيف والفصل","en":"Hiring and firing"},{"ar":"التخطيط والمتابعة والتطوير والتقييم والمكافأة","en":"Plan, monitor, develop, rate, reward"},{"ar":"الشراء والبيع","en":"Buy and sell"}],"a":1,"ex":{"ar":"دورة متكاملة متكرّرة.","en":"An integrated recurring cycle."}}]}]},{"id":"org","ar":"المنظمة","en":"Organization","sub_ar":"الهيكل وعلاقات العمل","sub_en":"Structure & labor","icon":"🏢","c":"#9b6dff","cl":"#2a1c4a","chapters":[{"id":"org-labor-1","ar":"التنظيم النقابي والاعتماد","en":"Union Organizing & Certification","icon":"📑","boss":false,"segs":[{"t":"t","h":{"ar":"التنظيم النقابي والاعتماد","en":"Union Organizing & Certification"},"body":{"ar":"يبدأ التنظيم النقابي بسعي العمال إلى تمثيل جماعي. تجمع النقابة «بطاقات تفويض» موقّعة، فإذا بلغت 30% من «وحدة التفاوض» (مجموعة العمال ذوي المصالح المشتركة) جاز طلب انتخاب يشرف عليه مجلس علاقات العمل الوطني (NLRB). وبفوز الأغلبية البسيطة تُعتمَد النقابة ممثلاً حصرياً لكل عمال الوحدة. ويقيّد القانون صاحب العمل بقاعدة «TIPS» (لا تهديد ولا استجواب ولا وعود ولا مراقبة)، ويمكن لاحقاً «إلغاء الاعتماد» بتصويت مماثل.","en":"Union organizing begins when workers seek collective representation. The union collects signed authorization cards; if 30% of the bargaining unit (workers sharing a community of interest) sign, an NLRB-supervised election may be petitioned. A simple-majority win certifies the union as the exclusive representative of all unit employees. The law limits the employer under the TIPS rule (no Threats, Interrogation, Promises, or Surveillance), and the union can later be decertified by a similar vote."}},{"t":"q","q":{"ar":"النسبة الدنيا من بطاقات التفويض لطلب انتخاب NLRB:","en":"Minimum authorization cards to petition for an NLRB election:"},"opts":[{"ar":"30%","en":"30%"},{"ar":"10%","en":"10%"},{"ar":"51%","en":"51%"}],"a":0,"ex":{"ar":"30% على الأقل لطلب الانتخاب.","en":"At least 30% to petition."}},{"t":"q","q":{"ar":"الجهة التي تشرف على انتخابات النقابة:","en":"The body that supervises union elections:"},"opts":[{"ar":"OSHA","en":"OSHA"},{"ar":"NLRB","en":"NLRB"},{"ar":"EEOC","en":"EEOC"}],"a":1,"ex":{"ar":"مجلس علاقات العمل الوطني.","en":"The National Labor Relations Board."}},{"t":"q","q":{"ar":"«وحدة التفاوض» (Bargaining Unit) هي:","en":"A bargaining unit is:"},"opts":[{"ar":"مجلس الإدارة","en":"The board"},{"ar":"اللجنة التنفيذية","en":"The executive committee"},{"ar":"مجموعة العمال ذوي المصالح المشتركة","en":"Workers sharing a community of interest"}],"a":2,"ex":{"ar":"نطاق تمثيل النقابة.","en":"The scope of union representation."}},{"t":"q","q":{"ar":"تُعتمَد النقابة عند فوزها بـ:","en":"A union is certified upon winning:"},"opts":[{"ar":"الأغلبية البسيطة (50%+1)","en":"A simple majority (50%+1)"},{"ar":"الثلثين","en":"Two-thirds"},{"ar":"الإجماع","en":"Unanimity"}],"a":0,"ex":{"ar":"الأغلبية البسيطة تكفي.","en":"A simple majority suffices."}},{"t":"q","q":{"ar":"بعد الاعتماد تمثّل النقابة:","en":"Once certified, the union represents:"},"opts":[{"ar":"أعضاءها فقط","en":"Only its members"},{"ar":"كل عمال الوحدة","en":"All employees in the unit"},{"ar":"لا أحد","en":"No one"}],"a":1,"ex":{"ar":"تمثيل حصري لكل عمال الوحدة.","en":"Exclusive representation of all unit employees."}},{"t":"q","q":{"ar":"الغرض من بطاقة التفويض:","en":"The purpose of an authorization card:"},"opts":[{"ar":"دفع الرسوم","en":"Paying dues"},{"ar":"الاستقالة","en":"Resigning"},{"ar":"إظهار الاهتمام بالتمثيل النقابي","en":"Showing interest in union representation"}],"a":2,"ex":{"ar":"تُظهر تأييد العامل للتمثيل.","en":"It shows support for representation."}},{"t":"q","q":{"ar":"«الاعتماد» (Certification) يعني:","en":"Certification means:"},"opts":[{"ar":"الاعتراف الرسمي بالنقابة بعد فوزها بالانتخاب","en":"Official recognition of the union after an election win"},{"ar":"إلغاء النقابة","en":"Removing the union"},{"ar":"توقيع العقد","en":"Signing the contract"}],"a":0,"ex":{"ar":"اعتراف رسمي بالنقابة ممثلاً.","en":"Official recognition as representative."}},{"t":"q","q":{"ar":"«إلغاء الاعتماد» (Decertification) هو:","en":"Decertification is:"},"opts":[{"ar":"اعتماد نقابة جديدة","en":"Certifying a new union"},{"ar":"تصويت لإزالة النقابة","en":"A vote to remove the union"},{"ar":"إضراب","en":"A strike"}],"a":1,"ex":{"ar":"تصويت العمال لإزالة تمثيل النقابة.","en":"A worker vote to remove the union."}},{"t":"q","q":{"ar":"«حاجز العقد» (Contract Bar) يعني:","en":"The contract bar means:"},"opts":[{"ar":"يمنع التفاوض","en":"It bars bargaining"},{"ar":"يمنع التظلّم","en":"It bars grievances"},{"ar":"يمنع انتخاباً جديداً أثناء سريان عقد (حتى 3 سنوات)","en":"It bars a new election during a valid contract (up to 3 years)"}],"a":2,"ex":{"ar":"لا انتخاب أثناء عقد ساري المفعول.","en":"No election during a valid contract."}},{"t":"q","q":{"ar":"«حاجز الانتخاب» (Election Bar) يسمح بـ:","en":"The election bar permits:"},"opts":[{"ar":"انتخاب واحد كل 12 شهراً","en":"One election per 12 months"},{"ar":"انتخاب كل شهر","en":"One per month"},{"ar":"لا قيود","en":"No limit"}],"a":0,"ex":{"ar":"انتخاب واحد سنوياً للوحدة.","en":"One election per year per unit."}},{"t":"q","q":{"ar":"«الاعتراف الطوعي» (Voluntary Recognition) عبر فحص البطاقات يعني:","en":"Voluntary recognition via card check means:"},"opts":[{"ar":"انتخاب سرّي إجباري","en":"A mandatory secret ballot"},{"ar":"اعتراف صاحب العمل دون انتخاب","en":"Employer recognition without an election"},{"ar":"قرار محكمة","en":"A court order"}],"a":1,"ex":{"ar":"اعتراف مباشر بأغلبية البطاقات.","en":"Direct recognition by majority cards."}},{"t":"q","q":{"ar":"من يُستبعَد عادةً من وحدة التفاوض؟","en":"Who is normally excluded from a bargaining unit?"},"opts":[{"ar":"العمال بالساعة","en":"Hourly workers"},{"ar":"الفنّيون","en":"Technicians"},{"ar":"المشرفون والمديرون","en":"Supervisors and managers"}],"a":2,"ex":{"ar":"المشرفون والمديرون خارج الوحدة.","en":"Supervisors and managers are excluded."}},{"t":"q","q":{"ar":"قاعدة «TIPS» تمنع صاحب العمل من:","en":"The TIPS rule bars the employer from:"},"opts":[{"ar":"التهديد والاستجواب والوعود والمراقبة","en":"Threats, interrogation, promises, surveillance"},{"ar":"التحدّث نهائياً","en":"Speaking at all"},{"ar":"دفع الأجور","en":"Paying wages"}],"a":0,"ex":{"ar":"لا تهديد/استجواب/وعود/مراقبة.","en":"No threats, interrogation, promises, surveillance."}},{"t":"q","q":{"ar":"حرية تعبير صاحب العمل (المادة 8c) تسمح له بـ:","en":"Employer free speech (Section 8c) allows:"},"opts":[{"ar":"ممنوع تماماً","en":"Entirely forbidden"},{"ar":"التعبير عن رأيه دون تهديد أو وعد","en":"Expressing views without threat or promise"},{"ar":"التهديد","en":"Threatening"}],"a":1,"ex":{"ar":"الرأي مسموح دون إكراه.","en":"Opinion is allowed without coercion."}},{"t":"q","q":{"ar":"«التسلّل التنظيمي» (Salting) يعني:","en":"Salting refers to:"},"opts":[{"ar":"دفع رشاوى","en":"Paying bribes"},{"ar":"تخفيض الأجور","en" e"},{"ar":"موضوعاً اختيارياً","en":"A permissive subject"}],"a":1,"ex":{"ar":"رفض التفاوض الإلزامي ممارسة غير عادلة.","en":"Refusing mandatory bargaining is a ULP."}}]},{"id":"org-labor-3","ar":"الأمن النقابي والإضرابات","en":"Union Security & Strikes","icon":"📘","boss":false,"segs":[{"t":"t","h":{"ar":"الأمن النقابي والإضرابات","en":"Union Security & Strikes"},"body":{"ar":"ينظّم «الأمن النقابي» علاقة العضوية بالتوظيف: المتجر المغلق (محظور)، متجر النقابة (انضمام بعد التعيين)، متجر الوكالة (رسوم دون عضوية)، والمتجر المفتوح. وتمنع ولايات «الحق في العمل» اشتراط العضوية أو الرسوم. وعند النزاع قد يُضرب العمال (اقتصادي قابل للاستبدال الدائم، أو ULP محمي، أو جامح غير محمي)، ويملك صاحب العمل أداة «الإغلاق».","en":"Union security governs the membership-employment link: closed shop (banned), union shop (join after hire), agency shop (fees without membership), and open shop. Right-to-work states bar requiring membership or fees. In disputes workers may strike (economic — permanently replaceable; ULP — protected; wildcat — unprotected), while the employer holds the lockout."}},{"t":"q","q":{"ar":"«المتجر المغلق» (Closed Shop):","en":"The closed shop is:"},"opts":[{"ar":"محظور بـ Taft-Hartley","en":"Banned by Taft-Hartley"},{"ar":"إلزامي","en":"Mandatory"},{"ar":"مسموح بكل الولايات","en":"Allowed everywhere"}],"a":0,"ex":{"ar":"حظره Taft-Hartley.","en":"Banned by Taft-Hartley."}},{"t":"q","q":{"ar":"«متجر النقابة» (Union Shop) يعني:","en":"A union shop means:"},"opts":[{"ar":"لا انضمام","en":"No joining"},{"ar":"الانضمام إلزامي بعد التعيين","en":"Joining required after hire"},{"ar":"رسوم فقط","en":"Fees only"}],"a":1,"ex":{"ar":"العضوية إلزامية بعد التعيين.","en":"Membership required after hire."}},{"t":"q","q":{"ar":"«متجر الوكالة» (Agency Shop):","en":"An agency shop:"},"opts":[{"ar":"عضوية إجبارية","en":"Mandatory membership"},{"ar":"لا رسوم","en":"No fees"},{"ar":"دفع رسوم دون عضوية","en":"Fees without membership"}],"a":2,"ex":{"ar":"رسوم دون عضوية إجبارية.","en":"Fees with nt replacement"}],"a":2,"ex":{"ar":"محميون من الاستبدال الدائم.","en":"Protected from permanent replacement."}},{"t":"q","q":{"ar":"«الإضراب الجامح» (Wildcat):","en":"A wildcat strike is:"},"opts":[{"ar":"غير مصرّح من النقابة وغير محمي","en":"Unauthorized by the union and unprotected"},{"ar":"مصرّح ومحمي","en":"Authorized and protected"},{"ar":"قانوني دائماً","en":"Always legal"}],"a":0,"ex":{"ar":"غير محمي قانوناً.","en":"Legally unprotected."}},{"t":"q","q":{"ar":"«الإضراب التعاطفي» (Sympathy Strike):","en":"A sympathy strike is:"},"opts":[{"ar":"ضد نقابة العامل","en":"Against the worker union"},{"ar":"دعماً لنقابة أخرى مضربة","en":"In support of another striking union"},{"ar":"لرفع الأجور","en":"To raise wages"}],"a":1,"ex":{"ar":"تضامن مع مضربين آخرين.","en":"Solidarity with other strikers."}},{"t":"q","q":{"ar":"«الإغلاق» (Lockout) أداة بيد:","en":"A lockout is a tool of:"},"opts":[{"ar":"النقابة","en":"The union"},{"ar":"الحكومة","en":"The government"},{"ar":"صاحب العمل","en":"The employer"}],"a":2,"ex":{"ar":"ضغط تفاوضي من صاحب العمل.","en":"Employer bargaining pressure."}},{"t":"q","q":{"ar":"«المقاطعة الثانوية» (Secondary Boycott):","en":"A secondary boycott is:"},"opts":[{"ar":"محظورة (ضغط على طرف محايد)","en":"Illegal (pressuring a neutral party)"},{"ar":"قانونية دائماً","en":"Always legal"},{"ar":"ضد صاحب العمل مباشرة","en":"Directly against the employer"}],"a":0,"ex":{"ar":"حظرها Taft-Hartley.","en":"Banned by Taft-Hartley."}},{"t":"q","q":{"ar":"«المقاطعة الأولية» (Primary Boycott):","en":"A primary boycott is:"},"opts":[{"ar":"محظورة","en":"Illegal"},{"ar":"قانونية ضد صاحب العمل المتنازَع معه مباشرةً","en":"Legal, directly against the disputing employer"},{"ar":"ضد طرف محايد","en":"Against a neutral party"}],"a":1,"ex":{"ar":"موجَّهة للطرف المتنازَع معه.","en":"Aimed at the disputing party."}},{"t":"q","q":{"ar":"«اتفاقات البضائع الساخنة» (Hot Cargo):","en":"Hot cargo agreements are:"},"opts":[{"ar":"إلزامية","en":"Mandatory"},{"ar":"مشجَّعة","en":"Encouraged"},{"ar":"محظورة بموجب Taft-Hartley","en":"Illegal under Taft-Hartley"}],"a":2,"ex":{"ar":"محظورة قانوناً.","en":"Legally prohibited."}},{"t":"q","q":{"ar":"«الاعتصام للاعتراف» (Recognitional Picketing) يهدف إلى:","en":"Recognitional picketing aims to:"},"opts":[{"ar":"دفع صاحب العمل للاعتراف بالنقابة","en":"Pressure the employer to recognize the union"},{"ar":"رفع الأجور فوراً","en":"Raise wages immediately"},{"ar":"الفصل","en":"Termination"}],"a":0,"ex":{"ar":"لإجبار الاعتراف بالنقابة.","en":"To compel union recognition."}},{"t":"q","q":{"ar":"«فترة التهدئة» للطوارئ الوطنية تحت Taft-Hartley مدتها:","en":"The national-emergency cooling-off period under Taft-Hartley is:"},"opts":[{"ar":"30 يوماً","en":"30 days"},{"ar":"80 يوماً","en":"80 days"},{"ar":"180 يوماً","en":"180 days"}],"a":1,"ex":{"ar":"أمر قضائي لمدة 80 يوماً.","en":"An 80-day injunction."}},{"t":"q","q":{"ar":"يجوز الاستبدال الدائم للعمال في:","en":"Permanent replacement is allowed in:"},"opts":[{"ar":"إضراب ULP","en":"A ULP strike"},{"ar":"الإضراب الجامح فقط","en":"A wildcat strike only"},{"ar":"الإضراب الاقتصادي","en":"An economic strike"}],"a":2,"ex":{"ar":"فقط في الإضراب الاقتصادي.","en":"Only in an economic strike."}},{"t":"q","q":{"ar":"عند انتهاء «إضراب ULP» يحقّ للعمال:","en":"At the end of a ULP strike, workers are entitled to:"},"opts":[{"ar":"العودة لوظائفهم (إعادة التعيين)","en":"Reinstatement to their jobs"},{"ar":"تعويض فقط","en":"Compensation only"},{"ar":"لا شيء","en":"Nothing"}],"a":0,"ex":{"ar":"حق إعادة التعيين.","en":"A right to reinstatement."}},{"t":"q","q":{"ar":"«بند الحفاظ على العضوية» (Maintenance of Membership):","en":"A maintenance-of-membership clause:"},"opts":[{"ar":"يلغي العضوية","en":"Cancels membership"},{"ar":"يُلزم بالبقاء عضواً طوال مدة العقد","en":"Requires staying a member during the contract"},{"ar":"يمنع الانضمام","en":"Bars joining"}],"a":1,"ex":{"ar":"البقاء عضواً طوال العقد.","en":"Remaining a member for the contract term."}}]},{"id":"org-labor-4","ar":"الإطار القانوني والتظلّمات","en":"Legal Framework & Grievances","icon":"📙","boss":true,"segs":[{"t":"t","h":{"ar":"الإطار القانوني والتظلّمات","en":"Legal Framework & Grievances"},"body":{"ar":"يقوم قانون علاقات العمل على ثلاثة قوانين: واغنر (NLRA, 1935) الذي كفل حق التنظيم وحدّد ممارسات صاحب العمل غير العادلة (8a)؛ وTaft-Hartley (1947) الذي أضاف ممارسات النقابات غير العادلة (8b) وحظر المتجر المغلق؛ وLandrum-Griffin (1959) الذي وضع وثيقة حقوق لأعضاء النقابات وفرض الشفافية. ويُحلّ النزاع اليومي عبر إجراء التظلّم المنتهي غالباً بالتحكيم، مع حقوق Weingarten وواجب التمثيل العادل.","en":"US labor law rests on three statutes: Wagner (NLRA, 1935) guaranteed organizing and defined employer unfair labor practices (8a); Taft-Hartley (1947) added union unfair practices (8b) and banned the closed shop; Landrum-Griffin (1959) created a union members bill of rights and required transparency. Daily disputes are resolved through the grievance procedure, usually ending in arbitration, with Weingarten rights and the duty of fair representation."}},{"t":"q","q":{"ar":"في أي عام صدر قانون واغنر (NLRA)؟","en":"In what year was the Wagner Act (NLRA) enacted?"},"opts":[{"ar":"1935","en":"1935"},{"ar":"1947","en":"1947"},{"ar":"1964","en":"1964"}],"a":0,"ex":{"ar":"NLRA عام 1935.","en":"The NLRA in 1935."}},{"t":"q","q":{"ar":"تكفل المادة 7 من NLRA حقّ:","en":"NLRA Section 7 guarantees the right to:"},"opts":[{"ar":"تحديد الأجور","en":"Set wages"},{"ar":"التنظيم والمفاوضة والنشاط الجماعي","en":"Organize, bargain, and engage in concerted activity"},{"ar":"الفصل","en":"Terminate"}],"a":1,"ex":{"ar":"حقوق التنظيم الأساسية.","en":"Core organizing rights."}},{"t":"q","q":{"ar":"تتناول المادة 8(a):","en":"Section 8(a) addresses:"},"opts":[{"ar":"ممارسات النقابات غير العادلة","en":"Union unfair practices"},{"ar":"الأجور","en":"Wages"},{"ar":"ممارسات صاحب العمل غير العادلة","en":"Employer unfair labor practices"}],"a":2,"ex":{"ar":"ULPs الخاصة بصاحب العمل.","en":"Employer ULPs."}},{"t":"q","q":{"ar":"في أي عام صدر قانون Taft-Hartley؟","en":"In what year was Taft-Hartley enacted?"},"opts":[{"ar":"1947","en":"1947"},{"ar":"1935","en":"1935"},{"ar":"1959","en":"1959"}],"a":0,"ex":{"ar":"Taft-Hartley عام 1947.","en":"Taft-Hartley in 1947."}},{"t":"q","q":{"ar":"أضاف Taft-Hartley:","en":"Taft-Hartley added:"},"opts":[{"ar":"حق التنظيم","en":"The right to organize"},{"ar":"ممارسات النقابات غير العادلة (8b)","en":"Union unfair labor practices (8b)"},{"ar":"الحد الأدنى للأجر","en":"The minimum wage"}],"a":1,"ex":{"ar":"وازن القانون بين الطرفين.","en":"It balanced the law between parties."}},{"t":"q","q":{"ar":"في أي عام صدر Landrum-Griffin؟","en":"In what year was Landrum-Griffin enacted?"},"opts":[{"ar":"1935","en":"1935"},{"ar":"1947","en":"1947"},{"ar":"1959","en":"1959"}],"a":2,"ex":{"ar":"Landrum-Griffin عام 1959.","en":"Landrum-Griffin in 1959."}},{"t":"q","q":{"ar":"يضع Landrum-Griffin:","en":"Landrum-Griffin establishes:"},"opts":[{"ar":"وثيقة حقوق لأعضاء النقابات وشفافية مالية","en":"A union members bill of rights and financial transparency"},{"ar":"الحد الأدنى للأجر","en":"The minimum wage"},{"ar":"عتبة Title VII","en":"The Title VII threshold"}],"a":0,"ex":{"ar":"ديمقراطية وشفافية النقابات.","en":"Union democracy and transparency."}},{"t":"q","q":{"ar":"يتكوّن مجلس NLRB من:","en":"The NLRB consists of:"},"opts":[{"ar":"قاضٍ واحد","en":"A single judge"},{"ar":"مجلس من الأعضاء ومستشار عام","en":"A board of members and a General Counsel"},{"ar":"ممثّلي النقابات فقط","en":"Union reps only"}],"a":1,"ex":{"ar":"مجلس + مستشار عام للإنفاذ.","en":"A board plus a General Counsel."}},{"t":"q","q":{"ar":"مثال على ممارسة صاحب عمل غير عادلة:","en":"An example of an employer unfair labor practice:"},"opts":[{"ar":"دفع الأجور","en":"Paying wages"},{"ar":"عقد اجتماعات","en":"Holding meetings"},{"ar":"التمييز ضد موظف لنشاطه النقابي","en":"Discriminating against an employee for union activity"}],"a":2,"ex":{"ar":"التمييز لمنع النشاط النقابي.","en":"Discrimination to deter union activity."}},{"t":"q","q":{"ar":"مثال على ممارسة نقابية غير عادلة:","en":"An example of a union unfair labor practice:"},"opts":[{"ar":"إكراه العمال أو المقاطعة الثانوية","en":"Coercing employees or a secondary boycott"},{"ar":"تنظيم انتخاب","en":"Organizing an election"},{"ar":"تقديم تظلّم","en":"Filing a grievance"}],"a":0,"ex":{"ar":"إكراه العمال أو المقاطعة الثانوية.","en":"Coercion or secondary boycotts."}},{"t":"q","q":{"ar":"تكفل حقوق Weingarten:","en":"Weingarten rights guarantee:"},"opts":[{"ar":"زيادة الأجر","en":"A pay raise"},{"ar":"حضور ممثل نقابي في مقابلة تأديبية","en":"A union rep in a disciplinary interview"},{"ar":"إجازة","en":"Leave"}],"a":1,"ex":{"ar":"حضور ممثل عند التحقيق التأديبي.","en":"A rep during disciplinary questioning."}},{"t":"q","q":{"ar":"«واجب التمثيل العادل» يُلزم النقابة بـ:","en":"The duty of fair representation requires the union to:"},"opts":[{"ar":"تمثيل الأعضاء فقط","en":"Represent members only"},{"ar":"تجاهل الشكاوى","en":"Ignore complaints"},{"ar":"تمثيل كل عمال الوحدة بإنصاف ودون تمييز","en":"Represent all unit employees fairly and without discrimination"}],"a":2,"ex":{"ar":"تمثيل عادل للجميع.","en":"Fair representation for all."}},{"t":"q","q":{"ar":"«النشاط الجماعي المحمي» (Concerted Activity):","en":"Protected concerted activity is:"},"opts":[{"ar":"محمي حتى دون وجود نقابة","en":"Protected even without a union"},{"ar":"محمي فقط مع نقابة","en":"Protected only with a union"},{"ar":"غير محمي","en":"Unprotected"}],"a":0,"ex":{"ar":"يحمي العمل الجماعي حتى بلا نقابة.","en":"It protects group action even non-union."}},{"t":"q","q":{"ar":"«التظلّم» (Grievance) هو:","en":"A grievance is:"},"opts":[{"ar":"إضراب","en":"A strike"},{"ar":"شكوى رسمية بشأن انتهاك العقد","en":"A formal complaint about a contract violation"},{"ar":"انتخاب","en":"An election"}],"a":1,"ex":{"ar":"آلية حلّ نزاعات تطبيق العقد.","en":"A mechanism to resolve contract disputes."}},{"t":"q","q":{"ar":"الخطوة الأخيرة في إجراء التظلّم غالباً:","en":"The final step in the grievance procedure is usually:"},"opts":[{"ar":"الإضراب","en":"A strike"},{"ar":"الفصل","en":"Termination"},{"ar":"التحكيم المُلزِم","en":"Binding arbitration"}],"a":2,"ex":{"ar":"تحكيم مُلزِم لطرف محايد.","en":"Binding arbitration by a neutral."}},{"t":"q","q":{"ar":"مبدأ «السبب العادل» (Just Cause) في التأديب يتطلّب:","en":"Just cause in discipline requires:"},"opts":[{"ar":"سبباً عادلاً وإجراءات منصفة","en":"A fair reason and fair process"},{"ar":"قرار المدير فقط","en":"A manager decision only"},{"ar":"موافقة النقابة المسبقة","en":"Prior union approval"}],"a":0,"ex":{"ar":"سبب عادل + إجراءات منصفة.","en":"Fair reason plus fair process."}},{"t":"q","q":{"ar":"«المندوب النقابي» (Steward) هو:","en":"A union steward is:"},"opts":[{"ar":"مدير الموارد البشرية","en":"The HR manager"},{"ar":"ممثل النقابة في موقع العمل","en":"The union representative at the workplace"},{"ar":"المحكّم","en":"The arbitrator"}],"a":1,"ex":{"ar":"يمثّل العمال يومياً في الموقع.","en":"Represents workers day-to-day on site."}},{"t":"q","q":{"ar":"«العُرف المتّبع» (Past Practice):","en":"Past practice:"},"opts":[{"ar":"لا قيمة له","en":"Has no weight"},{"ar":"يُلغي العقد","en":"Voids the contract"},{"ar":"عادة راسخة قد تُلزم الطرفين","en":"An established custom that may bind the parties"}],"a":2,"ex":{"ar":"العادة الراسخة قد تكتسب قوة إلزام.","en":"Established custom can become binding."}},{"t":"q","q":{"ar":"تسمح المادة 8(c) لصاحب العمل بـ:","en":"Section 8(c) allows the employer to:"},"opts":[{"ar":"التعبير عن رأيه دون تهديد أو وعد","en":"Express views without threat or promise"},{"ar":"التهديد","en":"Threaten"},{"ar":"الاستجواب","en":"Interrogate"}],"a":0,"ex":{"ar":"حرية تعبير دون إكراه.","en":"Free speech without coercion."}},{"t":"q","q":{"ar":"من سبل علاج NLRB للممارسة غير العادلة:","en":"An NLRB remedy for an unfair labor practice includes:"},"opts":[{"ar":"غرامة جنائية","en":"A criminal fine"},{"ar":"أمر بالكفّ والإعادة للعمل ودفع الأجور المتأخّرة","en":"Cease-and-desist, reinstatement, and back pay"},{"ar":"السجن","en":"Imprisonment"}],"a":1,"ex":{"ar":"كفّ + إعادة + أجور متأخّرة.","en":"Cease-and-desist, reinstatement, back pay."}}]},{"id":"org-design","ar":"هيكل وتصميم المنظمة","en":"Structure & Design","icon":"🏛️","boss":false,"segs":[{"t":"t","h":{"ar":"هيكل وتصميم المنظمة","en":"Organizational Structure & Design"},"body":{"ar":"يحدّد تصميم المنظمة كيفية تقسيم العمل وتنسيقه. تتراوح الهياكل بين الوظيفي (تجميع حسب التخصّص) والتقسيمي (حسب المنتج/المنطقة/العميل) والمصفوفي (سلطة مزدوجة)، وبين «الميكانيكي» المركزي عالي الرسمية و«العضوي» المرن. وتتشكّل هذه الخيارات بعوامل: الاستراتيجية والحجم والتقنية والبيئة. ومن مفاهيمها الأساسية: نطاق الإشراف (يحدّد ارتفاع/تسطّح الهيكل)، ووحدة الأمر، والمركزية مقابل اللامركزية، والرسمية، والتفرقة بين المناصب التنفيذية والاستشارية.","en":"Organizational design defines how work is divided and coordinated. Structures range from functional (grouped by specialty) to divisional (by product/region/customer) to matrix (dual authority), and from mechanistic (centralized, highly formal) to organic (flexible). These choices are shaped by strategy, size, technology, and environment. Core concepts include span of control (driving a tall or flat structure), unity of command, centralization vs decentralization, formalization, and the line-vs-staff distinction."}},{"t":"q","q":{"ar":"«الهيكل التنظيمي» (Organizational Structure):","en":"Organizational structure is:"},"opts":[{"ar":"كيفية تقسيم العمل وتنسيق المهام والسلطة","en":"How work is divided and tasks and authority are coordinated"},{"ar":"قائمة الرواتب","en":"The payroll list"},{"ar":"شعار الشركة","en":"The company logo"}],"a":0,"ex":{"ar":"إطار توزيع العمل والسلطة.","en":"The framework of work and authority."}},{"t":"q","q":{"ar":"«الهيكل الوظيفي» (Functional) يجمّع الموظفين حسب:","en":"A functional structure groups employees by:"},"opts":[{"ar":"المنتج","en":"Product"},{"ar":"التخصّص/الوظيفة (تسويق، مالية)","en":"Specialty/function (marketing, finance)"} usually yields a structure that is:"},"opts":[{"ar":"مسطّح (مستويات أقل)","en":"Flatter (fewer levels)"},{"ar":"طويل جداً","en":"Very tall"},{"ar":"بلا أثر","en":"Unaffected"}],"a":0,"ex":{"ar":"مرؤوسون أكثر لكل مدير ← تسطّح.","en":"More reports per manager means flatter."}},{"t":"q","q":{"ar":"«المنظمة الشبكية» (Network/Virtual):","en":"A network/virtual organization:"},"opts":[{"ar":"كل العمل داخلي","en":"All work is internal"},{"ar":"تعتمد على شراكات وإسناد خارجي للوظائف","en":"Relies on partnerships and outsourcing functions"},{"ar":"بلا تقنية","en":"No technology"}],"a":1,"ex":{"ar":"نواة صغيرة وشركاء كثر.","en":"A small core with many partners."}},{"t":"q","q":{"ar":"مبدأ «وحدة الأمر» (Unity of Command):","en":"The unity-of-command principle means:"},"opts":[{"ar":"عدة رؤساء للموظف","en":"Multiple bosses per employee"},{"ar":"لا رؤساء","en":"No bosses"},{"ar":"رئيس مباشر واحد لكل موظف","en":"One direct supervisor per employee"}],"a":2,"ex":{"ar":"يقلّل تعارض التعليمات.","en":"It reduces conflicting orders."}},{"t":"q","q":{"ar":"من العوامل المؤثّرة في تصميم المنظمة:","en":"A factor shaping organizational design is:"},"opts":[{"ar":"الاستراتيجية والحجم والتقنية والبيئة","en":"Strategy, size, technology, and environment"},{"ar":"لون الشعار","en":"Logo color"},{"ar":"اسم الشركة","en":"Company name"}],"a":0,"ex":{"ar":"الهيكل يتبع هذه العوامل.","en":"Structure follows these factors."}},{"t":"q","q":{"ar":"«البيروقراطية» (وفق فيبر):","en":"Bureaucracy (per Weber) is:"},"opts":[{"ar":"فوضى تنظيمية","en":"Organizational chaos"},{"ar":"هيكل بقواعد واضحة وتسلسل هرمي وتخصّص","en":"A structure with clear rules, hierarchy, and specialization"},{"ar":"غياب القواعد","en":"No rules"}],"a":1,"ex":{"ar":"كفاءة عبر القواعد والتسلسل.","en":"Efficiency via rules and hierarchy."}},{"t":"q","q":{"ar":"«تقليل المستويات» (Delayering):","en":"Delayering is:"},"opts":[{"ar":"إضافة مديرين","en":"Adding managers"},{"ar":"زيادة الطبقات","en":"Adding layers"},{"ar":"إزالة مستويات إدارية لت hat turn data into insight and predictive decisions, while safeguarding data privacy and security and the ethics of AI."}},{"t":"q","q":{"ar":"«إدارة القوى العاملة» (Workforce Management):","en":"Workforce management is:"},"opts":[{"ar":"ضمان توفّر العدد والمهارات المناسبة في الوقت المناسب","en":"Ensuring the right number and skills at the right time"},{"ar":"التسويق","en":"Marketing"},{"ar":"المحاسبة","en":"Accounting"}],"a":0,"ex":{"ar":"مواءمة العرض مع احتياج العمل.","en":"Matching supply to business need."}},{"t":"q","q":{"ar":"«التغيّب» (Absenteeism) المرتفع قد يشير إلى:","en":"High absenteeism may signal:"},"opts":[{"ar":"أداء ممتاز","en":"Excellent performance"},{"ar":"مشكلات انخراط أو صحة أو بيئة عمل","en":"Engagement, health, or work-environment issues"},{"ar":"زيادة الإنتاجية","en":"Higher productivity"}],"a":1,"ex":{"ar":"مؤشّر إنذار يستحق التحليل.","en":"A warning sign worth analyzing."}},{"t":"q","q":{"ar":"«القوى العاملة المرنة» (Contingent Workforce):","en":"A contingent workforce is:"},"opts":[{"ar":"موظفون دائمون فقط","en":"Permanent staff only"},{"ar":"متطوّعون","en":"Volunteers"},{"ar":"عمالة مؤقتة/تعاقدية/حرّة حسب الحاجة","en":"Temporary, contract, or freelance workers as needed"}],"a":2,"ex":{"ar":"مرونة في القدرة البشرية.","en":"Flexibility in human capacity."}},{"t":"q","q":{"ar":"«نظام معلومات الموارد البشرية» (HRIS):","en":"An HRIS is:"},"opts":[{"ar":"نظام يدير بيانات الموظفين وعمليات HR","en":"A system managing employee data and HR processes"},{"ar":"برنامج محاسبة","en":"Accounting software"},{"ar":"موقع تسويقي","en":"A marketing site"}],"a":0,"ex":{"ar":"العمود الفقري لبيانات HR.","en":"The backbone of HR data."}},{"t":"q","q":{"ar":"«نظام تتبّع المتقدّمين» (ATS):","en":"An Applicant Tracking System (ATS):"},"opts":[{"ar":"يدير الرواتب","en":"Manages payroll"},{"ar":"يدير طلبات التوظيف ويفرز المرشّحين","en":"Manages applications and screens candidates"},{"ar":"يقيس الأداء","en":"Measures performance"}],"a":1,"ex":{"ar":"يؤتمت مسار التوظيف.","en":"It automates the hiring funnel."}},{"t":"q","q":{"ar":"«تحليلات الموارد البشرية» (People Analytics):","en":"People analytics is:"},"opts":[{"ar":"حدس فقط","en":"Intuition only"},{"ar":"أرشفة الورق","en":"Paper archiving"},{"ar":"تحويل بيانات HR إلى رؤى لدعم القرار","en":"Turning HR data into insight for decisions"}],"a":2,"ex":{"ar":"قرارات مبنية على الأدلة.","en":"Evidence-based decisions."}},{"t":"q","q":{"ar":"«التحليلات التنبّؤية» (Predictive Analytics) في HR:","en":"Predictive analytics in HR:"},"opts":[{"ar":"تتنبّأ بنتائج مستقبلية كالدوران من البيانات","en":"Forecast future outcomes like turnover from data"},{"ar":"تصف الماضي فقط","en":"Describe only the past"},{"ar":"تلغي القرار","en":"Eliminate decisions"}],"a":0,"ex":{"ar":"استباق المشكلات قبل وقوعها.","en":"Anticipating issues before they occur."}},{"t":"q","q":{"ar":"«الخدمة الذاتية للموظف» (ESS):","en":"Employee self-service (ESS):"},"opts":[{"ar":"يقوم بها HR فقط","en":"Done by HR only"},{"ar":"تتيح للموظف إدارة بياناته وطلباته بنفسه","en":"Lets the employee manage their own data and requests"},{"ar":"ورقية فقط","en":"Paper only"}],"a":1,"ex":{"ar":"تقلّل العبء الإداري.","en":"It cuts administrative load."}},{"t":"q","q":{"ar":"«لوحات معلومات HR» (Dashboards):","en":"HR dashboards are:"},"opts":[{"ar":"ملفات ورقية","en":"Paper files"},{"ar":"اجتماعات","en":"Meetings"},{"ar":"عرض بصري لمؤشّرات HR لحظياً لدعم القرار","en":"A visual real-time display of HR metrics for decisions"}],"a":2,"ex":{"ar":"رؤية فورية للمؤشّرات.","en":"Instant visibility of metrics."}},{"t":"q","q":{"ar":"عند إدارة بيانات الموظفين يجب:","en":"When managing employee data, you must:"},"opts":[{"ar":"حمايتها وضمان الخصوصية والأمن والامتثال","en":"Protect them, ensuring privacy, security, and compliance"},{"ar":"نشرها","en":"Publish them"},{"ar":"بيعها","en":"Sell them"}],"a":0,"ex":{"ar":"مسؤولية قانونية وأخلاقية.","en":"A legal and ethical duty."}},{"t":"q","q":{"ar":"عند استخدام الذكاء الاصطناعي في التوظيف يجب الحذر من:"," Accurately track work hours and attendance"},{"ar":"تصمّم الإعلانات","en":"Design ads"},{"ar":"تدير المخزون","en":"Manage inventory"}],"a":0,"ex":{"ar":"دقّة الأجر والامتثال.","en":"Pay accuracy and compliance."}},{"t":"q","q":{"ar":"«إدارة التغيير» (Change Management) تهدف إلى:","en":"Change management aims to:"},"opts":[{"ar":"مقاومة التغيير","en":"Resist change"},{"ar":"قيادة الأفراد والمنظمة عبر التحوّل بفاعلية","en":"Lead people and the organization through transition effectively"},{"ar":"تجميد العمل","en":"Freeze work"}],"a":1,"ex":{"ar":"تقليل المقاومة وضمان التبنّي.","en":"Reduce resistance and ensure adoption."}},{"t":"q","q":{"ar":"من أمثلة «مقاييس HR» (HR Metrics):","en":"An example of an HR metric is:"},"opts":[{"ar":"لون الشعار","en":"Logo color"},{"ar":"اسم الشركة","en":"Company name"},{"ar":"معدّل الدوران وزمن الإشغال وتكلفة التعيين","en":"Turnover rate, time to fill, cost per hire"}],"a":2,"ex":{"ar":"أرقام تقيس فاعلية HR.","en":"Numbers measuring HR effectiveness."}},{"t":"q","q":{"ar":"«اتخاذ القرار المبني على البيانات» في HR:","en":"Data-driven decision-making in HR means:"},"opts":[{"ar":"الاعتماد على الأدلة لا الحدس وحده","en":"Relying on evidence, not intuition alone"},{"ar":"التخمين","en":"Guessing"},{"ar":"تجاهل البيانات","en":"Ignoring data"}],"a":0,"ex":{"ar":"الأدلة تقود القرار.","en":"Evidence guides the decision."}},{"t":"q","q":{"ar":"«أمن بيانات HR» يتطلّب:","en":"HR data security requires:"},"opts":[{"ar":"مشاركتها مع الجميع","en":"Sharing with everyone"},{"ar":"ضوابط وصول وتشفير وامتثال لحماية البيانات","en":"Access controls, encryption, and data-protection compliance"},{"ar":"تجاهل المخاطر","en":"Ignoring risks"}],"a":1,"ex":{"ar":"حماية متعدّدة الطبقات.","en":"Layered protection."}}]}]},{"id":"wp","ar":"بيئة العمل","en":"Workplace","sub_ar":"قانون العمل والمخاطر","sub_en":"Law & risk","icon":"🌐","c":"#d4af37","cl":"#3a2f10","chapters":[{"id":"wp-law-1","ar":"تكافؤ فرص العمل (EEO)","en":"Equal Employment Opportunity","icon":"📑","boss":false,"segs":[{"t":"t","h":{"ar":"تكافؤ فرص العمل (EEO)","en":"Equal Employment Opportunity"},"body":{"ar":"تكافؤ فرص العمل أساس قانون العمل الأمريكي. الباب السابع (Title VII) من قانون الحقوق المدنية 1964 هو حجر الزاوية: يحظر التمييز في كل قرارات التوظيف بسبب العِرق واللون والدين والجنس والأصل القومي، وينطبق على من لديهم 15 موظفاً فأكثر. ويأخذ التمييز شكلين: «المعاملة المتباينة» (تمييز متعمّد ضد فرد)، و«الأثر المتباين» (سياسة محايدة ظاهرياً تضرّ فئة محمية بشكل غير متناسب، ويُقاس بقاعدة الأربعة أخماس). وتشرف هيئة EEOC على الإنفاذ.","en":"Equal employment opportunity is the foundation of US employment law. Title VII of the Civil Rights Act of 1964 is the cornerstone: it bans discrimination in all employment decisions based on race, color, religion, sex, and national origin, applying to employers with 15 or more employees. Discrimination takes two forms: disparate treatment (intentional bias against an individual) and disparate impact (a facially neutral policy that disproportionately harms a protected group, measured by the four-fifths rule). The EEOC enforces these protections."}},{"t":"q","q":{"ar":"في أي عام صدر الباب السابع (Title VII)؟","en":"In what year was Title VII enacted?"},"opts":[{"ar":"1964","en":"1964"},{"ar":"1991","en":"1991"},{"ar":"1938","en":"1938"}],"a":0,"ex":{"ar":"الباب السابع من قانون الحقوق المدنية 1964.","en":"Title VII of the Civil Rights Act of 1964."}},{"t":"q","q":{"ar":"ينطبق Title VII على أصحاب العمل الذين لديهم:","en":"Title VII applies to employers with:"},"opts":[{"ar":"موظف فأكثر","en":"1+ employee"},{"ar":"15 موظفاً فأكثر","en":"15+ employees"},{"ar":"50 موظفاً فأكثر","en":"50+ employees"}],"a":1,"ex":{"ar":"عتبة Title VII هي 15.","en":"The Title VII threshold is 15."}},{"t":"q","q":{"ar":"كم عدد الفئات المحمية في Title VII؟","en":"How many protected classes does Title VII list?"},"opts":[{"ar":"ثلاث","en":"Three"},{"ar":"أربع","en":"Four"},{"ar":"خمس: العِرق واللون والدين والجنس والأصل القومي","en":"Five: race, color, religion, sex, national origin"}],"a":2,"ex":{"ar":"خمس فئات محمية.","en":"Five protected classes."}},{"t":"q","q":{"ar":"أي مما يلي ليس فئة محمية في Title VII؟","en":"Which is NOT a protected class under Title VII?"},"opts":[{"ar":"السن","en":"Age"},{"ar":"الدين","en":"Religion"},{"ar":"الجنس","en":"Sex"}],"a":0,"ex":{"ar":"السن يحميه ADEA لا Title VII.","en":"Age is protected by the ADEA."}},{"t":"q","q":{"ar":"بعد قرار Bostock 2020 أصبح «الجنس» يشمل:","en":"After Bostock (2020), “sex” now includes:"},"opts":[{"ar":"الحالة الاجتماعية","en":"Marital status"},{"ar":"التوجّه الجنسي والهوية الجندرية","en":"Sexual orientation and gender identity"},{"ar":"الجنسية","en":"Citizenship"}],"a":1,"ex":{"ar":"وسّع Bostock الحماية للتوجّه والهوية.","en":"Bostock extended protection to orientation and identity."}},{"t":"q","q":{"ar":"«المعاملة المتباينة» (Disparate Treatment) تعني:","en":"Disparate treatment means:"},"opts":[{"ar":"سياسة محايدة تضرّ فئة","en":"A neutral policy harming a group"},{"ar":"تعديلاً معقولاً","en":"Reasonable accommodation"},{"ar":"معاملة فرد بشكل مختلف عمداً بسبب فئة محمية","en":"Intentionally treating an individual differently due to a protected class"}],"a":2,"ex":{"ar":"تمييز متعمّد مباشر.","en":"Intentional, direct discrimination."}},{"t":"q","q":{"ar":"«الأثر المتباين» (Disparate Impact) يعني:","en":"Disparate impact means:"},"opts":[{"ar":"سياسة محايدة ظاهرياً تضرّ فئة محمية بشكل غير متناسب","en":"A facially neutral policy disproportionately harming a protected group"},{"ar":"تمييزاً متعمّداً","en":"Intentional bias"},{"ar":"BFOQ","en":"BFOQ"}],"a":0,"ex":{"ar":"تمييز غير مقصود ناتج عن سياسة محايدة.","en":"Unintentional impact from a neutral policy."}},{"t":"q","q":{"ar":"اختير 50% من الذكور و30% من الإناث (30÷50=60%). ماذا يعني؟","en":"50% of men and 30% of women were selected (30/50=60%). This indicates:"},"opts":[{"ar":"لا مشكلة","en":"No issue"},{"ar":"مؤشّر أثر تمييزي (أقل من 80%)","en":"Adverse-impact indicator (below 80%)"},{"ar":"تمييزاً مقصوداً مؤكَّداً","en":"Proven intent"}],"a":1,"ex":{"ar":"60% أقل من 80% ⇒ مؤشّر أثر تمييزي.","en":"60% is below 80%, an adverse-impact indicator."}},{"t":"q","q":{"ar":"قاعدة الأربعة أخماس هي:","en":"The four-fifths rule is:"},"opts":[{"ar":"إثبات قاطع للتمييز","en":"Conclusive proof of discrimination"},{"ar":"قاعدة لتحديد الأجور","en":"A wage-setting rule"},{"ar":"مؤشّر يستوجب المراجعة لا إثبات قاطع","en":"An indicator requiring review, not proof"}],"a":2,"ex":{"ar":"مؤشّر فقط لا دليل قاطع.","en":"An indicator only, not conclusive."}},{"t":"q","q":{"ar":"المؤهّل المهني الحقيقي (BFOQ) هو:","en":"A BFOQ is:"},"opts":[{"ar":"استثناء يجيز التمييز حين تكون الصفة ضرورية للوظيفة","en":"An exception permitting bias when a trait is essential to the job"},{"ar":"قاعدة أجور","en":"A pay rule"},{"ar":"نوع إجازة","en":"A type of leave"}],"a":0,"ex":{"ar":"استثناء ضيّق محدّد.","en":"A narrow, specific exception."}},{"t":"q","q":{"ar":"لا ينطبق استثناء BFOQ أبداً على:","en":"A BFOQ exception never applies to:"},"opts":[{"ar":"الجنس","en":"Sex"},{"ar":"العِرق","en":"Race"},{"ar":"السن","en":"Age"}],"a":1,"ex":{"ar":"لا يُبرّر التمييز العِرقي إطلاقاً.","en":"It never justifies racial discrimination."}},{"t":"q","q":{"ar":"ما دور هيئة تكافؤ فرص العمل (EEOC)؟","en":"What is the role of the EEOC?"},"opts":[{"ar":"تحديد الأجور","en":"Setting wages"},{"ar":"تنظيم النقابات","en":"Regulating unions"},{"ar":"إنفاذ قوانين تكافؤ الفرص","en":"Enforcing EEO laws"}],"a":2,"ex":{"ar":"الجهة المنفّذة لقوانين مكافحة التمييز.","en":"The agency enforcing anti-discrimination laws."}},{"t":"q","q":{"ar":"المهلة الأساسية لتقديم شكوى لدى EEOC:","en":"The basic deadline to file a charge with the EEOC:"},"opts":[{"ar":"180 يوماً (أو 300 مع وكالة ولاية)","en":"180 days (or 300 with a state agency)"},{"ar":"سنتان","en":"Two years"},{"ar":"30 يوماً","en":"30 days"}],"a":0,"ex":{"ar":"180 يوماً، تمتد إلى 300 مع وكالة ولاية.","en":"180 days, extended to 300 with a state agency."}},{"t":"q","q":{"ar":"معاقبة موظف لتقديمه شكوى تمييز تُسمّى:","en":"Punishing an employee for filing a discrimination complaint is:"},"opts":[{"ar":"تعديلاً معقولاً","en":"Reasonable accommodation"},{"ar":"انتقاماً وهو محظور","en":"Retaliation, which is prohibited"},{"ar":"BFOQ","en":"BFOQ"}],"a":1,"ex":{"ar":"الانتقام من ممارسة حق محمي محظور.","en":"Retaliation for protected activity is illegal."}},{"t":"q","q":{"ar":"اشتراط مشرف منفعةً مقابل قرار وظيفي يُعدّ مضايقة:","en":"A supervisor conditioning a job decision on a favor is harassment of type:"},"opts":[{"ar":"بيئة عدائية","en":"Hostile environment"},{"ar":"غير محظورة","en":"Not prohibited"},{"ar":"«هذا مقابل ذاك» (Quid Pro Quo)","en":"Quid pro quo"}],"a":2,"ex":{"ar":"ربط قرار وظيفي بقبول تحرّش.","en":"Tying a job decision to accepting harassment."}},{"t":"q","q":{"ar":"سلوك مسيء متكرّر يخلق جوّاً مهيناً يُعدّ:","en":"Pervasive offensive conduct creating a degrading climate is:"},"opts":[{"ar":"بيئة العمل العدائية (Hostile Work Environment)","en":"Hostile work environment"},{"ar":"«هذا مقابل ذاك»","en":"Quid pro quo"},{"ar":"BFOQ","en":"BFOQ"}],"a":0,"ex":{"ar":"بيئة عمل عدائية شكل من أشكال المضايقة.","en":"A hostile environment is a form of harassment."}},{"t":"q","q":{"ar":"بعد قرار Groff (2023) يُعفى صاحب العمل من التعديل الديني إذا سبّب:","en":"After Groff (2023), an employer is excused from religious accommodation only if it causes:"},"opts":[{"ar":"أي تكلفة بسيطة (de minimis)","en":"Any minimal (de minimis) cost"},{"ar":"زيادة كبيرة في تكلفة إدارة العمل","en":"A substantial increased cost to the business"},{"ar":"أي إزعاج","en":"Any inconvenience"}],"a":1,"ex":{"ar":"رفع Groff المعيار من de minimis إلى تكلفة كبيرة.","en":"Groff raised the bar from de minimis to substantial cost."}},{"t":"q","q":{"ar":"أتاح قانون الحقوق المدنية 1991:","en":"The Civil Rights Act of 1991 introduced:"},"opts":[{"ar":"إلغاء Title VII","en":"Repeal of Title VII"},{"ar":"خفض التعويضات","en":"Reduced damages"},{"ar":"المحاكمة أمام محلّفين وتعويضات تعويضية/تأديبية","en":"Jury trials and compensatory/punitive damages"}],"a":2,"ex":{"ar":"أضاف المحلّفين والتعويضات بسقوف حسب الحجم.","en":"Added jury trials and capped damages."}},{"t":"q","q":{"ar":"إطار «نقل عبء الإثبات» في قضايا المعاملة المتباينة يُعرف بـ:","en":"The burden-shifting framework in disparate-treatment cases is:"},"opts":[{"ar":"McDonnell Douglas","en":"McDonnell Douglas"},{"ar":"Faragher-Ellerth","en":"Faragher-Ellerth"},{"ar":"Griggs","en":"Griggs"}],"a":0,"ex":{"ar":"إطار McDonnell Douglas لنقل عبء الإثبات.","en":"The McDonnell Douglas burden-shifting framework."}},{"t":"q","q":{"ar":"دفاع صاحب العمل بأن المعيار ضروري لأداء الوظيفة في قضايا الأثر التمييزي:","en":"In disparate-impact cases, the employer defense that a standard is job-necessary is:"},"opts":[{"ar":"BFOQ","en":"BFOQ"},{"ar":"الضرورة المهنية (Business Necessity)","en":"Business necessity"},{"ar":"الأقدمية","en":"Seniority"}],"a":1,"ex":{"ar":"الضرورة المهنية + الصلة بالوظيفة دفاع الأثر التمييزي.","en":"Business necessity and job-relatedness is the impact defense."}}]},{"id":"wp-law-2","ar":"الإعاقة والسن والحمل والوراثة","en":"Disability, Age, Pregnancy & Genetics","icon":"📗","boss":false,"segs":[{"t":"t","h":{"ar":"الإعاقة والسن والحمل والوراثة","en":"Disability, Age, Pregnancy & Genetics"},"body":{"ar":"تكمّل تكافؤَ الفرص قوانينُ تحمي فئاتٍ بعينها. قانون ذوي الإعاقة (ADA) يحظر التمييز بالإعاقة (15+)، ويُلزم بـ«تعديل معقول» يمكّن الموظف من أداء «المهام الأساسية» ما لم يسبّب «مشقّة غير معقولة». وقانون التمييز العمري (ADEA) يحمي من هم 40 فأكثر (عتبة 20 موظفاً). وقانون عدالة الحوامل العاملات (PWFA, 2023) يُلزم بتعديلات معقولة لظروف الحمل. وقانون عدم التمييز الجيني (GINA) يحظر استخدام المعلومات الوراثية في التوظيف والتأمين.","en":"Beyond general EEO, specific laws protect particular groups. The ADA bars disability discrimination (15+) and requires a reasonable accommodation enabling the employee to perform essential functions unless it causes undue hardship. The ADEA protects those 40 and older (20-employee threshold). The PWFA (2023) mandates reasonable pregnancy accommodations. GINA bars using genetic information in employment and insurance."}},{"t":"q","q":{"ar":"عتبة موظفي قانون ذوي الإعاقة (ADA):","en":"The ADA employee threshold is:"},"opts":[{"ar":"15 موظفاً","en":"15 employees"},{"ar":"موظف واحد","en":"1 employee"},{"ar":"100 موظف","en":"100 employees"}],"a":0,"ex":{"ar":"تتطابق مع عتبة Title VII.","en":"Same as Title VII."}},{"t":"q","q":{"ar":"تعريف الإعاقة وفق ADA:","en":"Definition of disability under the ADA:"},"opts":[{"ar":"أي حالة طبية مؤقتة","en":"Any temporary condition"},{"ar":"إعاقة بدنية أو ذهنية تحدّ جوهرياً من نشاط حياتي رئيس","en":"A physical or mental impairment substantially limiting a major life activity"},{"ar":"أي إصابة عمل","en":"Any work injury"}],"a":1,"ex":{"ar":"القيد الجوهري لنشاط حياتي رئيس.","en":"Substantial limitation of a major life activity."}},{"t":"q","q":{"ar":"ما أثر تعديل ADAAA لعام 2008؟","en":"What did the ADAAA of 2008 do?"},"opts":[{"ar":"ألغى ADA","en":"Repealed the ADA"},{"ar":"رفع عتبة الموظفين","en":"Raised the employee threshold"},{"ar":"وسّع تعريف الإعاقة لصالح الموظف","en":"Broadened the definition of disability in the employee favor"}],"a":2,"ex":{"ar":"وسّع نطاق من تشمله الحماية.","en":"It broadened who is covered."}},{"t":"q","q":{"ar":"«الفرد المؤهّل» وفق ADA هو من:","en":"A qualified individual under the ADA is someone who:"},"opts":[{"ar":"يؤدّي المهام الأساسية بتعديل معقول أو دونه","en":"Can perform essential functions with or without accommodation"},{"ar":"ليس لديه إعاقة","en":"Has no disability"},{"ar":"يعمل بدوام كامل فقط","en":"Works full-time only"}],"a":0,"ex":{"ar":"القدرة على أداء المهام الأساسية.","en":"Able to perform essential functions."}},{"t":"q","q":{"ar":"يُلزم ADA بتعديل معقول ما لم يسبّب:","en":"The ADA requires accommodation unless it causes:"},"opts":[{"ar":"أي تكلفة","en":"Any cost"},{"ar":"مشقّة غير معقولة (Undue Hardship)","en":"Undue hardship"},{"ar":"أي إزعاج","en":"Any inconvenience"}],"a":1,"ex":{"ar":"الإعفاء فقط عند المشقّة غير المعقولة.","en":"Relief only upon undue hardship."}},{"t":"q","q":{"ar":"«المهام الأساسية» (Essential Functions) تعني:","en":"Essential functions are:"},"opts":[{"ar":"المهام الهامشية","en":"Marginal tasks"},{"ar":"الامتيازات","en":"Perks"},{"ar":"الواجبات الجوهرية للوظيفة","en":"The fundamental duties of the job"}],"a":2,"ex":{"ar":"الواجبات الجوهرية لا الهامشية.","en":"Fundamental, not marginal, duties."}},{"t":"q","q":{"ar":"«العملية التفاعلية» في ADA هي:","en":"The interactive process under the ADA is:"},"opts":[{"ar":"حوار بحسن نية بين الطرفين لإيجاد تعديل مناسب","en":"A good-faith dialogue between both parties to find a suitable accommodation"},{"ar":"اختبار طبي إلزامي","en":"A mandatory medical test"},{"ar":"إجراء تأديبي","en":"A disciplinary procedure"}],"a":0,"ex":{"ar":"حوار تعاوني لتحديد التعديل.","en":"A collaborative dialogue to set the accommodation."}},{"t":"q","q":{"ar":"حماية «يُعامَل على أنه ذو إعاقة» (Regarded As) تشمل:","en":"The “regarded as” protection covers:"},"opts":[{"ar":"من لديه إعاقة فعلية فقط","en":"Only those with an actual disability"},{"ar":"من يُعامَل كذي إعاقة وإن لم يكن كذلك","en":"Someone treated as disabled even if they are not"},{"ar":"كبار السن فقط","en":"Only older workers"}],"a":1,"ex":{"ar":"الحماية من التصوّر الخاطئ للإعاقة.","en":"Protection from perceived disability."}},{"t":"q","q":{"ar":"متى يجوز طلب فحص طبي وفق ADA؟","en":"When may a medical exam be required under the ADA?"},"opts":[{"ar":"قبل التقديم","en":"Before applying"},{"ar":"أثناء المقابلة الأولى","en":"During the first interview"},{"ar":"بعد تقديم عرض عمل مشروط","en":"After a conditional job offer"}],"a":2,"ex":{"ar":"بعد العرض المشروط وبشكل موحّد.","en":"After a conditional offer, applied uniformly."}},{"t":"q","q":{"ar":"دفاع «التهديد المباشر» يجيز الاستبعاد إذا شكّل الموظف:","en":"The direct threat defense applies when an employee poses:"},"opts":[{"ar":"خطراً جسيماً على الصحة/السلامة لا يزيله تعديل معقول","en":"A significant health/safety risk not removable by accommodation"},{"ar":"أي إزعاج بسيط","en":"Any minor annoyance"},{"ar":"تكلفة إضافية","en":"An added cost"}],"a":0,"ex":{"ar":"خطر جسيم لا يمكن تخفيفه بتعديل.","en":"A significant, non-mitigable risk."}},{"t":"q","q":{"ar":"بعد ADAAA، التدابير المخفِّفة (كالأدوية) عند تحديد الإعاقة:","en":"Under the ADAAA, mitigating measures (e.g., medication) when determining disability are:"},"opts":[{"ar":"تُؤخذ بعين الاعتبار دائماً","en":"Always considered"},{"ar":"لا تُؤخذ بعين الاعتبار غالباً","en":"Generally NOT considered"},{"ar":"تُلغي الحماية","en":"Eliminate protection"}],"a":1,"ex":{"ar":"تُقيَّم الإعاقة بدون أثر التدابير المخفّفة (عدا النظارات).","en":"Disability is assessed without mitigating measures (except glasses)."}},{"t":"q","q":{"ar":"يحمي ADEA من التمييز العمري الأشخاص في عمر:","en":"The ADEA protects people aged:"},"opts":[{"ar":"18 فأكثر","en":"18 and older"},{"ar":"كل الأعمار","en":"All ages"},{"ar":"40 سنة فأكثر","en":"40 and older"}],"a":2,"ex":{"ar":"40 سنة فأكثر.","en":"40 and older."}},{"t":"q","q":{"ar":"عتبة موظفي قانون التمييز العمري (ADEA):","en":"The ADEA employer threshold is:"},"opts":[{"ar":"20 موظفاً","en":"20 employees"},{"ar":"15 موظفاً","en":"15 employees"},{"ar":"50 موظفاً","en":"50 employees"}],"a":0,"ex":{"ar":"20 موظفاً (أعلى من Title VII).","en":"20 employees (higher than Title VII)."}},{"t":"q","q":{"ar":"قانون OWBPA ينظّم أساساً:","en":"The OWBPA primarily governs:"},"opts":[{"ar":"الحد الأدنى للأجر","en":"Minimum wage"},{"ar":"شروط تنازل كبار السن عن دعاوى التمييز العمري","en":"Requirements for older workers waiving age claims"},{"ar":"إجازة الأمومة","en":"Maternity leave"}],"a":1,"ex":{"ar":"يشترط مهلة (21/45 يوماً) و7 أيام للإلغاء.","en":"Requires 21/45-day consideration and a 7-day revocation."}},{"t":"q","q":{"ar":"دفاع «عامل معقول غير السن» في الأثر التمييزي العمري يُسمّى:","en":"The age-impact defense that a reason is a non-age factor is:"},"opts":[{"ar":"BFOQ","en":"BFOQ"},{"ar":"الضرورة الاقتصادية","en":"Economic necessity"},{"ar":"عامل معقول غير السن (RFOA)","en":"Reasonable factor other than age (RFOA)"}],"a":2,"ex":{"ar":"دفاع RFOA في قضايا الأثر العمري.","en":"The RFOA defense in age-impact cases."}},{"t":"q","q":{"ar":"قانون التمييز بسبب الحمل (PDA, 1978) يعتبر التمييز بسبب الحمل:","en":"The Pregnancy Discrimination Act (1978) treats pregnancy bias as:"},"opts":[{"ar":"تمييزاً بسبب الجنس تحت Title VII","en":"Sex discrimination under Title VII"},{"ar":"غير محظور","en":"Not prohibited"},{"ar":"مسألة طبية فقط","en":"A medical matter only"}],"a":0,"ex":{"ar":"الحمل = تمييز جنسي تحت Title VII.","en":"Pregnancy bias is sex discrimination under Title VII."}},{"t":"q","q":{"ar":"يُلزم قانون PWFA (2023) أصحاب العمل بـ:","en":"The PWFA (2023) requires employers to provide:"},"opts":[{"ar":"فحص الحمل","en":"Pregnancy testing"},{"ar":"تعديلات معقولة لظروف الحمل والولادة","en":"Reasonable accommodations for pregnancy and childbirth"},{"ar":"فصل الحامل","en":"Termination"}],"a":1,"ex":{"ar":"تعديلات معقولة لظروف الحمل.","en":"Reasonable accommodations for pregnancy."}},{"t":"q","q":{"ar":"قانون PUMP يكفل للأمهات المرضعات:","en":"The PUMP Act guarantees nursing mothers:"},"opts":[{"ar":"إجازة سنة كاملة","en":"A full year of leave"},{"ar":"زيادة في الأجر","en":"A pay raise"},{"ar":"وقتاً ومكاناً مناسبين للضخّ","en":"Reasonable break time and a private space to pump"}],"a":2,"ex":{"ar":"وقت ومكان خاص للرضاعة/الضخّ.","en":"Break time and private space to pump."}},{"t":"q","q":{"ar":"يحظر قانون GINA التمييز بناءً على:","en":"GINA prohibits discrimination based on:"},"opts":[{"ar":"المعلومات الوراثية","en":"Genetic information"},{"ar":"السن","en":"Age"},{"ar":"الدين","en":"Religion"}],"a":0,"ex":{"ar":"المعلومات الجينية في التوظيف والتأمين.","en":"Genetic information in employment and insurance."}},{"t":"q","q":{"ar":"تشمل حماية GINA أيضاً:","en":"GINA protection also covers:"},"opts":[{"ar":"الحالة الاجتماعية","en":"Marital status"},{"ar":"التاريخ الطبي للعائلة","en":"Family medical history"},{"ar":"مستوى التعليم","en":"Education level"}],"a":1,"ex":{"ar":"التاريخ الطبي للعائلة جزء من المعلومات الجينية.","en":"Family medical history counts as genetic information."}}]},{"id":"wp-law-3","ar":"الأجور وساعات العمل","en":"Wages & Hours","icon":"📘","boss":false,"segs":[{"t":"t","h":{"ar":"الأجور وساعات العمل","en":"Wages & Hours"},"body":{"ar":"ينظّم قانون معايير العمل العادلة (FLSA) الأجور والساعات: حدّ أدنى للأجر، وأجر إضافي 1.5× عن كل ساعة بعد 40 ساعة أسبوعياً للموظفين «غير المعفيين». وللإعفاء يجب اجتياز اختباري «أساس الراتب» و«المهام»، وعتبة الراتب الحالية (2026) هي 684 دولاراً أسبوعياً بعد إبطال قاعدة 2024 قضائياً. كما ينظّم FLSA عمالة الأطفال. ويحظر قانون المساواة في الأجر فروق الأجر بين الجنسين عن عمل متماثل جوهرياً في المنشأة نفسها.","en":"The Fair Labor Standards Act (FLSA) governs wages and hours: a minimum wage and overtime at 1.5x for each hour beyond 40 per week for non-exempt employees. Exemption requires passing both the salary-basis and duties tests, and the current (2026) threshold is 684 dollars per week after the 2024 rule was vacated. FLSA also regulates child labor. The Equal Pay Act bars pay differences between the sexes for substantially equal work in the same establishment."}},{"t":"q","q":{"ar":"في أي عام صدر قانون معايير العمل العادلة (FLSA)؟","en":"In what year was the FLSA enacted?"},"opts":[{"ar":"1938","en":"1938"},{"ar":"1964","en":"1964"},{"ar":"1990","en":"1990"}],"a":0,"ex":{"ar":"صدر FLSA عام 1938.","en":"The FLSA was enacted in 1938."}},{"t":"q","q":{"ar":"أيٌّ مما يلي لا ينظّمه FLSA؟","en":"Which of these does FLSA NOT regulate?"},"opts":[{"ar":"الحد الأدنى للأجر","en":"Minimum wage"},{"ar":"التأمين الصحي","en":"Health insurance"},{"ar":"عمالة الأطفال","en":"Child labor"}],"a":1,"ex":{"ar":"التأمين الصحي ليس من نطاق FLSA.","en":"Health insurance is outside FLSA scope."}},{"t":"q","q":{"ar":"الحد الأدنى الفيدرالي للأجر (الحالي):","en":"The current federal minimum wage is:"},"opts":[{"ar":"$15.00","en":"15.00 dollars"},{"ar":"$10.00","en":"10.00 dollars"},{"ar":"$7.25","en":"7.25 dollars"}],"a":2,"ex":{"ar":"7.25 فيدرالياً، وقد تعلوه الولايات.","en":"7.25 federally; states may set higher."}},{"t":"q","q":{"ar":"معدّل أجر العمل الإضافي وفق FLSA:","en":"The FLSA overtime rate is:"},"opts":[{"ar":"1.5× بعد 40 ساعة أسبوعياً","en":"1.5x after 40 hours/week"},{"ar":"2× بعد 8 ساعات يومياً","en":"2x after 8 hours/day"},{"ar":"1× فقط","en":"1x only"}],"a":0,"ex":{"ar":"1.5× لكل ساعة بعد 40 في الأسبوع.","en":"1.5x per hour beyond 40 in a week."}},{"t":"q","q":{"ar":"الموظف «المعفى» (Exempt):","en":"An exempt employee:"},"opts":[{"ar":"يجب أن يتقاضى أجراً إضافياً","en":"Must receive overtime"},{"ar":"لا يستحقّ أجراً إضافياً","en":"Is not entitled to overtime"},{"ar":"يُدفع له بالساعة دائماً","en":"Is always paid hourly"}],"a":1,"ex":{"ar":"المعفى خارج متطلّب الأجر الإضافي.","en":"Exempt employees are outside the OT requirement."}},{"t":"q","q":{"ar":"لإثبات الإعفاء يجب اجتياز:","en":"To establish exemption, one must pass:"},"opts":[{"ar":"اختبار الراتب فقط","en":"The salary test only"},{"ar":"موافقة المدير","en":"Manager approval"},{"ar":"أساس الراتب + مستوى الراتب + المهام","en":"The salary-basis, salary-level, and duties tests"}],"a":2,"ex":{"ar":"الاختبارات الثلاثة معاً.","en":"All three tests together."}},{"t":"q","q":{"ar":"عتبة راتب الإعفاء (2026):","en":"The exemption salary threshold (2026):"},"opts":[{"ar":"$684 أسبوعياً","en":"684 dollars/week"},{"ar":"$1,128 أسبوعياً","en":"1,128 dollars/week"},{"ar":"$455 أسبوعياً","en":"455 dollars/week"}],"a":0,"ex":{"ar":"عادت إلى 684 بعد إبطال قاعدة 2024.","en":"Reverted to 684 after the 2024 rule was vacated."}},{"t":"q","q":{"ar":"من فئات الإعفاء الرئيسة (EAP):","en":"The main exemption categories (EAP) are:"},"opts":[{"ar":"الموظفون بالساعة","en":"Hourly workers"},{"ar":"التنفيذي والإداري والمهني","en":"Executive, administrative, professional"},{"ar":"المتدرّبون","en":"Interns"}],"a":1,"  follows a cycle: identify, assess, control, monitor; controls are ranked hierarchically (elimination, substitution, engineering, administrative, then PPE as a last resort). This is rounded out by safety culture, emergency plans, business continuity, and workers compensation (a no-fault system)."}},{"t":"q","q":{"ar":"في أي عام صدر قانون السلامة والصحة المهنية (OSHA)؟","en":"In what year was the OSH Act enacted?"},"opts":[{"ar":"1970","en":"1970"},{"ar":"1938","en":"1938"},{"ar":"1990","en":"1990"}],"a":0,"ex":{"ar":"OSHA عام 1970.","en":"The OSH Act in 1970."}},{"t":"q","q":{"ar":"«بند الواجب العام» يُلزم صاحب العمل بـ:","en":"The General Duty Clause requires the employer to:"},"opts":[{"ar":"دفع مكافآت","en":"Pay bonuses"},{"ar":"توفير بيئة عمل خالية من المخاطر المعروفة","en":"Provide a workplace free of recognized hazards"},{"ar":"تقديم تأمين صحي","en":"Provide health insurance"}],"a":1,"ex":{"ar":"الالتزام الأساسي في OSHA.","en":"The core OSHA obligation."}},{"t":"q","q":{"ar":"«سجل OSHA 300» يُستخدم لـ:","en":"The OSHA 300 log is used to:"},"opts":[{"ar":"الرواتب","en":"Payroll"},{"ar":"التوظيف","en":"Recruiting"},{"ar":"تسجيل الإصابات والأمراض المهنية","en":"Record work-related injuries and illnesses"}],"a":2,"ex":{"ar":"توثيق الحوادث القابلة للتسجيل.","en":"Documenting recordable incidents."}},{"t":"q","q":{"ar":"معدّل الإصابات الكلّي القابل للتسجيل (TRIR) =","en":"Total Recordable Incident Rate (TRIR) ="},"opts":[{"ar":"(عدد الإصابات القابلة للتسجيل × 200,000) ÷ إجمالي ساعات العمل","en":"(recordable cases × 200,000) ÷ total hours worked"},{"ar":"الإصابات ÷ الموظفين","en":"Injuries ÷ employees"},{"ar":"الساعات ÷ الإصابات","en":"Hours ÷ injuries"}],"a":0,"ex":{"ar":"يقيس الإصابات لكل 100 عامل سنوياً.","en":"Injuries per 100 workers per year."}},{"t":"q","q":{"ar":"دورة إدارة المخاطر:","en":"The risk-management cycle is:"},"opts":[{"ar":"التوظيف والتدريب","en":"Recruit and train"},{"ar":"تحديد ← تقييم ← ضبط ← مراقبة","en":"Identify, assess, control, monitor"},{
