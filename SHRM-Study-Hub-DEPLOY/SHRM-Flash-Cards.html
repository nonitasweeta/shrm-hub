ar:"واجب الرعاية (Duty of Care)",en:"Duty of Care",
defAr:"التزام المنظمة باتخاذ كل الخطوات المعقولة لضمان صحة وسلامة الموظفين — يمتد للمغتربين والعاملين عن بُعد وأحياناً أُسرهم",
defEn:"Obligation to take all reasonably possible steps to ensure employee health, safety, and wellbeing. Extends beyond primary workplace to expatriates, remote workers, and sometimes families.",
tags:["Risk Management","Duty of Care"]},

{id:169,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"قانون OSHA — الالتزام العام",en:"OSHA General Duty Clause",
defAr:"صاحب العمل ملزم بتوفير مكان عمل خالٍ من المخاطر المعترف بها — حتى في غياب معيار OSHA محدد",
defEn:"Employer must provide a workplace free from recognized hazards likely to cause death or serious physical harm — even when no specific OSHA standard addresses that hazard.",
tags:["Risk Management","OSHA","Safety"]},

{id:170,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"الإبلاغ عن الحوادث — OSHA",en:"OSHA Incident Reporting",
defAr:"وفاة: الإبلاغ خلال 8 ساعات. دخول المستشفى (3 موظفين+): الإبلاغ خلال 24 ساعة. سجل OSHA 300: التوثيق السنوي",
defEn:"Death: report within 8 hours. Hospitalization of 3+ employees: report within 24 hours. OSHA 300 Log: document all recordable injuries/illnesses annually.",
formula:"Death: 8h | 3+ Hospitalized: 24h | Log: Annual",
tags:["Risk Management","OSHA","Safety"]},

{id:171,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"الأساس الثلاثي — TBL",en:"Triple Bottom Line (TBL)",
defAr:"الناس (أثر اجتماعي) + الكوكب (أثر بيئي) + الربح (أداء مالي) — نجاح المنظمة يُقاس بالمحاور الثلاثة وليس المالي وحده",
defEn:"People (social impact) + Planet (environmental impact) + Profit (financial performance). Organizational success measured across all three dimensions, not profit alone.",
formula:"People + Planet + Profit",
tags:["CSR","Triple Bottom Line"]},

{id:172,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"ISO 26000 — المسؤولية الاجتماعية",en:"ISO 26000",
defAr:"معيار دولي لإرشادات المسؤولية الاجتماعية — ليس شهادة إلزامية، لا يمكن التحقق منها. يختلف عن ISO 14001 و9001",
defEn:"International standard for social responsibility guidance — NOT a certifiable standard. Organizations cannot be 'ISO 26000 certified.' Guidance only, unlike ISO 9001 and 14001.",
tags:["CSR","ISO 26000"]},

{id:173,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"CSV مقابل CSR — الفرق الجوهري",en:"CSV vs. CSR (Porter & Kramer)",
defAr:"CSR: تُعيد توزيع القيمة المخلوقة. CSV: تُنشئ قيمة اقتصادية + اجتماعية في آنٍ واحد من خلال إعادة تصميم نموذج الأعمال",
defEn:"CSR: redistributes already-created value. CSV (Creating Shared Value): creates economic AND social value simultaneously through business model redesign. CSV is more strategically durable.",
tags:["CSR","CSV","Porter"]},

{id:174,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"أهداف التنمية المستدامة — SDGs",en:"UN Sustainable Development Goals (SDGs)",
defAr:"17 هدفاً للأمم المتحدة بحلول 2030 — إطار طوعي لتحديد أولويات CSR ومواءمتها مع أجندة عالمية معترف بها",
defEn:"17 UN goals for 2030. Voluntary framework for prioritizing CSR commitments and aligning them with a globally recognized agenda. Not legally binding for corporations.",
tags:["CSR","SDGs"]},

{id:175,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"GRI — مبادرة الإفصاح العالمي",en:"Global Reporting Initiative (GRI)",
defAr:"أكثر أُطر الإفصاح عن الاستدامة استخداماً — يُعرّف مؤشرات موحّدة تُمكّن المقارنة عبر المنظمات والصناعات",
defEn:"Most widely used sustainability disclosure framework. Defines standardized indicators enabling comparison across organizations and industries. Voluntary but widely adopted by ESG investors.",
tags:["CSR","GRI"]},

{id:176,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"مادية CSR (Materiality)",en:"CSR Materiality",
defAr:"قضية جوهرية عندما تعكس تأثيرات كبيرة للمنظمة أو تُؤثر جوهرياً على تقييمات أصحاب المصلحة — تحدد أولويات التقرير",
defEn:"An issue is material when it reflects the organization's significant impacts OR substantially influences stakeholder assessments. Determines CSR reporting priorities. Core to GRI framework.",
tags:["CSR","Materiality"]},

{id:177,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"الفوائد الرباعية للتطوع الوظيفي",en:"Employee Volunteerism — 4 Benefits",
defAr:"فردية (تقدير + مهارات) + فريق (عمل جماعي + انتماء) + منظمة (تقوية الثقافة) + تجارية (سمعة + علامة تجارية)",
defEn:"Individual (recognition, skills) + Team (teamwork, camaraderie) + Organizational (culture strengthening) + Business (reputation, brand value). SHRM Foundation's four-category framework.",
formula:"Individual + Team + Organizational + Business",
tags:["CSR","Volunteerism"]},

{id:178,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"Title VII — قانون الحقوق المدنية 1964",en:"Title VII — Civil Rights Act 1964",
defAr:"يحمي ضد التمييز في العمل بسبب: العرق، اللون، الدين، الجنس (بما يشمل الحمل)، الأصل القومي. 15+ موظف",
defEn:"Prohibits employment discrimination based on: race, color, religion, sex (including pregnancy), national origin. Applies to employers with 15+ employees. EEOC enforces.",
tags:["US Employment Law","EEO","Title VII"]},

{id:179,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"التمييز الصريح مقابل التأثير المتعارض",en:"Disparate Treatment vs. Disparate Impact",
defAr:"الصريح: معاملة تمييزية متعمدة (يتطلب نية). المتعارض: سياسة محايدة ذات تأثير متباين سلبي (لا تتطلب نية)",
defEn:"Disparate Treatment: intentional different treatment based on protected characteristic (requires intent). Disparate Impact: facially neutral policy with adverse statistical effect (no intent required).",
tags:["US Employment Law","EEO"]},

{id:180,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"ADEA — قانون التمييز بسبب السن 1967",en:"Age Discrimination in Employment Act (ADEA)",
defAr:"يحمي من هم 40 سنة فأكثر من التمييز — ينطبق على أصحاب العمل 20+ موظف. EEOC تُطبّقه",
defEn:"Protects workers 40 and over from employment discrimination based on age. Applies to employers with 20+ employees. Covers hiring, firing, compensation, promotion, training.",
formula:"Protects: 40+ years | Threshold: 20+ employees",
tags:["US Employment Law","ADEA"]},

{id:181,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"ADA — قانون الأمريكيين ذوي الإعاقة 1990",en:"Americans with Disabilities Act (ADA)",
defAr:"يحمي ذوي الإعاقة + يُلزم بالتيسير المعقول. 15+ موظف. لا يُلزم بخلق وظائف جديدة أو إلغاء الوظائف الجوهرية",
defEn:"Protects individuals with disabilities from discrimination + requires reasonable accommodation. 15+ employees. Does NOT require creating new positions or eliminating essential functions.",
tags:["US Employment Law","ADA"]},

{id:182,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"FLSA — اختبارات الإعفاء الثلاثية",en:"FLSA Exemption: Triple Test",
defAr:"للإعفاء من الأجر الإضافي يجب اجتياز: (1) اختبار الراتب ≥$684/أسبوع + (2) اختبار المهام الوظيفية المحددة. كلاهما مطلوب",
defEn:"Exemption requires: (1) Salary test: ≥$684/week AND (2) Specific duties test (executive/administrative/professional/outside sales/computer). Both tests must be satisfied.",
formula:"Salary Test + Duties Test = Both Required",
tags:["US Employment Law","FLSA"]},

{id:183,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"FMLA — شروط الأهلية الخمسة",en:"FMLA Eligibility Requirements",
defAr:"12 أسبوعاً إجازة محمية وظيفياً. الأهلية: 50+ موظف في نطاق 75 ميلاً + عمل 12 شهراً + 1,250 ساعة في آخر 12 شهراً",
defEn:"12 weeks protected leave. Eligibility: 50+ employees within 75 miles of worksite + employed 12 months + worked 1,250 hours in preceding 12 months. All three conditions required.",
formula:"50+ employees (75mi) + 12 months + 1,250 hours",
tags:["US Employment Law","FMLA"]},

{id:184,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"COBRA — مدد التغطية الثلاث",en:"COBRA Coverage Periods",
defAr:"18 شهراً (إنهاء/تقليص ساعات) + 29 شهراً (إعاقة ADA) + 36 شهراً (طلاق/وفاة/Medicare). التكلفة: 100%+2% على المستفيد",
defEn:"18 months (termination/hour reduction) + 29 months (ADA disability within first 60 days) + 36 months (divorce/death/Medicare). Cost: 100% + 2% admin fee paid by beneficiary.",
formula:"18 months | 29 months | 36 months",
tags:["US Employment Law","COBRA"]},

{id:185,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"USERRA — حماية المحاربين",en:"USERRA — Uniformed Services Rights",
defAr:"يحمي حقوق التوظيف للعسكريين. لا حد لحجم صاحب العمل — ينطبق على الجميع. خدمة 5 سنوات فأقل = حق إعادة التوظيف",
defEn:"Protects employment rights for military service members. NO employer size threshold — applies to all employers. Service ≤5 years = reemployment right in same or comparable position.",
formula:"Applies to ALL employers (no size minimum)",
tags:["US Employment Law","USERRA"]},

{id:186,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"NLRA — المادة 7 والأنشطة المشتركة",en:"NLRA Section 7 — Concerted Activities",
defAr:"تحمي جميع الموظفين (نقابيين وغير نقابيين) في مناقشة الأجور وظروف العمل. سياسات السرية الشاملة للرواتب تنتهك المادة 7",
defEn:"Protects ALL private sector employees (union AND non-union) discussing wages and working conditions. Blanket salary confidentiality policies violate Section 7.",
tags:["US Employment Law","NLRA"]},

{id:187,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"GINA — قانون عدم التمييز الجيني 2008",en:"Genetic Information Nondiscrimination Act (GINA)",
defAr:"يحظر استخدام المعلومات الجينية (بما فيها التاريخ الطبي العائلي) في قرارات التوظيف. 15+ موظف. برامج رعاية الصحة محفوفة بالمخاطر",
defEn:"Prohibits using genetic information (including family medical history) in employment decisions. 15+ employees. Wellness programs offering financial incentives for family health history = high GINA risk.",
tags:["US Employment Law","GINA"]},

{id:188,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"قانون Lilly Ledbetter 2009",en:"Lilly Ledbetter Fair Pay Act 2009",
defAr:"كل شيك راتب تمييزي يُجدّد مهلة التقاضي — بدلاً من الحساب من أول قرار راتب تمييزي. أول قانون وقّعه أوباما",
defEn:"Each discriminatory paycheck resets the statute of limitations clock — not just the original discriminatory pay decision. First law signed by President Obama. Overturned Ledbetter v. Goodyear 2007.",
tags:["US Employment Law","Pay Equity"]},

{id:189,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"حقوق Weingarten في القطاع العام",en:"Weingarten Rights in Unionized Workplace",
defAr:"الموظف النقابي يحق له طلب ممثل نقابي في أي مقابلة تحقيقية إذا اعتقد معقولاً أنها قد تُفضي إلى عقوبة",
defEn:"Unionized employee may request union representation in investigative interview if they reasonably believe it might result in discipline. Employer must grant request, end interview, or change its nature.",
tags:["US Employment Law","NLRA","Weingarten"]},

{id:190,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"قانون الإصلاح والسيطرة على الهجرة — IRCA",en:"IRCA 1986 — Immigration Reform & Control Act",
defAr:"يمنع التوظيف المتعمد لغير المؤهلين عبر إلزامية I-9. يحظر التمييز بسبب الجنسية أو الوضع المواطني",
defEn:"Prevents intentional hiring of unauthorized workers via mandatory I-9 verification. Also prohibits employment discrimination based on national origin or citizenship status.",
tags:["US Employment Law","IRCA","Immigration"]},

{id:191,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"قانون FCRA — فحوصات الخلفية",en:"Fair Credit Reporting Act (FCRA)",
defAr:"قبل الإجراء السلبي: تزويد المتقدم بنسخة من التقرير + ملخص الحقوق. إشعار بعد الإجراء السلبي. معلومات جنائية: 7 سنوات",
defEn:"Pre-adverse action: provide (1) copy of report + (2) FCRA rights summary before finalizing adverse decision. Post-adverse action notice required. Criminal info retention: 7 years (most cases).",
formula:"Pre-adverse: Copy + Rights | Post-adverse: Notice",
tags:["US Employment Law","FCRA"]},

{id:192,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"WARN Act — قانون التسريح الجماعي",en:"WARN Act",
defAr:"100+ موظف → إشعار 60 يوماً. إغلاق منشأة (50+) أو تسريح جماعي (500+ أو 50-499 = 33%+ من العمالة) → 60 يوم راتب جزاء",
defEn:"100+ employees: 60 calendar days notice before qualifying plant closing (50+) or mass layoff (500+ OR 50-499 representing ≥33%). Penalty: 60 days back pay per affected employee.",
formula:"100+ employees → 60 days notice",
tags:["US Employment Law","WARN"]},

{id:193,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"قانون Davis-Bacon 1931",en:"Davis-Bacon Act 1931",
defAr:"عقود البناء الفيدرالية التي تتجاوز 2,000$ → الأجر السائد لعمال البناء في الموقع كما تُحدده DOL",
defEn:"Federally-funded construction contracts over $2,000 must pay locally determined 'prevailing wages' for construction workers. DOL's Wage and Hour Division determines prevailing wage rates.",
formula:"Federal Construction > $2,000 → Prevailing Wage",
tags:["US Employment Law","Davis-Bacon"]},

{id:194,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"نظرية العدالة — آدامز",en:"Adams' Equity Theory",
defAr:"الموظفون يقارنون نسبة مساهماتهم/مكافآتهم بنسبة الآخرين. عدم المساواة المُدرَكة تُؤدي إلى خفض الجهد أو مغادرة المنظمة",
defEn:"Employees compare their input/outcome ratio with others'. Perceived inequity (positive or negative) leads to behavior change: reduce effort, demand more pay, or leave.",
tags:["US Employment Law","Motivation","Total Rewards"]},

{id:195,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"درجة Hofstede — تجنّب الغموض",en:"Hofstede: Uncertainty Avoidance",
defAr:"مستوى ارتياح الثقافة مع عدم اليقين والغموض — تأثيره: الحاجة لقواعد وإجراءات مكتوبة مقابل تقبّل القرارات التكيفية",
defEn:"Degree of discomfort with uncertainty and ambiguity. High UA cultures need written rules and procedures. Low UA cultures tolerate adaptive decision-making and ambiguity.",
tags:["Global Workforce","Hofstede"]},

{id:196,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"سجل المخاطر",en:"Risk Register",
defAr:"قائمة رسمية بكل المخاطر: فئة + حدث + تصنيف + مؤشرات KRI + إجراءات الإدارة + صاحب المسؤولية + متطلبات الإبلاغ",
defEn:"Formal list of all identified risks including: category, event, classification, KRIs, management controls, risk owner, and reporting requirements. Makes risk management visible and accountable.",
tags:["Risk Management","Risk Register"]},

{id:197,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"قضية مسؤولية العمل في سلسلة التوريد",en:"Supply Chain Labor Responsibility",
defAr:"CSR يمتد لسلسلة القيمة — الانتهاكات في مصانع الموردين تخلق مخاطر علامة تجارية وتنظيمية وقانونية لصاحب العمل الرئيسي",
defEn:"CSR accountability extends to the value chain. Supplier labor violations create brand, regulatory (US Customs), and legal risk for the primary employer. Remediation preferred over exit (CSV).",
tags:["CSR","Supply Chain"]},

{id:198,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"قانون المساواة في الأجر 1963",en:"Equal Pay Act (EPA) 1963",
defAr:"يحظر فجوات الأجر بين الجنسين لنفس العمل في نفس المنشأة. الدفاعيات: الأقدمية، الجدارة، جودة/كمية الإنتاج، أي عامل غير الجنس",
defEn:"Prohibits pay differentials between men and women performing equal work in the same establishment. Defenses: seniority, merit, production quality/quantity, or any factor other than sex.",
tags:["US Employment Law","Pay Equity","EPA"]},

{id:199,book:"wp",bookName:"Workplace Domain",cat:"US Employment Law",
ar:"الإنهاء المبرر (Just Cause) — المعيار",en:"Just Cause vs. At-Will Termination",
defAr:"التوظيف حسب الإرادة (الافتراضي بـ USA): لا سبب مطلوب. Just Cause (عقود النقابات): صاحب العمل يُثبت المبرر + 7 اختبارات",
defEn:"At-will (US default): no reason required for termination. Just cause (union contracts): employer must prove justification using 7 tests (notice, reasonableness, investigation, etc.).",
tags:["US Employment Law","Labor Relations"]},

{id:200,book:"wp",bookName:"Workplace Domain",cat:"CSR",
ar:"الرأسمالية مع أصحاب المصلحة",en:"Stakeholder Capitalism",
defAr:"غرض الأعمال يشمل: قيمة للعملاء + استثمار في الموظفين + عدالة مع الموردين + دعم المجتمعات + حماية البيئة — لا مساهمين وحدهم",
defEn:"Business purpose encompasses value for customers, employees, suppliers, communities, and the environment — not maximizing shareholder value alone. 2019 Business Roundtable statement.",
tags:["CSR","Stakeholder Capitalism"]},

  {id:201,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية الحاجات لماكليلاند",en:"McClelland's Needs Theory",
   defAr:"ثلاث حاجات مكتسبة تحرّك السلوك: الإنجاز (nAch)، الانتماء (nAff)، السلطة (nPow). أصحاب الإنجاز العالي قد لا يصلحون مديرين.",
   defEn:"Three acquired needs drive behavior: achievement (nAch), affiliation (nAff), power (nPow). High-achievement individuals may not make good managers.",
   tags:["Motivation","McClelland"]},

  {id:202,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية تحديد الأهداف (لوك)",en:"Goal-Setting Theory (Locke & Latham)",
   defAr:"الأهداف المحدّدة والصعبة (لكن الواقعية) مع التغذية الراجعة ترفع الأداء أكثر من «ابذل أفضل ما لديك». أساس أهداف SMART.",
   defEn:"Specific, difficult-yet-attainable goals with feedback drive higher performance than 'do your best'. The foundation of SMART goals.",
   tags:["Motivation","Goal-Setting"]},

  {id:203,book:"comp",bookName:"Competencies",cat:"HR Expertise",
   ar:"الإصغاء الفعّال",en:"Active Listening",
   defAr:"انتباه كامل، إعادة صياغة للتأكّد، أسئلة توضيحية، وتأجيل الحكم. مهارة محورية في الاستشارة وحل النزاع.",
   defEn:"Full attention, paraphrasing to confirm, clarifying questions, and suspending judgment. A core skill in consultation and conflict resolution.",
   tags:["Communication","Listening"]},

  {id:204,book:"comp",bookName:"Competencies",cat:"Global Workforce",
   ar:"ثقافات Hall عالية/منخفضة السياق",en:"Hall's High/Low-Context Cultures",
   defAr:"عالية السياق تعتمد التلميح والعلاقات (اليابان، الخليج)؛ منخفضة السياق تعتمد الصراحة والتوثيق المكتوب (ألمانيا، أمريكا).",
   defEn:"High-context cultures rely on implicit cues and relationships (Japan, Gulf); low-context rely on explicit words and documentation (Germany, US).",
   tags:["Global","Culture"]},

  {id:205,book:"comp",bookName:"Competencies",cat:"Global Workforce",
   ar:"أبعاد ترومبينارز الثقافية",en:"Trompenaars' Cultural Dimensions",
   defAr:"سبعة توترات ثقافية مثل العالمية مقابل الخصوصية، والفرد مقابل الجماعة، والحياد مقابل العاطفية — لإدارة الفرق متعدّدة الثقافات.",
   defEn:"Seven cultural dilemmas such as universalism vs particularism, individualism vs communitarianism, neutral vs affective — for managing multicultural teams.",
   tags:["Global","Culture"]},

  {id:206,book:"comp",bookName:"Competencies",cat:"Org Development",
   ar:"مستويات الثقافة لشاين",en:"Schein's Three Levels of Culture",
   defAr:"المصنوعات الظاهرة ← القيم المعلنة ← الافتراضات الضمنية العميقة (الأصعب تغييراً والأقوى تأثيراً).",
   defEn:"Visible artifacts ← espoused values ← deep underlying assumptions (the hardest to change and the most influential).",
   tags:["Culture","Schein"]},

  {id:207,book:"comp",bookName:"Competencies",cat:"Global Workforce",
   ar:"الذكاء الثقافي (CQ)",en:"Cultural Intelligence (CQ)",
   defAr:"القدرة على العمل بفاعلية عبر الثقافات، بأربعة أبعاد: ما وراء المعرفي، المعرفي، الدافعي، السلوكي.",
   defEn:"The capability to function effectively across cultures, across four dimensions: metacognitive, cognitive, motivational, behavioral.",
   tags:["Global","Cultural Intelligence"]},

  {id:208,book:"comp",bookName:"Competencies",cat:"Org Development",
   ar:"تحليل مجال القوى (لوين)",en:"Lewin's Force Field Analysis",
   defAr:"أداة تغيير تُحلّل القوى الدافعة نحو التغيير مقابل القوى المقاوِمة. يتحقّق التغيير بتقوية الدافعة أو إضعاف المقاوِمة.",
   defEn:"A change tool mapping driving forces for change against restraining forces. Change occurs by strengthening drivers or weakening restrainers.",
   tags:["Change","Lewin"]},

  {id:209,book:"org",bookName:"Organization",cat:"Org Development",
   ar:"نموذج الانتقال لبريدجز",en:"Bridges' Transition Model",
   defAr:"يركّز على الجانب النفسي للتغيير عبر ثلاث مراحل: النهاية/الخسارة ← المنطقة المحايدة ← البداية الجديدة. (التغيير حدث، والانتقال تجربة داخلية).",
   defEn:"Focuses on the psychological side of change in three phases: Ending/Loss ← Neutral Zone ← New Beginning. (Change is external; transition is internal.)",
   tags:["Change","Bridges"]},

  {id:210,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"أنواع صدق الاختيار",en:"Selection Validity Types",
   defAr:"المحكّي (يتنبّأ بالأداء)، المحتوى (يمثّل الوظيفة فعلاً)، البنائي (يقيس سمة نظرية كالذكاء). الصدق ضروري قانونياً لاختبارات الاختيار.",
   defEn:"Criterion-related (predicts performance), content (samples the actual job), construct (measures a theoretical trait like intelligence). Validity is legally essential for selection tests.",
   tags:["Selection","Validity"]},

  {id:211,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"الإرشادات الموحّدة لاختيار الموظفين",en:"Uniform Guidelines on Employee Selection",
   defAr:"معايير الوكالات الفيدرالية لإجراءات الاختيار العادلة؛ مصدر «قاعدة الـ٤/٥» للأثر التمييزي وشرط إثبات صدق الأدوات.",
   defEn:"Federal agencies' standards for fair selection procedures; the source of the 4/5ths rule for adverse impact and the requirement to validate tools.",
   tags:["Selection","Compliance"]},

  {id:212,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"قانون ساربينز-أوكسلي (SOX)",en:"Sarbanes-Oxley (SOX 2002)",
   defAr:"حوكمة مالية للشركات العامة + حماية المُبلِّغين عن الاحتيال من الانتقام. صلته بـ HR: حماية المُبلِّغين والاحتفاظ بالسجلّات.",
   defEn:"Financial governance for public companies + whistleblower anti-retaliation protection. HR relevance: whistleblower protection and records retention.",
   tags:["Governance","Whistleblower"]},

  {id:213,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"قانون VEVRAA للمحاربين 1974",en:"VEVRAA (1974)",
   defAr:"يفرض التمييز الإيجابي وعدم التمييز للمحاربين المحميين لدى مقاولي الحكومة (≥ $150,000). ما زال سارياً بعد إلغاء EO 11246.",
   defEn:"Requires affirmative action and nondiscrimination for protected veterans by federal contractors (≥ $150,000). Still in effect after EO 11246's revocation.",
   tags:["Affirmative Action","Veterans"]},

  {id:214,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"قانون مكان العمل الخالي من المخدرات 1988",en:"Drug-Free Workplace Act (1988)",
   defAr:"يُلزم مقاولي/ممنوحي الحكومة (≥ $100,000) بسياسة مكتوبة وبرنامج توعية — ولا يفرض فحص المخدرات.",
   defEn:"Requires federal contractors/grantees (≥ $100,000) to maintain a written policy and awareness program — does NOT mandate drug testing.",
   tags:["Compliance","Drug-Free"]},

  {id:215,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"قانون البوابة إلى البوابة 1947",en:"Portal-to-Portal Act (1947)",
   defAr:"يوضّح «ساعات العمل» المدفوعة بموجب FLSA: التنقّل العادي غير مدفوع؛ الأنشطة الجوهرية (كارتداء معدّات السلامة) قد تُحتسب.",
   defEn:"Clarifies compensable 'hours worked' under FLSA: ordinary commuting is unpaid; integral activities (like donning safety gear) may count.",
   tags:["Wage Law","Hours Worked"]},

  {id:216,book:"people",bookName:"People",cat:"Total Rewards",
   ar:"اتساع نطاق الأجر",en:"Range Spread Formula",
   defAr:"الاتساع % = ((الحد الأعلى − الحد الأدنى) ÷ الحد الأدنى) × 100. النطاقات الإدارية أوسع (50%+) من الدنيا (20–40%).",
   defEn:"Spread % = ((max − min) ÷ min) × 100. Managerial ranges are wider (50%+) than entry-level ranges (20–40%).",
   tags:["Metrics","Compensation"]},

  {id:217,book:"people",bookName:"People",cat:"HR Metrics",
   ar:"معادلة معدّل الغياب",en:"Absence Rate Formula",
   defAr:"الغياب % = (أيام الغياب ÷ (متوسط عدد الموظفين × أيام العمل)) × 100. معادلة مكتب إحصاءات العمل (BLS).",
   defEn:"Absence % = (days absent ÷ (avg employees × workdays)) × 100. The Bureau of Labor Statistics (BLS) formula.",
   tags:["Metrics","Absence"]},

  {id:218,book:"people",bookName:"People",cat:"Total Rewards",
   ar:"طرق تقييم الوظائف",en:"Job Evaluation Methods",
   defAr:"غير كمّية: الترتيب، التصنيف. كمّية: نقاط العوامل (Point-Factor، الأشهر)، مقارنة العوامل. تحدّد القيمة الداخلية النسبية للوظيفة.",
   defEn:"Non-quantitative: ranking, classification. Quantitative: point-factor (most common), factor comparison. They establish a job's relative internal worth.",
   tags:["Compensation","Job Evaluation"]},

  {id:219,book:"wp",bookName:"Workplace",cat:"US Employment Law",
   ar:"المؤهّل المهني الحقيقي (BFOQ)",en:"Bona Fide Occupational Qualification (BFOQ)",
   defAr:"استثناء ضيّق يجيز التمييز حين تكون الصفة (كالجنس أو السن) ضرورية جوهرياً لأداء الوظيفة. لا ينطبق أبداً على العرق.",
   defEn:"A narrow exception permitting discrimination when a trait (e.g., sex or age) is genuinely essential to job performance. Never applies to race.",
   tags:["EEO Law","BFOQ"]},

  {id:220,book:"wp",bookName:"Workplace",cat:"Risk Management",
   ar:"تعويضات العمال",en:"Workers' Compensation",
   defAr:"نظام تأمين بلا خطأ (No-Fault) يعوّض الموظفين عن إصابات/أمراض العمل، مقابل تنازلهم غالباً عن حق مقاضاة صاحب العمل.",
   defEn:"A no-fault insurance system compensating employees for work-related injuries/illnesses, in exchange for generally waiving the right to sue the employer.",
   tags:["Safety","Workers Comp"]},

  {id:221,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية السمات في القيادة",en:"Trait Theory of Leadership",
   defAr:"أقدم مقاربات القيادة: القائد يُولد بسمات فطرية (ذكاء، ثقة، حزم، نزاهة). انتُقدت لإهمالها المهارات المكتسبة وأثر الموقف.",
   defEn:"Earliest leadership approach — leaders are born with distinguishing innate traits (intelligence, confidence, determination, integrity). Criticized for ignoring learned skills and situational context.",
   tags:["Leadership Theory","Trait"]},

  {id:222,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"الشبكة الإدارية (بليك وموتون)",en:"Blake-Mouton Managerial Grid",
   defAr:"تصنّف القائد على محورين: الاهتمام بالإنتاج × الاهتمام بالناس. الأمثل 9,9 (قيادة الفريق)؛ 9,1 مهمة، 1,9 ناس، 1,1 متهالك.",
   defEn:"Plots leadership on two axes — concern for production × concern for people. Ideal is 9,9 (team leader); 9,1 task-focused, 1,9 country club, 1,1 impoverished.",
   tags:["Leadership Theory","Behavioral"]},

  {id:223,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نموذج الطوارئ لفيدلر",en:"Fiedler's Contingency Model",
   defAr:"فعالية القائد = توافق أسلوبه (مهمة/علاقة، يُقاس بمقياس LPC) مع مواتاة الموقف. الأسلوب ثابت، فنغيّر الموقف لا القائد.",
   defEn:"Leader effectiveness = match between style (task vs relationship, measured by the LPC scale) and situational favorableness. Style is fixed, so change the situation, not the leader.",
   tags:["Leadership Theory","Contingency"]},

  {id:224,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية المسار-الهدف (هاوس)",en:"Path-Goal Theory (House)",
   defAr:"القائد يمهّد المسار نحو الهدف بإزالة العقبات، ويكيّف أسلوبه (توجيهي/داعم/مشارك/موجَّه بالإنجاز) حسب الموظف والمهمة.",
   defEn:"The leader clears the path to goals by removing obstacles, adapting style (directive/supportive/participative/achievement-oriented) to the employee and the task.",
   tags:["Leadership Theory","Path-Goal"]},

  {id:225,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"هرم ماسلو للحاجات",en:"Maslow's Hierarchy of Needs",
   defAr:"خمسة مستويات للحاجات (فسيولوجية، أمان، انتماء، تقدير، تحقيق الذات)؛ يُشبَع الأدنى قبل أن يحفّز الأعلى.",
   defEn:"Five levels of needs (physiological, safety, belonging, esteem, self-actualization); lower needs must be satisfied before higher ones motivate.",
   tags:["Motivation","Maslow"]},

  {id:226,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية X وY لماكجريجور",en:"McGregor's Theory X/Y",
   defAr:"افتراضان متعارضان: X يرى الموظفين كسالى يحتاجون رقابة؛ Y يراهم طموحين يحبون المسؤولية ويحفّزهم التمكين.",
   defEn:"Two opposing assumptions: Theory X sees workers as lazy needing control; Theory Y sees them as ambitious, responsibility-seeking, motivated by empowerment.",
   tags:["Motivation","McGregor"]},

  {id:227,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية التوقّع لفروم",en:"Vroom's Expectancy Theory",
   defAr:"الدافعية = التوقّع × الوسيلة × التكافؤ. ينهار الحافز إذا انعدم أي عنصر (لا أقدر / لن أُكافأ / المكافأة بلا قيمة لي).",
   defEn:"Motivation = Expectancy × Instrumentality × Valence. Motivation collapses if any factor is zero (can't do it / won't be rewarded / reward is worthless to me).",
   tags:["Motivation","Expectancy"]},

  {id:228,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"نظرية التعزيز لسكينر",en:"Reinforcement Theory (Skinner)",
   defAr:"السلوك دالة نتائجه: التعزيز الإيجابي/السلبي يزيده، والعقاب/الإطفاء يقلّله. تنبيه: التعزيز السلبي ليس عقاباً — هو إزالة مزعج.",
   defEn:"Behavior is a function of its consequences: positive/negative reinforcement increases it; punishment/extinction decreases it. Note: negative reinforcement is NOT punishment — it removes an aversive stimulus.",
   tags:["Motivation","Reinforcement"]},

  {id:229,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"أنماط ثوماس-كيلمان لإدارة النزاع",en:"Thomas-Kilmann Conflict Modes",
   defAr:"خمسة أنماط على محوري الحزم × التعاون: تنافس، تعاون، تسوية، تجنّب، تكيّف. (ليست Blake-Mouton — تلك شبكة قيادية).",
   defEn:"Five modes on the axes of assertiveness × cooperativeness: competing, collaborating, compromising, avoiding, accommodating. (Not Blake-Mouton — that is a leadership grid.)",
   tags:["Conflict","Thomas-Kilmann"]},

  {id:230,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"التفاوض: التوزيعي/التكاملي وBATNA",en:"Negotiation: Distributive/Integrative & BATNA",
   defAr:"التوزيعي = كعكة ثابتة (رابح-خاسر)؛ التكاملي = توسيع المنفعة المشتركة (رابح-رابح). BATNA = أفضل بديل عن الاتفاق، ويحدّد نقطة الانسحاب.",
   defEn:"Distributive splits a fixed pie (win-lose); integrative expands mutual value (win-win). BATNA = Best Alternative To a Negotiated Agreement, setting your walk-away point.",
   tags:["Negotiation","BATNA"]},

  {id:231,book:"comp",bookName:"Competencies",cat:"HR Expertise",
   ar:"نموذج عملية الاتصال",en:"Communication Process Model",
   defAr:"مُرسِل ← ترميز ← رسالة/قناة ← فكّ ترميز ← مُستقبِل ← تغذية راجعة، مع «تشويش» قد يشوّه أي مرحلة. التغذية الراجعة دليل الفهم.",
   defEn:"Sender → encode → message/channel → decode → receiver → feedback, with noise potentially distorting any stage. Feedback is the proof of understanding.",
   tags:["Communication","Process Model"]},

  {id:232,book:"comp",bookName:"Competencies",cat:"Leadership",
   ar:"مراحل تطوّر الفريق (Tuckman)",en:"Tuckman's Team Development Stages",
   defAr:"التشكّل ← العصف ← التنظيم ← الأداء ← (الإنهاء). كل مرحلة تتطلّب تدخّلاً قيادياً مختلفاً، والعصف هو الأصعب.",
   defEn:"Forming → Storming → Norming → Performing → (Adjourning). Each stage needs a different leadership intervention; Storming is the most challenging.",
   tags:["Teams","Tuckman"]},

  {id:233,book:"comp",bookName:"Competencies",cat:"HR Strategy",
   ar:"قوى بورتر التنافسية الخمس",en:"Porter's Five Forces",
   defAr:"إطار تحليل جاذبية القطاع: المنافسة الحالية، تهديد الداخلين الجدد، تهديد البدائل، قوة الموردين، قوة المشترين.",
   defEn:"Framework for industry attractiveness: competitive rivalry, threat of new entrants, threat of substitutes, supplier power, buyer power.",
   tags:["Strategy","Porter"]},

  {id:234,book:"comp",bookName:"Competencies",cat:"HR Strategy",
   ar:"تحليل PESTLE",en:"PESTLE Analysis",
   defAr:"مسح البيئة الكلّية الخارجية عبر ستة عوامل: سياسية، اقتصادية، اجتماعية، تقنية، قانونية، بيئية — لرصد الفرص والتهديدات.",
   defEn:"Macro-environment scan across six factors: Political, Economic, Social, Technological, Legal, Environmental — to surface opportunities and threats.",
   tags:["Strategy","PESTLE"]},

  {id:235,book:"comp",bookName:"Competencies",cat:"HR Strategy",
   ar:"مصفوفة BCG (النمو/الحصة)",en:"BCG Growth-Share Matrix",

const BOOKS = [
  {id:'all', label:'الكل (250)', color:'#c8a84b', dot:'#c8a84b'},
  {id:'comp', label:'📘 Competencies', color:'#1a3a5c', dot:'#4a8fc4'},
  {id:'people', label:'👥 People', color:'#1e7a4a', dot:'#4ade80'},
  {id:'org', label:'🏢 Organization', color:'#6d28d9', dot:'#a78bfa'},
  {id:'wp', label:'⚖️ Workplace', color:'#c2410c', dot:'#fb923c'},
];

let userStatus = {};
let currentBook = 'all';
let currentStatusFilter = 'all';
let searchTerm = '';
let shuffled = [...ALL_CARDS];

function getFiltered() {
  return shuffled.filter(c => {
    const matchBook = currentBook === 'all' || c.book === currentBook;
    const matchStatus = currentStatusFilter === 'all' || userStatus[c.id] === currentStatusFilter;
    const matchSearch = !searchTerm ||
      c.ar.includes(searchTerm) ||
      c.en.toLowerCase().includes(searchTerm.toLowerCase()) ||
      c.defAr.includes(searchTerm) ||
      c.cat.includes(searchTerm) ||
      c.defEn.toLowerCase().includes(searchTerm.toLowerCase());
    return matchBook && matchStatus && matchSearch;
  });
}

function buildTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  BOOKS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (b.id === currentBook ? ' active' : '');
    btn.innerHTML = `<span class="tab-dot" style="background:${b.dot}"></span>${b.label}`;
    btn.onclick = () => { currentBook = b.id; buildTabs(); renderCards(); };
    wrap.appendChild(btn);
  });
}

function renderCards() {
  const cards = getFiltered();
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  document.getElementById('progInfo').textContent = cards.length + ' / ' + shuffled.length;
  updateSummary();
  updateHeaderStats();
  updateProgress();
  if (!cards.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><div class="empty-msg">لا توجد بطاقات مطابقة للبحث</div></div>';
    return;
  }
  cards.forEach(card => {
    const st = userStatus[card.id] || '';
    const bookColor = {comp:'#1a3a5c',people:'#1e7a4a',org:'#6d28d9',wp:'#c2410c'}[card.book] || '#666';
    const el = document.createElement('div');
    el.className = 'flip-wrap book-' + card.book;
    if (st) el.setAttribute('data-status', st);
    el.id = 'card-' + card.id;
    el.innerHTML = `
      <div class="flip-inner" onclick="flipCard(this)">
        <div class="flip-front">
          <span class="fc-book-tag">${card.bookName}</span>
          <div class="fc-cat">${card.cat}</div>
          <div class="fc-term-ar">${card.ar}</div>
          <div class="fc-term-en">${card.en}</div>
          <div class="fc-hint">
            <span class="fc-hint-txt">اضغط لرؤية التعريف الكامل</span>
            <span class="fc-flip-icon">↻</span>
          </div>
          <div class="fc-status" onclick="event.stopPropagation()">
            <button class="status-btn know ${st==='know'?'sel':''}" onclick="setStatus(${card.id},'know',this)">✓ أعرفها</button>
            <button class="status-btn review ${st==='review'?'sel':''}" onclick="setStatus(${card.id},'review',this)">⟳ مراجعة</button>
            <button class="status-btn hard ${st==='hard'?'sel':''}" onclick="setStatus(${card.id},'hard',this)">✗ صعبة</button>
          </div>
        </div>
        <div class="flip-back">
          <div class="fb-label">التعريف</div>
          <div class="fb-def-ar">${card.defAr}</div>
          ${card.formula ? `<div class="fb-formula">${card.formula}</div>` : ''}
          <div class="fb-def-en">${card.defEn}</div>
          <div class="fb-tags">${(card.tags||[]).map(t=>`<span class="fb-tag">${t}</span>`).join('')}</div>
          <button class="fb-back-btn" onclick="event.stopPropagation();flipBack(this)">← العودة للمصطلح</button>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}

function flipCard(inner) {
  const wrap = inner.closest('.flip-wrap');
  wrap.classList.toggle('flipped');
}
function flipBack(btn) {
  const wrap = btn.closest('.flip-wrap');
  wrap.classList.remove('flipped');
}
function setStatus(id, status, btn) {
  const prev = userStatus[id];
  if (prev === status) { delete userStatus[id]; }
  else { userStatus[id] = status; }
  // Update card
  const wrap = document.getElementById('card-' + id);
  if (wrap) {
    if (userStatus[id]) wrap.setAttribute('data-status', userStatus[id]);
    else wrap.removeAttribute('data-status');
    wrap.querySelectorAll('.status-btn').forEach(b => b.classList.remove('sel'));
    if (userStatus[id]) {
      const selBtn = wrap.querySelector('.status-btn.' + userStatus[id]);
      if (selBtn) selBtn.classList.add('sel');
    }
  }
  updateSummary(); updateHeaderStats(); updateProgress();
}

function updateHeaderStats() {
  const cards = currentBook === 'all' ? ALL_CARDS : ALL_CARDS.filter(c => c.book === currentBook);
  let k=0,r=0,h=0;
  cards.forEach(c => {
    if (userStatus[c.id]==='know') k++;
    else if (userStatus[c.id]==='review') r++;
    else if (userStatus[c.id]==='hard') h++;
  });
  document.getElementById('knownCount').textContent = k;
  document.getElementById('reviewCount').textContent = r;
  document.getElementById('hardCount').textContent = h;
}

function updateProgress() {
  const total = currentBook === 'all' ? ALL_CARDS.length : ALL_CARDS.filter(c=>c.book===currentBook).length;
  const done = (currentBook === 'all' ? ALL_CARDS : ALL_CARDS.filter(c=>c.book===currentBook))
    .filter(c => userStatus[c.id]).length;
  document.getElementById('progFill').style.width = (done/total*100) + '%';
}

function updateSummary() {
  const cards = currentBook === 'all' ? ALL_CARDS : ALL_CARDS.filter(c => c.book === currentBook);
  let k=0,r=0,h=0,u=0;
  cards.forEach(c => {
    const s = userStatus[c.id];
    if (s==='know') k++;
    else if (s==='review') r++;
    else if (s==='hard') h++;
    else u++;
  });
  const bar = document.getElementById('summaryBar');
  bar.innerHTML = `
    <div class="sum-item"><div class="sum-dot" style="background:var(--border)"></div>${u} غير مراجعة</div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--green)"></div>${k} أتقنتها</div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--gold)"></div>${r} للمراجعة</div>
    <div class="sum-item"><div class="sum-dot" style="background:var(--red)"></div>${h} صعبة</div>
    <div class="sum-item" style="margin-right:auto">إجمالي: ${cards.length}</div>`;
}

function filterStatus(s) {
  currentStatusFilter = s;

  document.getElementById('btn-'+s).classList.add('active');
  renderCards();
}

function filterCards() {
  searchTerm = document.getElementById('searchInput').value;
  renderCards();
}
