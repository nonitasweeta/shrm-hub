<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHRM Flash Cards — بطاقات المراجعة 2023</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede5;--card-bg:#fff;--navy:#0d1b2e;--navy2:#163456;
  --gold:#c8a84b;--gold2:#e8c96a;--border:#ddd6c8;--text:#1a1a1a;--muted:#777;
  --comp:#1a3a5c;--people:#1e7a4a;--org:#6d28d9;--wp:#c2410c;
  --comp-l:#e8f2fb;--people-l:#e8f8ef;--org-l:#f3effe;--wp-l:#fff4ee;
  --green:#15803d;--red:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.hdr{background:linear-gradient(160deg,#0d1b2e 0%,#163456 60%,#1a3a1a 100%);padding:28px 24px 32px;color:#fff;text-align:center;}
.hdr-badge{display:inline-flex;gap:7px;align-items:center;background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.3);border-radius:30px;padding:5px 18px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:.04em;margin-bottom:14px;}
.hdr h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:6px;}
.hdr h1 em{color:var(--gold);font-style:normal;}
.hdr p{font-size:.85rem;opacity:.6;margin-bottom:20px;}
.hdr-stats{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.hstat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 18px;text-align:center;}
.hstat-n{font-size:1.2rem;font-weight:800;color:var(--gold);}
.hstat-l{font-size:10px;opacity:.5;margin-top:2px;}

/* ── BOOK TABS ── */
.tabs-wrap{background:var(--navy);padding:0 16px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab{padding:13px 18px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;color:rgba(255,255,255,.45);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.tab.active{color:#fff;border-bottom-color:var(--gold);}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── CONTROLS ── */
.controls{padding:16px 20px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.search-box{flex:1;min-width:160px;position:relative;}
.search-box input{width:100%;padding:9px 36px 9px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--gold);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;font-size:15px;}
.ctrl-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ctrl-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.ctrl-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.prog-info{font-size:12px;color:var(--muted);white-space:nowrap;}

/* ── PROGRESS BAR ── */
.prog-bar{height:4px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s;}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:28px;padding:28px;}
@media(max-width:640px){.cards-grid{grid-template-columns:1fr;padding:16px;gap:20px;}}

/* ── FLIP CARD ── */
.flip-wrap{perspective:1200px;}
.flip-inner{position:relative;width:100%;min-height:260px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;width:100%;min-height:260px;backface-visibility:hidden;border-radius:18px;padding:20px;display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.flip-back{transform:rotateY(180deg);direction:rtl;padding:24px;}

/* FRONT */
.flip-front{background:var(--card-bg);padding:24px;}
.fc-book-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:12px;}
.fc-cat{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'Outfit',sans-serif;}
.fc-term-ar{font-size:1.35rem;font-weight:800;color:var(--navy);line-height:1.4;margin-bottom:10px;}
.fc-term-en{font-size:.95rem;font-weight:500;color:var(--muted);font-family:'Outfit',sans-serif;font-style:italic;direction:ltr;text-align:right;}
.fc-hint{margin-top:auto;padding-top:12px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
.fc-hint-txt{opacity:.6;}
.fc-flip-icon{font-size:18px;opacity:.35;}
.fc-status{display:flex;gap:8px;margin-top:auto;padding-top:16px;}
.status-btn{flex:1;padding:7px 4px;border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text);}
.status-btn.know{border-color:var(--green);color:var(--green);}
.status-btn.know:hover,.status-btn.know.sel{background:var(--green);color:#fff;border-color:var(--green);}
.status-btn.review{border-color:var(--gold);color:#92400e;}
.status-btn.review:hover,.status-btn.review.sel{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.status-btn.hard{border-color:var(--red);color:var(--red);}
.status-btn.hard:hover,.status-btn.hard.sel{background:var(--red);color:#fff;border-color:var(--red);}

/* BACK */
.flip-back{background:linear-gradient(160deg,#0d1b2e 0%,#163456 100%);}
.fb-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px;font-family:'Outfit',sans-serif;}
.fb-def-ar{font-size:1rem;font-weight:500;color:#fff;line-height:1.75;margin-bottom:12px;}
.fb-def-en{font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.65;font-family:'Outfit',sans-serif;direction:ltr;text-align:right;font-style:italic;}
.fb-formula{background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.3);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.9rem;color:var(--gold);font-family:'Outfit',sans-serif;direction:ltr;text-align:center;font-weight:600;}
.fb-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto;padding-top:12px;}
.fb-tag{background:rgba(255,255,255,.08);border-radius:20px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.5);}
.fb-back-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:10px;transition:background .15s;}
.fb-back-btn:hover{background:rgba(255,255,255,.18);}

/* CARD STATUS INDICATORS */
.flip-wrap[data-status="know"] .flip-front{border-color:var(--green);border-width:2px;}
.flip-wrap[data-status="review"] .flip-front{border-color:var(--gold);border-width:2px;}
.flip-wrap[data-status="hard"] .flip-front{border-color:var(--red);border-width:2px;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:3rem;margin-bottom:12px;opacity:.4;}
.empty-msg{font-size:.95rem;}

/* ── BOOK COLORS ── */
.book-comp .fc-book-tag{background:var(--comp-l);color:var(--comp);}
.book-people .fc-book-tag{background:var(--people-l);color:var(--people);}
.book-org .fc-book-tag{background:var(--org-l);color:var(--org);}
.book-wp .fc-book-tag{background:var(--wp-l);color:var(--wp);}

/* ── SUMMARY BAR ── */
.summary{display:flex;gap:10px;padding:12px 20px;background:var(--card-bg);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sum-item{display:flex;align-items:center;gap:6px;font-size:12.5px;}
.sum-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── HERO MODE (single card) ── */
.hero-mode .cards-grid{grid-template-columns:1fr;max-width:560px;margin:0 auto;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-badge">📇 Flash Cards — بطاقات المراجعة</div>
  <div class="hdr-badge" style="background:rgba(21,128,61,.15);border-color:rgba(21,128,61,.35);color:#4ade80;">✅ مُحدَّثة بتغييرات 2025</div>
  <h1>SHRM 2023 — <em>بطاقات المراجعة الشاملة</em></h1>
  <p>250 بطاقة · عربي وإنجليزي · الكتب الأربعة · محدَّثة بتغييرات نسخ 2024-2025</p>
  <div class="hdr-stats">
    <div class="hstat"><div class="hstat-n">250</div><div class="hstat-l">بطاقة</div></div>
    <div class="hstat"><div class="hstat-n" id="knownCount">0</div><div class="hstat-l">أتقنتها ✓</div></div>
    <div class="hstat"><div class="hstat-n" id="reviewCount">0</div><div class="hstat-l">للمراجعة</div></div>
    <div class="hstat"><div class="hstat-n" id="hardCount">0</div><div class="hstat-l">صعبة</div></div>
  </div>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>
<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="ابحث عن مصطلح..." id="searchInput" oninput="filterCards()">
  </div>
  <button class="ctrl-btn" onclick="filterStatus('all')" id="btn-all">الكل</button>
  <button class="ctrl-btn" onclick="filterStatus('know')" id="btn-know">✓ أعرفها</button>
  <button class="ctrl-btn" onclick="filterStatus('review')" id="btn-review">⟳ للمراجعة</button>
  <button class="ctrl-btn" onclick="filterStatus('hard')" id="btn-hard">✗ صعبة</button>
  <button class="ctrl-btn" onclick="shuffleCards()">🔀 خلط</button>
  <span class="prog-info" id="progInfo">0 / 250</span>
</div>

<div class="summary" id="summaryBar"></div>
<div class="cards-grid" id="cardsGrid"></div>

<script>

ar:"تحليل SWOT في استراتيجية HR",en:"SWOT Analysis in HR Strategy",
defAr:"نقاط القوة والضعف (داخلية) + الفرص والتهديدات (خارجية) = وعي موقفي لتطوير استراتيجية HR",
defEn:"Strengths/Weaknesses (internal) + Opportunities/Threats (external) = situational awareness for HR strategy development.",
formula:"S+W (internal) + O+T (external)",
tags:["Business Acumen","Strategy"]},

{id:24,book:"comp",bookName:"Competencies",cat:"Critical Evaluation",
ar:"الارتباط ≠ السببية",en:"Correlation ≠ Causation",
defAr:"متغيّران يتحركان معاً إحصائياً دون إثبات أن أحدهما يُسبّب الآخر — متغير ثالث قد يُفسّر كليهما",
defEn:"Two variables moving together statistically doesn't prove causation. A third (confounding) variable may explain both. Critical for HR data interpretation.",
tags:["Critical Evaluation","Analytics"]},

{id:25,book:"comp",bookName:"Competencies",cat:"Critical Evaluation",
ar:"نموذج كيركباتريك — 4 مستويات",en:"Kirkpatrick 4-Level Model",
defAr:"المستوى 1: ردة الفعل. المستوى 2: التعلم. المستوى 3: السلوك. المستوى 4: النتائج. معظم التدريب يتوقف عند 1-2",
defEn:"Level 1: Reaction (satisfaction). Level 2: Learning (knowledge). Level 3: Behavior (application). Level 4: Results (business impact).",
formula:"Reaction → Learning → Behavior → Results",
tags:["L&D","Kirkpatrick"]},

{id:26,book:"comp",bookName:"Competencies",cat:"Critical Evaluation",
ar:"عائد الاستثمار في HR",en:"HR ROI Formula",
defAr:"صافي الفائدة (الفائدة − التكلفة) مقسوماً على التكلفة × 100 — يُترجم استثمار HR إلى لغة مالية",
defEn:"(Net Benefit / Cost) × 100 = ROI%. Example: Program costs $500K, saves $900K in turnover → Net Benefit $400K → ROI = 80%.",
formula:"ROI = (Benefit − Cost) / Cost × 100",
tags:["Business Acumen","ROI"]},

{id:27,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"عرض قيمة الموظف",en:"Employee Value Proposition (EVP)",
defAr:"مجموعة المكافآت والتجارب والسمات التي تُميّز صاحب العمل وتُؤثر على لماذا يختار الموهوب العمل هنا",
defEn:"The full set of attributes, rewards, and experiences that distinguish an employer and influence why talent chooses and stays. Answers 'Why work here?'",
tags:["Talent Acquisition","EVP"]},

{id:28,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"تحليل الوظيفة",en:"Job Analysis",
defAr:"تحديد المهام والواجبات والمعرفة والمهارات والقدرات لوظيفة ما — الأساس لكل وظائف HR الأخرى",
defEn:"Systematically identifying tasks, duties, KSAs for a job. The foundation for valid selection, compensation, performance management, and training.",
tags:["HR Expertise","Job Design"]},

{id:29,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"نسبة Compa-Ratio",en:"Compa-Ratio",
defAr:"الراتب الفعلي ÷ منتصف النطاق المرجعي. 1.0 = عند المنتصف، <1.0 تحت المنتصف، >1.0 فوق المنتصف",
defEn:"Actual Pay ÷ Range Midpoint. 1.0 = at midpoint (market competitive). Below 1.0 = below market. Above 1.0 = above market. Used for pay equity analysis.",
formula:"Compa-Ratio = Actual Pay ÷ Midpoint",
tags:["Total Rewards","Compensation"]},

{id:30,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"تخطيط الخلافة الوظيفية",en:"Succession Planning",
defAr:"بناء خطوط أنابيب استباقية لمرشحين داخليين مؤهلين للأدوار الحاسمة — يُقلل الاعتماد على التوظيف الخارجي الطارئ",
defEn:"Proactively building pipelines of qualified internal candidates for critical roles. Reduces time-to-fill for critical vacancies and retains development-focused employees.",
tags:["HR Expertise","Succession"]},

{id:31,book:"comp",bookName:"Competencies",cat:"Relationship Management",
ar:"التأثير بدون سلطة",en:"Influence Without Authority",
defAr:"تحقيق نتائج من خلال التعاون مع القادة الذين لا علاقة تبعية بينهم وبين HR — المهارة الأساسية للـ HRBP",
defEn:"Achieving outcomes when you can't mandate compliance. Since HR rarely has line authority over business leaders, this is how HR operates most of the time.",
tags:["Relationship Management"]},

{id:32,book:"comp",bookName:"Competencies",cat:"Relationship Management",
ar:"العقد النفسي",en:"Psychological Contract",
defAr:"مجموعة التوقعات المتبادلة غير المكتوبة بين الموظف وصاحب العمل — انتهاكه يُفضي إلى انفصال الموظف",
defEn:"The informal, unwritten set of mutual expectations between employee and employer. When violated, disengagement or exit follows even without formal breach.",
tags:["Relationship Management","Engagement"]},

{id:33,book:"comp",bookName:"Competencies",cat:"Global",
ar:"نموذج هوفستيد — المسافة من السلطة",en:"Hofstede: Power Distance",
defAr:"درجة قبول الأعضاء الأقل قوة للتوزيع غير المتساوي للسلطة — يُؤثر على أسلوب التواصل والإدارة",
defEn:"Degree to which less powerful members accept unequal power distribution. High PD = expect hierarchy/deference. Low PD = expect consultation/flat structures.",
tags:["Global","Hofstede"]},

{id:34,book:"comp",bookName:"Competencies",cat:"Global",
ar:"نموذج هوفستيد — الفردية مقابل الجماعية",en:"Hofstede: Individualism vs. Collectivism",
defAr:"يُؤثر مباشرةً على تصميم أنظمة المكافآت — الثقافات الفردية تتوقع مكافآت أداء فردية، الجماعية تُفضّل المكافآت الجماعية",
defEn:"Directly impacts reward design. High individualism (US) expects individual performance pay. High collectivism may find individual rankings divisive.",
tags:["Global","Hofstede"]},

{id:35,book:"comp",bookName:"Competencies",cat:"Global",
ar:"التواضع الثقافي",en:"Cultural Humility",
defAr:"توجّه تعلّم مستمر + وعي ذاتي حول افتراضاتنا الثقافية — يختلف عن الكفاءة الثقافية بالتأكيد على الفضول المستمر",
defEn:"Lifelong learning orientation + self-awareness about one's own cultural assumptions. Differs from cultural competence by emphasizing ongoing curiosity over mastery.",
tags:["Global","Cultural Effectiveness"]},

{id:36,book:"comp",bookName:"Competencies",cat:"Leadership",
ar:"القيادة الخادمة",en:"Servant Leadership (Greenleaf)",
defAr:"الدور الأول للقائد هو تمكين الآخرين من الازدهار — يضع احتياجات الأتباع قبل أجندة القائد الخاصة",
defEn:"Leader's primary role is enabling others to flourish — developing capability, removing obstacles, building trust. Followers exist to be served, not the reverse.",
tags:["Leadership Styles"]},

{id:37,book:"comp",bookName:"Competencies",cat:"Leadership",
ar:"القيادة التحويلية مقابل التبادلية",en:"Transformational vs. Transactional",
defAr:"التحويلية: إلهام الأتباع نحو رؤية تتجاوز مصلحتهم الذاتية. التبادلية: أداء مقابل مكافأة — تبادل منظّم",
defEn:"Transformational: inspiring followers toward a vision beyond self-interest. Transactional: exchange-based — performance for reward, monitoring, short-term.",
tags:["Leadership Styles"]},

{id:38,book:"comp",bookName:"Competencies",cat:"DEI",
ar:"الرعاية (Sponsorship) مقابل الإرشاد (Mentorship)",en:"Sponsorship vs. Mentorship",
defAr:"الإرشاد: نصيحة وتوجيه في محادثة مباشرة. الرعاية: استخدام رأس المال التنظيمي للمناصرة والترشيح عندما لا يكون الشخص حاضراً",
defEn:"Mentorship = advice in conversation. Sponsorship = using organizational capital to advocate for someone in rooms they don't attend. Sponsorship is more powerful for advancement.",
tags:["DEI","Career Development"]},

{id:39,book:"comp",bookName:"Competencies",cat:"Business Acumen",
ar:"نموذج الأعمال",en:"Business Model",
defAr:"كيف تخلق المنظمة وتُقدّم وتلتقط القيمة — فهمه يُحدد أي القدرات البشرية هي الأكثر أهمية استراتيجياً لـ HR",
defEn:"How the organization creates, delivers, and captures value. Understanding it determines what human capital capabilities HR must prioritize protecting and developing.",
tags:["Business Acumen","Strategy"]},

{id:40,book:"comp",bookName:"Competencies",cat:"Critical Evaluation",
ar:"تحيز الاختيار في الأبحاث",en:"Selection Bias",
defAr:"عندما تختلف مجموعة المقارنة منهجياً عن مجموعة التدخل — يجعل استنتاجات السببية مشككاً فيها",
defEn:"When the comparison group systematically differs from the intervention group (e.g., high-potential employees selected for leadership programs). Makes causal conclusions suspect.",
tags:["Critical Evaluation","Analytics"]},

{id:41,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"إدارة الأداء — تكرار التغذية الراجعة",en:"Performance Management: Feedback Frequency",
defAr:"تكرار التغذية الراجعة — وليس تصميم نموذج التقييم — هو المحرك الأساسي لفاعلية إدارة الأداء",
defEn:"Feedback frequency — not rating scale design — is the primary driver of performance management effectiveness. Annual reviews cannot substitute for ongoing developmental dialogue.",
tags:["HR Expertise","Performance"]},

{id:42,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"تحليل احتياجات التدريب",en:"Training Needs Analysis",
defAr:"الخطوة الأولى: تحديد ما إذا كانت الفجوة ناجمة عن نقص المعرفة/المهارة (التدريب مفيد) أم عوامل أخرى (التدريب لن يُساعد)",
defEn:"First step: determine if the gap is caused by knowledge/skill deficiency (training helps) or process/motivation/resource issues (training won't help). Don't train for non-training problems.",
tags:["L&D","Needs Analysis"]},

{id:43,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"نموذج 70-20-10",en:"70-20-10 Learning Model",
defAr:"70% من التجربة الميدانية والمهام التحدية. 20% من العلاقات والتوجيه. 10% من التدريب الرسمي",
defEn:"70% = on-the-job experience and stretch assignments. 20% = relationships, mentors, coaches, feedback. 10% = formal training and courses.",
formula:"70% Experiential + 20% Social + 10% Formal",
tags:["L&D","Learning Design"]},

{id:44,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"التخطيط للقوى العاملة — توقع الطلب",en:"Workforce Planning: Demand Forecasting",
defAr:"تقدير عدد ونوع الموظفين الذين ستحتاجهم المنظمة لتحقيق أهدافها الاستراتيجية في أفق زمني محدد",
defEn:"Estimating the number and type of employees needed to achieve strategic objectives in a future time horizon. The demand side of the workforce plan.",
tags:["HR Expertise","Workforce Planning"]},

{id:45,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"الأجر المتغير",en:"Variable Pay",
defAr:"يكون الأكثر فاعلية عندما: الأداء قابل للقياس + خط بصري واضح بين السلوك والمقياس + الخطة تموّل نفسها بالتحسين",
defEn:"Most effective when: performance is measurable, line of sight between behavior and metric is clear, and the plan is self-funded by the performance improvement it drives.",
tags:["Total Rewards","Variable Pay"]},

{id:46,book:"comp",bookName:"Competencies",cat:"Consultation",
ar:"تحيز الاختيار في أبحاث تأثير البرامج",en:"Selection Bias in Program Evaluation",
defAr:"الموظفون المُختارون لبرنامج قيادي غالباً عالو الإمكانات مسبقاً — نجاحهم قد يعكس ذلك لا البرنامج ذاته",
defEn:"Employees selected for leadership programs are often already high-potential. Their success may reflect pre-existing potential, not the program's impact. Requires control group.",
tags:["Critical Evaluation","L&D"]},

{id:47,book:"comp",bookName:"Competencies",cat:"Change Management",
ar:"التغيير الأكثر إهمالاً — إدارة المقاومة",en:"Managing Resistance — Kotter Step 7",
defAr:"إزالة العوائق: المديرون والهياكل والعمليات التي تُعيق التغيير يجب تحديدها وإزالتها أو إصلاحها بفاعلية",
defEn:"Removing obstacles: managers, structures, and processes blocking change must be identified and actively addressed. This step is most often skipped — causing change failure.",
tags:["Kotter","Change Management"]},

{id:48,book:"comp",bookName:"Competencies",cat:"Ethics",
ar:"الإبلاغ عن المخالفات — واجب HR",en:"Whistleblowing — HR's Obligation",
defAr:"HR ملزم بالتحقيق بعدالة واتخاذ إجراء مناسب — بصرف النظر عن مستوى وعلاقات المتهم. الجميع أمام المعايير سواء",
defEn:"HR must investigate fairly and act on findings regardless of seniority, relationships, or performance. Equal accountability is both an ethical and legal requirement.",
tags:["Ethics","Investigations"]},

{id:49,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"التوظيف المهمل",en:"Negligent Hiring",
defAr:"مسؤولية صاحب العمل عن عدم التحقق من سجل المرشح — خاصةً للأدوار ذات الوصول إلى الفئات الضعيفة",
defEn:"Employer liability for failing to check a candidate's background for roles with access to vulnerable populations. Balanced by FCRA requirements on adverse action process.",
tags:["HR Expertise","Legal Risk"]},

{id:50,book:"comp",bookName:"Competencies",cat:"HR Expertise",
ar:"التحيز الضمني في التوظيف بالذكاء الاصطناعي",en:"AI Hiring Tools & Adverse Impact",
defAr:"أدوات التوظيف بالذكاء الاصطناعي خاضعة لنفس معايير عدم التمييز كالمحكمين البشريين — التحقق المستقل من التأثير المتعارض مطلوب",
defEn:"AI hiring tools are subject to the same non-discrimination standards as human raters. Independent adverse impact validation is required before deployment. Vendor certification is insufficient.",
tags:["HR Expertise","Technology","Legal"]},

// ─────────────────────────────────────────
// BOOK 2: PEOPLE DOMAIN (50 cards)
// ─────────────────────────────────────────
{id:51,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"نسبة الخُمسة الأرباع (80%)",en:"4/5ths Rule (Adverse Impact)",
defAr:"إذا كان معدل اختيار أي مجموعة أقل من 80% من معدل المجموعة الأعلى → مؤشر على التأثير المتعارض",
defEn:"If any group's selection rate is less than 80% of the highest-selected group's rate → adverse impact is indicated. Example: 30% ÷ 50% = 60% < 80%.",
formula:"Adverse Impact if: (Group Rate ÷ Highest Rate) < 80%",
tags:["Talent Acquisition","Legal","EEO"]},

{id:52,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"المقابلة المنظّمة",en:"Structured Interview",
defAr:"نفس الأسئلة + نفس الترتيب + معايير تقييم موحّدة لجميع المرشحين = صدق وثبات وقابلية للدفاع قانونياً",
defEn:"Same questions, same order, standardized scoring rubric for all candidates. Improves reliability, validity, and legal defensibility over unstructured interviews.",
tags:["Talent Acquisition","Selection"]},

{id:53,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"تقنية STAR في المقابلات",en:"STAR Behavioral Interview Technique",
defAr:"الموقف → المهمة → الإجراء (الأهم: ماذا فعل هو بالتحديد؟) → النتيجة. الإجراء هو جوهر الكشف عن السلوك الفعلي",
defEn:"Situation → Task → Action (most critical: what did THEY specifically do?) → Result. Action separates individual contribution from team or contextual factors.",
formula:"Situation → Task → Action → Result",
tags:["Talent Acquisition","Interviewing"]},

{id:54,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"معاينة الوظيفة الواقعية",en:"Realistic Job Preview (RJP)",
defAr:"تزويد المرشحين بمعلومات دقيقة عن الجوانب الإيجابية والصعبة معاً — يُقلل دوران الموظفين المبكر وصدمة الواقع",
defEn:"Providing candidates with accurate information about both positive and challenging aspects of the role. Reduces early voluntary turnover and expectation misalignment.",
tags:["Talent Acquisition","Onboarding"]},

{id:55,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"نسبة العائد في التوظيف",en:"Yield Ratio",
defAr:"نسبة المرشحين الذين ينتقلون من مرحلة لأخرى في مسار التوظيف — يُحدد أين يفقد المسار المرشحين",
defEn:"Proportion of candidates who advance from one recruitment stage to the next. Tracking across stages identifies bottlenecks in the recruiting funnel.",
tags:["Talent Acquisition","Metrics"]},

{id:56,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"الإلحاق (Onboarding) مقابل التوجيه",en:"Onboarding vs. Orientation",
defAr:"التوجيه = إجراءات إدارية في اليوم الأول. الإلحاق = عملية تكامل كاملة 30-90 يوماً: ثقافة + شبكات + وضوح الدور",
defEn:"Orientation = Day 1 administrative process. Onboarding = 30-90+ day integration: culture, networks, role clarity, manager relationships, early performance milestones.",
tags:["Talent Acquisition","Onboarding"]},

{id:57,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"قانون FCRA — الإجراء ما قبل السلبي",en:"FCRA Pre-Adverse Action",
defAr:"قبل رفض مرشح بسبب نتيجة تحقق الخلفية: تزويده بنسخة من التقرير + ملخص حقوقه للطعن في الأخطاء",
defEn:"Before taking adverse action based on background check: provide applicant with (1) copy of the report AND (2) FCRA rights summary. Gives opportunity to dispute errors.",
tags:["Talent Acquisition","FCRA","Legal"]},

{id:58,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"الاستعداد الفوري للمرشحين (Pipeline)",en:"Talent Pipeline Strategy",
defAr:"بناء علاقات مع المرشحين المحتملين قبل نشوء الشواغر — يُقلل وقت الملء ويُحسّن جودة التوظيف",
defEn:"Building and maintaining relationships with potential candidates before roles open. Creates a ready pool that reduces time-to-fill and improves hire quality.",
tags:["Talent Acquisition","Strategy"]},

{id:59,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"الإنصاف الداخلي في الأجور",en:"Internal Pay Equity",
defAr:"عدالة الأجر عبر الأدوار داخل المنظمة — هل الوظائف ذات القيمة المتشابهة تحصل على تعويض متشابه؟",
defEn:"Fairness of pay relationships between jobs inside the organization. Are jobs of similar value compensated similarly? Distinct from external market competitiveness.",
tags:["Total Rewards","Compensation"]},

{id:60,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"التسعير السوقي للوظيفة",en:"Market Pricing a Job",
defAr:"جمع بيانات رواتب الوظائف المماثلة في سوق العمل المعني لتحديد نطاق التنافسية التعويضية للوظيفة",
defEn:"Gathering pay data for comparable jobs in the relevant labor market to establish the competitive pay range (minimum/midpoint/maximum) for the role.",
tags:["Total Rewards","Compensation"]},

{id:61,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"الرضا مقابل الانخراط الوظيفي",en:"Satisfaction vs. Engagement",
defAr:"الرضا = راض عن الوضع الحالي (سلبي). الانخراط = التزام عاطفي + جهد تقديري + استثمار في نجاح المنظمة (إيجابي نشط)",
defEn:"Satisfaction = content with current state (passive). Engagement = active commitment + discretionary effort + emotional investment in organizational success.",
tags:["Engagement","Core Concepts"]},

{id:62,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"نموذج Hackman & Oldham — الاستقلالية",en:"Job Characteristics Model — Autonomy",
defAr:"الاستقلالية تُنتج إحساساً بالمسؤولية الشخصية عن النتائج → يُؤدي إلى دافعية داخلية أعلى",
defEn:"Autonomy → experienced personal responsibility for outcomes → higher internal motivation. When employees control their methods, they feel accountable for results.",
formula:"Autonomy → Responsibility → Internal Motivation",
tags:["Engagement","Job Design"]},

{id:63,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"مقابلة البقاء",en:"Stay Interview",
defAr:"أداة استباقية للاحتفاظ تُجرى مع الموظفين الحاليين لفهم ما يُبقيهم وما قد يدفعهم للمغادرة — قبل القرار",
defEn:"Proactive retention tool conducted with active employees to understand what keeps them and what might push them to leave — while there's still time to act.",
tags:["Engagement","Retention"]},

{id:64,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"نقاط المروّج الصافية للموظفين eNPS",en:"Employee Net Promoter Score (eNPS)",
defAr:"المروّجون (9-10) ناقص المنتقدون (0-6) — نطاق من -100 إلى +100. سؤال واحد: 'هل تُوصي بهذه المنظمة مكاناً للعمل؟'",
defEn:"Promoters (9-10) minus Detractors (0-6). Range: -100 to +100. Single question: 'How likely are you to recommend this organization as a place to work?'",
formula:"eNPS = %Promoters − %Detractors",
tags:["Engagement","Metrics"]},

{id:65,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"تكلفة دوران الموظفين الطوعي",en:"Voluntary Turnover Cost",
defAr:"تكلفة المغادرة + تكلفة الشغور + تكلفة الاستبدال + الإلحاق والتدريب + فقدان الإنتاجية = 50-200% من الراتب السنوي",
defEn:"Departure + vacancy + replacement + onboarding + productivity ramp-up costs combined. SHRM estimates 50-200% of annual salary depending on role complexity.",
formula:"Departure + Vacancy + Replacement + Onboarding + Ramp-up",
tags:["Engagement","Retention","Metrics"]},

{id:66,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"نظرية العاملين — هرزبرج",en:"Herzberg's Two-Factor Theory",
defAr:"عوامل النظافة (أجر، سياسات): غيابها يُسبّب عدم الرضا لكن وجودها لا يُحفّز. المُحفّزات (إنجاز، تقدير): تُحفّز فعلاً",
defEn:"Hygiene factors (pay, policy): absence causes dissatisfaction, presence doesn't motivate. Motivators (achievement, recognition, growth): these actually motivate.",
tags:["Engagement","Motivation Theories"]},

{id:67,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"تصميم الوظيفة الإبداعي (Job Crafting)",en:"Job Crafting",
defAr:"يُبادر الموظف بإعادة تشكيل مهامه وعلاقاته وإدراكه للعمل لزيادة معناه دون تغيير وصف الوظيفة الرسمي",
defEn:"Employee-initiated proactive reshaping of tasks, relationships, and perceptions of work to increase meaning and alignment with strengths — without formal job description changes.",
tags:["Engagement","Job Design"]},

{id:68,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"تأثير بيغماليون في الإدارة",en:"Pygmalion Effect in Management",
defAr:"التوقعات العالية التي يُعبّر عنها القائد تُنتج أداءً أعلى من الأتباع — التوقعات تُحقق نفسها بنفسها",
defEn:"High expectations communicated by a leader produce higher performance from followers. Low expectations produce lower performance. Expectations become self-fulfilling.",
tags:["Engagement","Leadership"]},

{id:69,book:"people",bookName:"People Domain",cat:"L&D",
ar:"نموذج ADDIE",en:"ADDIE Instructional Design Model",
defAr:"تحليل → تصميم → تطوير → تنفيذ → تقييم — النموذج الأساسي في تصميم التعليم",
defEn:"Analyze → Design → Develop → Implement → Evaluate. The foundational systematic instructional design model for creating effective training programs.",
formula:"Analyze → Design → Develop → Implement → Evaluate",
tags:["L&D","ADDIE"]},

{id:70,book:"people",bookName:"People Domain",cat:"L&D",
ar:"انتقال التدريب",en:"Transfer of Training",
defAr:"درجة تطبيق المتعلمين لما تعلموه في التدريب على أدائهم الفعلي في العمل وتثبيت ذلك التطبيق بمرور الوقت",
defEn:"The degree to which learners apply what they learned in training to actual job performance and sustain that application over time. The most critical and most often missing L&D measure.",
tags:["L&D","Training"]},

{id:71,book:"people",bookName:"People Domain",cat:"L&D",
ar:"منظمة التعلم — سينج",en:"Learning Organization — Senge",
defAr:"ثقافة حيث يتوسّع الناس باستمرار في قدرتهم على خلق النتائج ونماذج التفكير الجديدة — ليست مجرد ساعات تدريب عالية",
defEn:"Culture where people continually expand capacity to create results. Systems thinking + personal mastery + mental models + shared vision + team learning. Not just high training hours.",
tags:["L&D","Senge"]},

{id:72,book:"people",bookName:"People Domain",cat:"L&D",
ar:"التعلم المُصغَّر",en:"Microlearning",
defAr:"لحظات تعلم قصيرة (3-5 دقائق) مُوجّهة للتطبيق الفوري — الأنسب لتحديثات المعرفة وتذكير الامتثال",
defEn:"Short (3-5 minute) focused learning moments designed for immediate application. Most appropriate for product updates, software tips, compliance refreshers — not complex skill development.",
tags:["L&D","Learning Design"]},

{id:73,book:"people",bookName:"People Domain",cat:"L&D",
ar:"الاستشارة في الأداء (Performance Consulting)",en:"Performance Consulting Approach",
defAr:"L&D يُشخّص أسباب فجوات الأداء قبل التوصية بالتدريب — قد يُوصي بحلول غير تدريبية إذا لم تكن المشكلة نقص معرفة",
defEn:"L&D diagnoses performance gap root causes before recommending training. May recommend non-training solutions (process redesign, incentives) when the gap isn't knowledge-based.",
tags:["L&D","Consultation"]},

{id:74,book:"people",bookName:"People Domain",cat:"L&D",
ar:"الفصل الدراسي المعكوس",en:"Flipped Classroom",
defAr:"المحتوى الأساسي يُسلَّم قبل الجلسة (فيديو، قراءة). وقت الجلسة المباشرة يُستخدم للتطبيق والممارسة والنقاش",
defEn:"Foundational content delivered before the live session (video, readings). Live session time used for application, practice, problem-solving, and discussion — not lecture.",
tags:["L&D","Learning Design"]},

{id:75,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"المكافآت الإجمالية",en:"Total Rewards",
defAr:"الراتب + الأجر المتغير + المزايا + برامج التوازن بين العمل والحياة + إدارة الأداء والتقدير + تطوير المسيرة الوظيفية",
defEn:"Compensation (base+variable) + Benefits + Work-Life + Performance & Recognition + Career Development. The full employment value proposition beyond just base pay.",
tags:["Total Rewards","Compensation"]},

{id:76,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"نطاقات الرواتب العريضة",en:"Broadbanding",
defAr:"دمج درجات الراتب الضيقة التقليدية في نطاقات أقل عدداً لكن أوسع — يُوفر مرونة للمكافأة دون الحاجة للترقية",
defEn:"Consolidating many narrow pay grades into fewer, wider salary bands. Provides flexibility to reward development within a role without promotion. Reduces administrative overhead.",
tags:["Total Rewards","Compensation"]},

{id:77,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"حوافز طويلة الأمد (LTI)",en:"Long-Term Incentive (LTI)",
defAr:"ربط مكافأة كبار المديرين بأداء الأعمال على مدى 3-5 سنوات — الأسهم الأدائية تُحاذي مصالحهم مع المساهمين",
defEn:"Links senior manager reward to 3-5 year business performance. Performance shares directly connecting reward to specific outcomes are strongest for shareholder alignment.",
tags:["Total Rewards","Executive Compensation"]},

{id:78,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"تحليل عدالة الأجر",en:"Pay Equity Analysis",
defAr:"فجوة إحصائية بعد التحكم في العوامل الشرعية = مشكلة عدالة هيكلية تستوجب التحقيق — ليس دليلاً تلقائياً على التمييز",
defEn:"Statistically significant gap after controlling for legitimate factors = potential structural equity problem requiring investigation — not automatic proof of discrimination.",
tags:["Total Rewards","Pay Equity","Legal"]},

{id:79,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"قانون ERISA — واجب الأمانة",en:"ERISA Fiduciary Duty",
defAr:"مديرو خطط المنافع ملزمون بالتصرف فقط لصالح المشاركين والمستفيدين بالعناية والمهارة التي يُبديها الشخص الحذر",
defEn:"Plan administrators must act solely in participants' and beneficiaries' interest with the care, skill, and prudence that a prudent, knowledgeable person would use.",
tags:["Total Rewards","ERISA","Legal"]},

{id:80,book:"people",bookName:"People Domain",cat:"Total Rewards",
ar:"المزايا المرنة (Cafeteria Plan)",en:"Flexible Benefits / Cafeteria Plan",
defAr:"يسمح للموظفين بتخصيص ميزانية مزاياهم نحو ما يُقدّرونه — نفس الميزانية الإجمالية، قيمة مُدركة أعلى",
defEn:"Allows employees to allocate their benefits budget toward what they personally value. Same total budget, higher perceived value when employees choose what matters to them.",
tags:["Total Rewards","Benefits"]},

{id:81,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"الإنضباط التدريجي",en:"Progressive Discipline",
defAr:"تحذير شفهي → تحذير خطي → إيقاف → إنهاء. الهدف: إتاحة فرصة للتصحيح — الإنهاء هو الملاذ الأخير",
defEn:"Verbal warning → Written warning → Suspension → Termination. Purpose: give employees fair notice and opportunity to correct. Termination is a last resort after documented improvement opportunities.",
formula:"Verbal → Written → Suspension → Termination",
tags:["Employee Relations","Discipline"]},

{id:82,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"الإنهاء الضمني / البنّاء",en:"Constructive Discharge",
defAr:"صاحب العمل يجعل ظروف العمل لا تُطاق لدرجة أن الموظف يُضطر للاستقالة — المحاكم تعامله كإنهاء قسري",
defEn:"Employer makes working conditions so intolerable that a reasonable person would feel compelled to resign. Courts treat it as the legal equivalent of an involuntary termination.",
tags:["Employee Relations","Legal"]},

{id:83,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"حقوق Weingarten",en:"Weingarten Rights (NLRB v. Weingarten 1975)",
defAr:"الموظف في بيئة نقابية له حق طلب ممثل نقابي في مقابلة تحقيقية إذا اعتقد معقولاً أنها قد تُفضي إلى عقوبة",
defEn:"Unionized employee's right to request union representation in an investigative interview if they reasonably believe it might result in discipline. Employer must grant, end, or change the interview.",
tags:["Employee Relations","NLRA","Labor"]},

{id:84,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"واجب التفاوض بحسن نية",en:"Duty to Bargain in Good Faith (NLRA)",
defAr:"الأطراف ملزمة بالالتقاء والتفاوض بجدية دون أن تُلزَم بالموافقة على أي مقترح محدد — المواجهة المشروعة جائزة",
defEn:"Parties must meet, engage genuinely in negotiation, and exchange relevant information. Neither party is required to agree to any specific proposal — impasse after genuine bargaining is permissible.",
tags:["Employee Relations","NLRA","Labor"]},

{id:85,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"الحماية بموجب المادة 7 من NLRA",en:"NLRA Section 7 — Concerted Activity",
defAr:"تحمي جميع الموظفين في القطاع الخاص (نقابيين وغير نقابيين) في مناقشة أجورهم وظروف عملهم معاً",
defEn:"Protects ALL private sector employees (union and non-union) discussing wages and working conditions with coworkers. Blanket salary confidentiality policies violate Section 7.",
tags:["Employee Relations","NLRA"]},

{id:86,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"الحماية من الانتقام — NLRA",en:"Retaliation Protection — NLRA",
defAr:"إنهاء خدمة موظف لتقديمه شكوى EEOC أو نشاطه النقابي = انتهاك منفصل مستقل عن صحة الادعاء الأصلي",
defEn:"Terminating an employee for filing an EEOC charge or union activity = a separate federal violation independent of whether the underlying claim is valid. Timing matters as evidence.",
tags:["Employee Relations","Legal"]},

{id:87,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"التوظيف حسب الإرادة (At-Will)",en:"Employment At-Will",
defAr:"أي طرف يمكنه إنهاء العلاقة في أي وقت لأي سبب أو بدون سبب — استثناءات: القوانين، العقود، السياسة العامة",
defEn:"Either party may end the employment relationship at any time for any reason or no reason — exceptions: illegal reasons (discrimination, retaliation), contracts, public policy protections.",
tags:["Employee Relations","Legal"]},

{id:88,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"معيار حسن الأسباب (Just Cause)",en:"Just Cause Standard",
defAr:"الاختبارات السبعة: إشعار كافٍ + قاعدة معقولة + تحقيق + تحقيق عادل + إثبات المخالفة + تطبيق متسق + تناسب العقوبة",
defEn:"7 tests: adequate notice + reasonable rule + investigation conducted + fair investigation + proof of violation + consistent application + proportional discipline. Employer bears the burden.",
tags:["Employee Relations","Labor","Just Cause"]},

{id:89,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"حل النزاعات البديل (ADR)",en:"Alternative Dispute Resolution (ADR)",
defAr:"الوساطة (الطرفان يحلان بأنفسهم) + التحكيم (محايد يُصدر قراراً) + مجالس النظراء — أسرع وأرخص من التقاضي",
defEn:"Mediation (parties resolve themselves) + Arbitration (neutral issues award) + Peer review panels. Generally faster, cheaper, and relationship-preserving compared to litigation.",
tags:["Employee Relations","ADR"]},

{id:90,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"حماية المُبلّغين عن المخالفات",en:"Whistleblower Protection",
defAr:"قوانين فيدرالية وولائية متعددة تحمي من الانتقام — SOX للشركات العامة، Dodd-Frank للخدمات المالية، وغيرها",
defEn:"Multiple overlapping federal and state statutes protect from retaliation: SOX (public companies), Dodd-Frank (financial services), OSHA, EPA, FCA. Applies to internal AND external reports.",
tags:["Employee Relations","Legal","Whistleblower"]},

{id:91,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"نطاق الراتب (Pay Band)",en:"Salary Band / Pay Grade",
defAr:"نطاق الأجر (الحد الأدنى، المنتصف، الحد الأقصى) الذي ينطبق على وظائف ذات قيمة مماثلة — يُحقق الانصاف الداخلي والمرونة",
defEn:"The pay range (minimum, midpoint, maximum) applying to jobs of equivalent value. Provides structure for internal equity while allowing flexibility for individual experience and performance.",
tags:["Total Rewards","Compensation"]},

{id:92,book:"people",bookName:"People Domain",cat:"Talent Acquisition",
ar:"شفافية الأجور",en:"Pay Transparency",
defAr:"مشاركة معلومات التعويض مع الموظفين — من الإفصاح عن نطاقات الأجور إلى نشر جميع الرواتب. يُقلل الفجوات غير المبررة",
defEn:"Sharing compensation information with employees — from disclosing pay ranges to fully publishing all salaries. Reduces unjustified pay gaps and improves offer acceptance rates.",
tags:["Total Rewards","Compensation"]},

{id:93,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"برامج تقدير الموظفين الفعّالة",en:"Effective Employee Recognition",
defAr:"التقدير الفعّال: محدد (ماذا فعلوا) + في وقته (قريب من السلوك) + مرتبط بالسلوكيات المطلوبة — رسمياً أو غير رسمياً",
defEn:"Effective recognition: specific (what they did), timely (close to the behavior), tied to valued behaviors. Immediate informal manager recognition often more powerful than formal programs.",
tags:["Engagement","Recognition"]},

{id:94,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"الرفاهية الوظيفية الشاملة",en:"Employee Wellbeing Programs",
defAr:"استباقية وشاملة (جسدي + ذهني + مالي + اجتماعي) — تختلف عن برامج المساعدة EAP التي تكون رد فعل على الأزمات",
defEn:"Proactive and holistic: physical + mental + financial + social wellbeing. Distinct from traditional EAPs which are primarily reactive crisis support programs.",
tags:["Engagement","Wellbeing"]},

{id:95,book:"people",bookName:"People Domain",cat:"Employee Engagement",
ar:"الالتزام التنظيمي — نموذج Meyer & Allen",en:"Organizational Commitment — 3 Components",
defAr:"عاطفي (يريد البقاء) + استمراري (يحتاج البقاء — تكاليف المغادرة عالية) + معياري (يشعر بالالتزام بالبقاء)",
defEn:"Affective (want to stay — emotional attachment) + Continuance (need to stay — high costs of leaving) + Normative (feel obligated to stay). Predicts discretionary effort and retention.",
tags:["Engagement","Retention"]},

{id:96,book:"people",bookName:"People Domain",cat:"L&D",
ar:"إطار الكفاءات",en:"Competency Framework",
defAr:"تعريف المعارف والمهارات والسلوكيات لدور ما — لغة مشتركة تدمج الاختيار والتطوير وإدارة الأداء والتخطيط للخلافة",
defEn:"Defines knowledge, skills, behaviors required for effective performance. Creates integrated talent language for selection, development, performance management, and succession planning.",
tags:["L&D","Talent Management"]},

{id:97,book:"people",bookName:"People Domain",cat:"L&D",
ar:"التكرار المتباعد في التصميم التعليمي",en:"Spaced Repetition",
defAr:"توزيع محتوى التعلم على جلسات متعددة عبر الزمن — يُحسّن الاحتفاظ طويل المدى بموجب نظرية منحنى النسيان",
defEn:"Distributing learning content across multiple sessions over time. Improves long-term retention due to the spacing effect (Ebbinghaus forgetting curve). Opposite of massed practice.",
tags:["L&D","Learning Design"]},

{id:98,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"قانون WARN — إشعار التسريح الجماعي",en:"WARN Act",
defAr:"100+ موظف → إشعار 60 يوماً قبل إغلاق منشأة (50+) أو تسريح جماعي (500+ أو 50-499 تمثل 33% من القوى العاملة)",
defEn:"Covered employers (100+): 60 calendar days advance notice before plant closing (50+ employees) or mass layoff (500+ OR 50-499 representing ≥33% of workforce). Penalty: 60 days back pay.",
formula:"100+ employees → 60 days notice",
tags:["Employee Relations","WARN","Legal"]},

{id:99,book:"people",bookName:"People Domain",cat:"Employee Relations",
ar:"قانون OWBPA — التنازل عن حقوق ADEA",en:"OWBPA: ADEA Waiver in Group Programs",
defAr:"45 يوماً للتفكير (ليس 21) + 7 أيام للتراجع + الإفصاح عن بيانات الوحدة (أعمار وألقاب المُختارين وغير المُختارين)",
defEn:"Group termination programs: 45 days (not 21) to consider + 7-day revocation + decisional unit disclosure (ages and titles of ALL selected AND not-selected). Missing any element = unenforceable waiver.",
formula:"45 days + 7-day revocation + Decisional Unit Info",
tags:["Employee Relations","ADEA","OWBPA"]},

{id:100,book:"people",bookName:"People Domain",cat:"L&D",
ar:"التصميم التعليمي الهجين",en:"Hybrid/Blended Learning Design",
defAr:"دمج الأساليب الرسمية (فصل دراسي، إلكتروني) مع الأساليب الاجتماعية (مجموعات النظراء) والتجريبية (مشاريع عمل فعلية)",
defEn:"Combines formal methods (classroom, eLearning) with social methods (peer circles, coaching) and experiential methods (stretch assignments, action learning). Addresses all 70-20-10 dimensions.",
tags:["L&D","Learning Design"]},

// ─────────────────────────────────────────
// BOOK 3: ORGANIZATION DOMAIN (50 cards)
// ─────────────────────────────────────────
{id:101,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"نموذج McKinsey 7S",en:"McKinsey 7S Framework",
defAr:"الاستراتيجية + الهيكل + الأنظمة (صلبة) + القيم المشتركة + المهارات + الأسلوب + الموظفون (ناعمة) — يجب أن تتوافق جميعها",
defEn:"Strategy + Structure + Systems (hard) + Shared Values + Skills + Style + Staff (soft). All 7 elements must be aligned for effective organizational performance.",
tags:["HR Strategy","Organization Design"]},

{id:102,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"نموذج أولريش — الأدوار الأربعة",en:"Ulrich's HR Roles",
defAr:"شريك استراتيجي + خبير إداري + بطل للموظفين + عامل تغيير — HR يُنفّذ الأدوار الأربعة لتحقيق القيمة الاستراتيجية",
defEn:"Strategic Partner + Administrative Expert + Employee Champion + Change Agent. HR must perform all four roles to deliver strategic organizational value.",
tags:["HR Strategy","Ulrich"]},

{id:103,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"شريك أعمال HR (HRBP)",en:"HR Business Partner (HRBP)",
defAr:"HR مُدمج في وحدات الأعمال — يُقدّم رؤى استراتيجية للقيادة بدلاً من مجرد تقديم الخدمات الإدارية",
defEn:"HR embedded in business units to provide strategic insights to leadership rather than just administrative services. Must demonstrate business value through talent outcomes.",
tags:["HR Strategy","HRBP"]},

{id:104,book:"org",bookName:"Organization Domain",cat:"Organization Design",
ar:"تمركز HR مقابل لا مركزيته",en:"Centralized vs. Decentralized HR",
defAr:"المركزي: اتساق وكفاءة. اللامركزي: تكيّف محلي وشراكة أعمال أقوى. النموذج الهجين يجمع مزايا الاثنين",
defEn:"Centralized: consistency and efficiency. Decentralized: local adaptation and stronger business partnership. Hybrid model: shared services + HRBPs + Centers of Excellence.",
tags:["Organization Design","HR Structure"]},

{id:105,book:"org",bookName:"Organization Domain",cat:"Organization Design",
ar:"مراكز الخدمات المشتركة",en:"Shared Services Model",
defAr:"توحيد المهام التشغيلية المتكررة في مركز واحد — يُحرر HRBPs للتركيز على الشراكة الاستراتيجية",
defEn:"Consolidating repetitive operational HR tasks into one center. Frees HR Business Partners to focus on strategic partnership. Core of the three-legged stool HR model.",
tags:["Organization Design","HR Structure"]},

{id:106,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"مؤشرات الأداء الرئيسية لـ HR",en:"HR Key Performance Indicators (KPIs)",
defAr:"مقاييس محددة وقابلة للقياس تتتبع فاعلية وظائف HR — يجب أن ترتبط بالأهداف الاستراتيجية للأعمال",
defEn:"Specific, measurable metrics tracking HR function effectiveness. Must be linked to strategic business objectives. Examples: time-to-fill, cost-per-hire, turnover rate, quality of hire.",
tags:["HR Metrics","Strategy"]},

{id:107,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"نظام معلومات الموارد البشرية (HRIS)",en:"HRIS — Human Resource Information System",
defAr:"نظام متكامل يدير بيانات الموظفين والرواتب والمزايا وإدارة الأداء — يُتيح للـ HR التركيز على العمل الاستراتيجي",
defEn:"Integrated system managing employee data, payroll, benefits, and performance management. Automates routine HR transactions, enabling HR to focus on strategic work.",
tags:["HR Technology","HRIS"]},

{id:108,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"تحليلات القوى العاملة",en:"Workforce Analytics",
defAr:"استخدام أنماط بيانات القوى العاملة للتنبؤ بنتائج الأعمال وتمكين قرارات مبنية على الأدلة حول الاستثمار في المواهب",
defEn:"Using workforce data patterns to predict business outcomes and enable evidence-based decisions on talent investment, retention, and workforce planning.",
tags:["HR Technology","Analytics"]},

{id:109,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"إدارة الأداء المستمرة",en:"Continuous Performance Management",
defAr:"محادثات منتظمة طوال العام بدلاً من مراجعة سنوية واحدة — تكرار التغذية الراجعة هو المحرك الرئيسي للفاعلية",
defEn:"Regular conversations throughout the year rather than one annual review. Feedback frequency — not rating scale design — is the primary driver of performance management effectiveness.",
tags:["Performance Management"]},

{id:110,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"التوزيع الإجباري (Forced Distribution)",en:"Forced Distribution / Forced Ranking",
defAr:"نسب ثابتة لكل مستوى أداء — يُحقق التمييز رياضياً لكن قد يُحبط الفرق وقد لا يعكس الأداء الفعلي",
defEn:"Fixed percentages for each performance level. Ensures differentiation mathematically but can demotivate teams and may not reflect actual performance distribution.",
tags:["Performance Management"]},

{id:111,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"ثقافة المنظمة",en:"Organizational Culture",
defAr:"القيم والافتراضات والممارسات المشتركة التي تُشكّل كيفية سلوك الناس في المنظمة — أقوى من السياسات والإجراءات",
defEn:"Shared values, assumptions, and practices shaping how people behave. Stronger than policies and procedures. 'Culture eats strategy for breakfast' — strategy must align with culture.",
tags:["Org Development","Culture"]},

{id:112,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"نماذج إدارة التغيير — المقارنة",en:"Change Models Comparison",
defAr:"Lewin (3 مراحل) + Kotter (8 خطوات) + ADKAR (فردي: وعي-رغبة-معرفة-قدرة-تعزيز) — كل نموذج لسياق مختلف",
defEn:"Lewin (3 phases, simple) + Kotter (8 steps, organizational) + ADKAR (individual change: Awareness-Desire-Knowledge-Ability-Reinforcement). Each model suited to different contexts.",
tags:["Change Management","Org Development"]},

{id:113,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"نموذج ADKAR للتغيير الفردي",en:"ADKAR Change Model",
defAr:"وعي (سبب التغيير) + رغبة (المشاركة) + معرفة (كيفية التغيير) + قدرة (التنفيذ) + تعزيز (الثبات)",
defEn:"Awareness (why) + Desire (participate) + Knowledge (how to change) + Ability (implement) + Reinforcement (sustain). Focuses on individual change — often used alongside Kotter.",
formula:"Awareness → Desire → Knowledge → Ability → Reinforcement",
tags:["Change Management","ADKAR"]},

{id:114,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"تحليل الفجوة الاستراتيجية في HR",en:"HR Strategic Gap Analysis",
defAr:"مقارنة وضع HR الحالي بالوضع المطلوب لدعم الاستراتيجية — تُحدد الأولويات التي تحتاج استثماراً أو تغييراً",
defEn:"Comparing HR's current state to the required state for strategy support. Identifies capability gaps, resource gaps, and structural gaps that require investment or redesign.",
tags:["HR Strategy","Analysis"]},

{id:115,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"تفويض الموارد البشرية",en:"HR Outsourcing / HR BPO",
defAr:"تفويض وظائف HR لمزودين خارجيين — يُقلل التكاليف لكن قد يُقلل من استجابة HR الاستراتيجية للأعمال",
defEn:"Delegating HR functions to external providers. Reduces costs but may reduce HR's strategic responsiveness to the business. Common for payroll, benefits administration, and recruiting.",
tags:["HR Strategy","Outsourcing"]},

{id:116,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"قياس عائد الاستثمار في رأس المال البشري",en:"Human Capital ROI",
defAr:"(إيرادات − تكاليف العمالة) ÷ تكاليف العمالة — يقيس الإنتاجية لكل وحدة استثمار في رأس المال البشري",
defEn:"(Revenue − Labor Costs) ÷ Labor Costs. Measures productivity per unit of human capital investment. Useful for comparing workforce productivity across departments or time periods.",
formula:"(Revenue − Labor Cost) ÷ Labor Cost",
tags:["HR Metrics","Human Capital"]},

{id:117,book:"org",bookName:"Organization Domain",cat:"Organization Design",
ar:"هيكل المصفوفة التنظيمية",en:"Matrix Organizational Structure",
defAr:"الموظفون لهم مديران أو أكثر: مدير وظيفي + مدير مشروع/منتج — يُعزز التعاون لكن يُعقّد السلطة والمساءلة",
defEn:"Employees have two or more reporting lines: functional manager + project/product manager. Enhances cross-functional collaboration but complicates authority and accountability.",
tags:["Organization Design","Structure"]},

{id:118,book:"org",bookName:"Organization Domain",cat:"Organization Design",
ar:"نطاق السيطرة الإدارية",en:"Span of Control",
defAr:"عدد الموظفين الذين يُشرف عليهم مدير واحد مباشرةً — التوسيع يُقلل طبقات الإدارة، التضييق يُحسّن التوجيه",
defEn:"Number of employees directly supervised by one manager. Wider spans reduce management layers; narrower spans improve coaching. Technology and job complexity affect optimal span.",
tags:["Organization Design","Structure"]},

{id:119,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"الذكاء الاصطناعي في HR — المخاطر الأخلاقية",en:"AI in HR — Ethical Risks",
defAr:"أدوات الذكاء الاصطناعي المبنية على بيانات التوظيف التاريخية تُضخّم التحيزات الموجودة — الشركة مسؤولة قانونياً عن تأثيراتها",
defEn:"AI tools trained on historical biased hiring data amplify existing biases at scale. The employing organization — not the vendor — retains legal liability for adverse impact outcomes.",
tags:["HR Technology","Ethics","Legal"]},

{id:120,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"HRIS مقابل ATS مقابل HCM",en:"HRIS vs. ATS vs. HCM",
defAr:"HRIS: إدارة بيانات الموظفين. ATS: تتبع المتقدمين للوظائف. HCM: مجموعة شاملة تدمج كل دورة حياة الموظف",
defEn:"HRIS: employee data management. ATS: applicant tracking system. HCM (Human Capital Management): comprehensive suite integrating the full employee lifecycle from recruit to retire.",
tags:["HR Technology"]},

{id:121,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"تصنيف HR — نموذج ديف أولريش",en:"HR Value Chain",
defAr:"ممارسات HR → مخرجات HR (معرفة ومهارات الموظفين) → تأثيرات HR على الأعمال (إنتاجية، جودة) → قيمة المساهمين",
defEn:"HR Practices → HR Outcomes (employee KSAs) → HR Business Effects (productivity, quality) → Shareholder Value. Makes the HR → Business → Value causal chain explicit.",
formula:"HR Practices → Employee KSAs → Business Effects → Value",
tags:["HR Strategy","Value Chain"]},

{id:122,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"التقييم بزاوية 360 درجة",en:"360-Degree Feedback",
defAr:"تقييم من الرئيس المباشر + الزملاء + المرؤوسين + العملاء — يُوفر صورة متعددة الأبعاد لأداء الفرد",
defEn:"Feedback from direct supervisor + peers + direct reports + customers. Provides a multi-dimensional performance picture. Most valuable for development, not high-stakes evaluations.",
tags:["Performance Management","Development"]},

{id:123,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"فترات خلع (OD Interventions)",en:"OD Interventions",
defAr:"تدخلات التطوير التنظيمي: إعادة هيكلة الفريق، تصميم العمل، تطوير الثقافة، تحليل العمليات، تطوير المنظمة كنظام",
defEn:"OD interventions: team restructuring, work design, culture development, process analysis, large-system change. Distinguish from training interventions — OD changes the system not just individuals.",
tags:["Org Development","OD"]},

{id:124,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"تحليل الروابط (Linkage Analysis)",en:"Linkage Research / Analytics",
defAr:"ربط بيانات انخراط الموظفين ببيانات الأداء التشغيلي ورضا العملاء والنتائج المالية لإثبات العلاقة السببية",
defEn:"Linking employee engagement data to operational performance, customer satisfaction, and financial results. Establishes the business case for HR investment with causal evidence.",
tags:["HR Metrics","Analytics"]},

{id:125,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"النمذجة التنبؤية في HR",en:"Predictive HR Analytics",
defAr:"استخدام البيانات التاريخية لبناء نماذج تتنبأ بنتائج مستقبلية — من سيغادر؟ ما الذي يُؤدي إلى الإنتاجية العالية؟",
defEn:"Using historical data to build models predicting future outcomes — who will leave? What drives high performance? Turns descriptive HR data into proactive intervention opportunities.",
tags:["HR Analytics","Strategy","Technology"]},

{id:126,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"استراتيجية بناء مقابل الشراء مقابل الاستئجار",en:"Build vs. Buy vs. Borrow Talent Strategy",
defAr:"بناء: تطوير داخلي. شراء: توظيف خارجي. استئجار: عقود مؤقتة. المزيج المثالي يعتمد على توافر المهارات وسرعة الحاجة وتكاليف التطوير",
defEn:"Build (internal development) + Buy (external hiring) + Borrow (contractors/temp) + Bot (automation). Optimal mix depends on skill availability, urgency, and development costs.",
tags:["HR Strategy","Talent Management"]},

{id:127,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"إدارة المعرفة",en:"Knowledge Management",
defAr:"تحديد وتوثيق ومشاركة المعرفة التنظيمية — يُحول المعرفة الضمنية (في رؤوس الأفراد) إلى معرفة صريحة (موثّقة)",
defEn:"Identifying, documenting, and sharing organizational knowledge. Converts tacit knowledge (in people's heads) to explicit knowledge (documented). Critical for succession and continuity.",
tags:["Org Development","Knowledge"]},

{id:128,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"نظام إدارة التعلم (LMS)",en:"Learning Management System (LMS)",
defAr:"منصة رقمية تتتبع إكمال التدريب والكفاءات وبيانات التعلم — أداة للإدارة ليس حلاً لمشاكل فاعلية التعلم",
defEn:"Digital platform tracking training completion, competencies, and learning data. An administrative tool — not a solution to learning effectiveness problems. Good data ≠ good learning.",
tags:["HR Technology","L&D"]},

{id:129,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"مؤشرات البيانات الرائدة مقابل التاريخية",en:"Leading vs. Lagging HR Metrics",
defAr:"التاريخية: تقيس ما حدث (معدل دوران). الرائدة: تتنبأ بما سيحدث (معدل الانخراط، الغياب). الجمع بينهما يُوفر إدارة استباقية",
defEn:"Lagging: measure what happened (turnover rate). Leading: predict what will happen (engagement score, absenteeism). Combining both enables proactive management before problems materialize.",
tags:["HR Metrics","Analytics"]},

{id:130,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"المعايير الذكية للأهداف",en:"SMART Goals Framework",
defAr:"محددة + قابلة للقياس + قابلة للتحقيق + ذات صلة + محددة بوقت — أساس إعداد أهداف الأداء الفعّالة",
defEn:"Specific + Measurable + Achievable + Relevant + Time-bound. Foundation for effective performance goal-setting. Goals meeting all 5 criteria significantly improve performance outcomes.",
formula:"Specific + Measurable + Achievable + Relevant + Time-bound",
tags:["Performance Management"]},

{id:131,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"رأس المال البشري مقابل رأس المال الاجتماعي",en:"Human Capital vs. Social Capital",
defAr:"رأس المال البشري: المعرفة والمهارات التي يمتلكها الأفراد. الاجتماعي: قيمة شبكات وعلاقات الموظفين داخل وخارج المنظمة",
defEn:"Human capital: knowledge and skills individuals possess. Social capital: value of employees' networks and relationships inside and outside the organization. Both are strategic assets.",
tags:["HR Strategy","Human Capital"]},

{id:132,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"إعادة الهيكلة مقابل إعادة التصميم",en:"Restructuring vs. Reorganization vs. Redesign",
defAr:"إعادة الهيكلة: تغيير هيكل الإبلاغ. إعادة التنظيم: تغيير تجميع الوحدات. إعادة التصميم: تغيير طريقة إنجاز العمل نفسها",
defEn:"Restructuring: changing reporting lines. Reorganization: changing how units are grouped. Redesign: changing how work itself is done. HR must distinguish — each requires different change interventions.",
tags:["Org Development","Organization Design"]},

{id:133,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"الخصوصية وحماية البيانات في HR",en:"Data Privacy in HR — GDPR",
defAr:"اللائحة الأوروبية لحماية البيانات تُلزم بالحصول على موافقة صريحة لجمع بيانات الموظفين وتحديد وقت الاحتفاظ وإمكانية الحذف",
defEn:"GDPR requires explicit consent for employee data collection, defined retention periods, right to deletion, and data portability. Applies to any organization with EU employees.",
tags:["HR Technology","Legal","Privacy"]},

{id:134,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"تخطيط السيناريوهات في تخطيط القوى العاملة",en:"Scenario Planning in Workforce Planning",
defAr:"تطوير سيناريوهات مستقبلية متعددة للقوى العاملة (متفائل، متشائم، محتمل) للاستعداد لحالات عدم اليقين الاستراتيجية",
defEn:"Developing multiple future workforce scenarios (optimistic, pessimistic, most likely) to prepare for strategic uncertainty. Enables proactive vs. reactive workforce decisions.",
tags:["HR Strategy","Workforce Planning"]},

{id:135,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"نظرية الدفع",en:"Nudge Theory (Thaler & Sunstein)",
defAr:"تصميم البيئة والخيارات لتحفيز السلوك المطلوب دون إلزام — يُطبّق في HR لتحسين المشاركة في الاستبيانات والخطط الصحية",
defEn:"Designing choice environments to encourage desired behaviors without mandating them. Applied in HR for improving survey participation, retirement savings enrollment, wellness program adoption.",
tags:["Org Development","Behavioral Economics"]},

{id:136,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"تعيين المواهب (Talent Calibration)",en:"Talent Calibration Sessions",
defAr:"جلسات يُقارن فيها المديرون توصياتهم ويُبررونها — يُفرض التمييز الحقيقي ويُصحَّح تحيز التجمّع في المنتصف",
defEn:"Sessions where managers compare and justify their performance recommendations. Enforces meaningful differentiation and corrects clustering bias. Key to effective performance/bonus differentiation.",
tags:["Performance Management","Calibration"]},

{id:137,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"استراتيجية الاستحواذ والاندماج — دور HR",en:"M&A Due Diligence — HR's Role",
defAr:"HR يُحدد المخاطر الخاصة به: الهياكل التعويضية + عقود النقابات + التزامات المعاشات غير الممولة + التقاضي المعلّق + التوافق الثقافي",
defEn:"HR identifies people-specific liabilities: compensation structures, union contracts, unfunded pension liabilities, employment litigation, and cultural incompatibilities that affect deal value.",
tags:["HR Strategy","M&A"]},

{id:138,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"مشاركة الموظفين في العصر الرقمي",en:"Digital Employee Experience",
defAr:"تجربة الموظف الرقمية تؤثر على الإنتاجية والانخراط — أنظمة HR المعقدة تُعيق وتحبط، البسيطة تُحرر وتُمكّن",
defEn:"Employee digital experience directly affects productivity and engagement. Complex HR systems create friction and frustration. Simple, intuitive tools empower and enable discretionary effort.",
tags:["HR Technology","Employee Experience"]},

{id:139,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"معدل دوران الموظفين المرغوب فيه",en:"Dysfunctional vs. Functional Turnover",
defAr:"الدوران الوظيفي = أداء منخفض يغادر (مفيد). الدوران المختل = أداء عالٍ يغادر (ضار). HR يجب أن يُميّز بينهما",
defEn:"Functional turnover = low performers leaving (beneficial). Dysfunctional turnover = high performers leaving (harmful). HR must distinguish — high overall turnover rate can mask this difference.",
tags:["HR Metrics","Retention"]},

{id:140,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"التكامل الاستراتيجي لـ HR",en:"Strategic HR Integration",
defAr:"ممارسات HR (توظيف، تطوير، تعويض، أداء) مُصمّمة لتعزيز الاستراتيجية التنافسية للمنظمة وليس كعمليات مستقلة",
defEn:"HR practices (recruiting, development, compensation, performance) designed to reinforce the organization's competitive strategy — not operating as independent silos.",
tags:["HR Strategy","Integration"]},

{id:141,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"الذكاء الاصطناعي التوليدي في HR",en:"Generative AI in HR",
defAr:"يُسرّع: صياغة أوصاف الوظائف، تلخيص المراجعات، إنشاء مواد تدريب. لا يُحل محله: الحكم الأخلاقي، التحقيق، القرارات الحساسة",
defEn:"Accelerates: job description drafting, review summarization, training material creation. Cannot replace: ethical judgment, investigation work, sensitive employment decisions. Human oversight required.",
tags:["HR Technology","AI"]},

{id:142,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"نماذج الكفاءة — أنواعها",en:"Competency Model Types",
defAr:"الكفاءات الأساسية (للجميع) + الكفاءات الوظيفية (لكل وظيفة) + الكفاءات القيادية (للمديرين) = الإطار الشامل",
defEn:"Core competencies (all employees) + Functional competencies (role-specific) + Leadership competencies (managers). Integrated framework connects selection, development, and performance.",
tags:["HR Strategy","Competencies"]},

{id:143,book:"org",bookName:"Organization Domain",cat:"Performance Management",
ar:"التغذية الراجعة المستمرة والتطوير",en:"Continuous Feedback Culture",
defAr:"ثقافة يُعطي فيها المديرون والزملاء تغذية راجعة بانتظام وعلى الفور — تُقلل أثر الهالة والتعصب وتحيزات الاستحضار",
defEn:"Culture where managers and peers give regular, immediate feedback. Reduces halo effect, recency bias, and recall bias common in annual reviews. Requires psychological safety.",
tags:["Performance Management","Culture"]},

{id:144,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"تكلفة التوظيف الواحد",en:"Cost Per Hire",
defAr:"(التكاليف الداخلية + التكاليف الخارجية) ÷ إجمالي التوظيفات في الفترة — معيار لكفاءة التوظيف وليس جودته",
defEn:"(Internal costs + External costs) ÷ Total number of hires. A measure of recruiting efficiency — NOT quality. Must be paired with quality-of-hire metrics for strategic value.",
formula:"(Internal + External Costs) ÷ Total Hires",
tags:["HR Metrics","Talent Acquisition"]},

{id:145,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"جودة التوظيف",en:"Quality of Hire",
defAr:"مؤشر مركّب: أداء الموظف الجديد + انخراطه + احتفاظه × مقسوم على عدد المتغيرات المُستخدمة",
defEn:"Composite indicator: new hire performance rating + engagement score + retention rate (÷ number of variables). Most valuable hiring metric but hardest to measure accurately.",
tags:["HR Metrics","Talent Acquisition"]},

{id:146,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"أسلوب التساؤل الاستقدامي",en:"Appreciative Inquiry (AI)",
defAr:"أسلوب تطوير تنظيمي يُركّز على تضخيم ما يُنجح (بدلاً من إصلاح ما يفشل) — اكتشاف + حلم + تصميم + مصير",
defEn:"OD approach focusing on amplifying what works (rather than fixing what fails). Discover → Dream → Design → Destiny. Builds on strengths rather than problems.",
formula:"Discover → Dream → Design → Destiny",
tags:["Org Development","OD"]},

{id:147,book:"org",bookName:"Organization Domain",cat:"HR Technology",
ar:"أمن وسائل التواصل الاجتماعي في بيئة العمل",en:"Social Media in the Workplace — Legal",
defAr:"سياسات وسائل التواصل الواسعة التي تحظر مناقشة ظروف العمل قد تنتهك المادة 7 من NLRA — يجب صياغتها بدقة",
defEn:"Overbroad social media policies prohibiting discussion of working conditions may violate NLRA Section 7. Policies must narrowly target confidential information without sweeping in protected speech.",
tags:["HR Technology","Legal","NLRA"]},

{id:148,book:"org",bookName:"Organization Domain",cat:"HR Strategy",
ar:"الثقافة التنظيمية — نموذج Competing Values",en:"Competing Values Framework (Quinn)",
defAr:"أربعة أربعاع: التعاون (قبيلة) + إبداع (عشوائي) + سيطرة (هرمي) + تنافس (سوق) — كل منظمة لها مزيج فريد",
defEn:"Four quadrants: Collaborate (clan) + Create (adhocracy) + Control (hierarchy) + Compete (market). Each organization has a unique blend. Useful for culture assessment and alignment.",
tags:["HR Strategy","Culture","Organization Design"]},

{id:149,book:"org",bookName:"Organization Domain",cat:"Org Development",
ar:"التطوير التنظيمي — المبادئ الجوهرية",en:"OD Core Principles",
defAr:"نظامي + تشاركي + مبني على البيانات + يُركّز على الثقافة والعمليات + يُتيح حل الفرد والفريق والمنظمة للمشكلة",
defEn:"Systemic + Participative + Data-driven + Focuses on culture and processes + Enables problem-solving at individual, team, and organizational levels. OD changes systems, not just behaviors.",
tags:["Org Development","OD"]},

{id:150,book:"org",bookName:"Organization Domain",cat:"HR Metrics",
ar:"مؤشر رضا HR (HRSAT)",en:"HR Satisfaction Score (HRSAT)",
defAr:"يقيس رضا الموظفين وقادة الأعمال عن خدمات وشراكات HR — مفيد لتحديد فجوات تجربة HR وأولويات التحسين",
defEn:"Measures employee and business leader satisfaction with HR services and partnerships. Useful for identifying HR experience gaps and improvement priorities. Distinct from employee engagement.",
tags:["HR Metrics","HR Effectiveness"]},

// ─────────────────────────────────────────
// BOOK 4: WORKPLACE DOMAIN (50 cards)
// ─────────────────────────────────────────
{id:151,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"الكولنة — تعريف فريدمان",en:"Globalization — Friedman's Definition",
defAr:"التكامل الحتمي للأسواق والدول والتقنيات — يُتيح للجميع الوصول حول العالم بشكل أبعد وأسرع وأعمق وأرخص",
defEn:"The inevitable integration of markets, nation-states, and technologies enabling individuals, corporations, and nations to reach the world farther, faster, deeper, and cheaper.",
tags:["Global Workforce","Globalization"]},

{id:152,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"نموذج Perlmutter — أثنوسنتري",en:"Perlmutter: Ethnocentric Orientation",
defAr:"المقر يتحكم بالكامل في الفروع. 'طريقة واحدة مثلى.' المديرون من PCN يطبّقون ثقافة المقر عالمياً",
defEn:"Headquarters controls all subsidiaries. 'One best way.' Parent-country nationals (PCNs) lead subsidiaries. Home-country policies applied globally. Risk: cultural blindness.",
tags:["Global Workforce","Perlmutter"]},

{id:153,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"نموذج Perlmutter — بوليسنتري",en:"Perlmutter: Polycentric Orientation",
defAr:"الفروع مستقلة طالما مربحة. 'طرق مثلى متعددة.' HCNs يقودون محلياً بسياسات HR مطوّرة محلياً",
defEn:"Subsidiaries operate independently as long as profitable. 'Multiple best ways.' HCNs lead locally with locally-developed HR policies. Risk: global inconsistency.",
tags:["Global Workforce","Perlmutter"]},

{id:154,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"نموذج Perlmutter — جيوسنتري",en:"Perlmutter: Geocentric Orientation",
defAr:"شبكة تشاركية: 'طريقة الفريق.' أفضل المواهب في أي مكان تُوجَّه للمناصب الأنسب بصرف النظر عن الجنسية",
defEn:"Collaborative network: 'The team way.' Best talent globally deployed to most suitable positions regardless of nationality. Most complex to execute. Requires sophisticated global talent infrastructure.",
tags:["Global Workforce","Perlmutter"]},

{id:155,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"مصفوفة GI-LR — استراتيجية Transnational",en:"GI-LR Matrix: Transnational Strategy",
defAr:"GI مرتفع + LR مرتفع في آنٍ معاً — الأكثر تعقيداً والأصعب تنفيذاً. أنشطة سلسلة القيمة في أفضل المواقع + تكيّف محلي",
defEn:"High global integration AND high local responsiveness simultaneously. Most complex to execute. Value chain activities in most advantageous locations + local product adaptation.",
formula:"High GI + High LR = Transnational",
tags:["Global Workforce","GI-LR Matrix"]},

{id:156,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"مصفوفة GI-LR — الاستراتيجيات الأربع",en:"GI-LR Matrix — 4 Strategies",
defAr:"دولية (GI↓ LR↓) + متعددة المحلية (GI↓ LR↑) + عالمية (GI↑ LR↓) + عابرة للحدود (GI↑ LR↑)",
defEn:"International (low GI, low LR) + Multidomestic (low GI, high LR) + Global (high GI, low LR) + Transnational (high GI, high LR). Each fits different industry/competitive contexts.",
formula:"Int'l | Multidomestic | Global | Transnational",
tags:["Global Workforce","GI-LR Matrix"]},

{id:157,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"المغترب (PCN) مقابل المحلي (HCN) مقابل الطرف الثالث (TCN)",en:"PCN vs. HCN vs. TCN",
defAr:"PCN: من بلد المقر — أعلى تكلفة، أعلى توافق استراتيجي. HCN: من البلد المضيف — أرخص، أكثر معرفة محلية. TCN: من بلد ثالث",
defEn:"PCN (parent-country national): most expensive, strongest strategic alignment. HCN (host-country national): cheapest, best local knowledge. TCN (third-country national): international experience.",
tags:["Global Workforce","International Assignment"]},

{id:158,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"إعادة توطين المغترب (Repatriation)",en:"Repatriation",
defAr:"المرحلة الأكثر إهمالاً في دورة التعيين الدولي — ابدأ التخطيط قبل الانتهاء بـ 6-12 شهراً لتجنب 'صدمة العودة'",
defEn:"The most neglected phase of international assignment. Start planning 6-12 months before assignment end. Challenges: reverse culture shock, role uncertainty, loss of benefits and status.",
tags:["Global Workforce","International Assignment"]},

{id:159,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"Offshoring مقابل Nearshoring مقابل Onshoring",en:"Offshoring vs. Nearshoring vs. Onshoring",
defAr:"Offshoring: نقل العمل لبلد بعيد. Nearshoring: لبلد مجاور. Onshoring: لمنطقة أرخص داخل نفس البلد",
defEn:"Offshoring: move work to a distant country. Nearshoring: move to a geographically proximate country (same time zone, cultural proximity). Onshoring: move within the same country.",
tags:["Global Workforce","Work Transfer"]},

{id:160,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"تأشيرة H-1B",en:"H-1B Visa",
defAr:"للعمالة في 'المهن المتخصصة' التي تتطلب درجة جامعية أو ما يعادلها + تخصص متميز + عرض عمل من صاحب عمل USA",
defEn:"For 'specialty occupation' workers. Requirements: bachelor's degree or equivalent in specific specialty field + specialized job + US employer petition. Annual cap: 65,000 + 20,000 advanced degree.",
tags:["Global Workforce","Immigration","Visa"]},

{id:161,book:"wp",bookName:"Workplace Domain",cat:"Global Workforce",
ar:"نموذج I-9 — متطلبات الإكمال",en:"Form I-9 — Completion Requirements",
defAr:"الموظف يكمل القسم 1 في أو قبل اليوم الأول. صاحب العمل يكمل القسم 2 خلال 3 أيام عمل. إلزامي لجميع موظفي USA",
defEn:"Employee completes Section 1 on or before Day 1. Employer completes Section 2 within 3 business days of start. Mandatory for ALL US employees regardless of nationality.",
formula:"Employee: Day 1 | Employer: 3 Business Days",
tags:["Global Workforce","I-9","Immigration"]},

{id:162,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"إدارة مخاطر المنشأة (ERM)",en:"Enterprise Risk Management (ERM)",
defAr:"نهج منهجي شامل لتحديد وتقييم وإدارة المخاطر عبر المنظمة — الهدف: تحسين القرارات لحماية وخلق القيمة",
defEn:"Systematic approach to identifying, assessing, and managing risks across the organization. Goal: improve decisions about risks to both protect and create organizational value.",
tags:["Risk Management","ERM"]},

{id:163,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"مبدأ MECE في تحديد المخاطر",en:"MECE Principle in Risk Identification",
defAr:"متبادلة الاستثناء (لا تداخل) + شاملة استنفاداً (لا فجوات) — التداخل يُضيع الموارد ويُشوّش المسؤولية",
defEn:"Mutually Exclusive (no overlap) + Comprehensively Exhaustive (no gaps). Overlap wastes resources and confuses ownership. Gaps leave risks unmanaged. Both conditions required.",
formula:"Mutually Exclusive + Comprehensively Exhaustive",
tags:["Risk Management","MECE"]},

{id:164,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"بطاقة تقييم المخاطر — مؤشر A×B×C×D",en:"Risk Scorecard: A×B×C×D",
defAr:"A=احتمالية (1-3) × B=سرعة الظهور (1-3) × C=ضعف الإجراءات الحالية (1-3) × D=خطورة التأثير (1-3) = الأولوية",
defEn:"A=Probability (1-3) × B=Speed of onset (1-3) × C=Weakness of current controls (1-3) × D=Severity of impact (1-3) = Priority index. Higher score = higher priority.",
formula:"A (Probability) × B (Speed) × C (Controls) × D (Impact)",
tags:["Risk Management","Scorecard"]},

{id:165,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"نموذج PAPA لأولوية المخاطر",en:"PAPA Risk Prioritization Model",
defAr:"استعدّ (بطيء+منخفض) + تصرّف (سريع+عالٍ) + أجّل (بطيء+منخفض) + تكيّف (بطيء+عالٍ) حسب السرعة × الاحتمالية",
defEn:"Prepare (fast+unlikely: contingency plans) + Act (fast+likely: immediate response) + Park (slow+unlikely: monitor only) + Adapt (slow+likely: gradual management).",
formula:"Prepare | Act | Park | Adapt",
tags:["Risk Management","PAPA"]},

{id:166,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"مؤشرات المخاطر الرئيسية (KRIs)",en:"Key Risk Indicators (KRIs)",
defAr:"مقاييس إنذار مبكر تُنذر بتزايد تعرّض المنظمة للمخاطر قبل أن تتحوّل لأزمات — إهمالها = الخطر بلا حراسة",
defEn:"Early warning metrics signaling increasing risk exposure before events materialize. Proactive vs. lagging. Must be monitored and acted upon — unused KRIs provide no value.",
tags:["Risk Management","KRIs"]},

{id:167,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
ar:"استراتيجيات معالجة المخاطر — الخمس",en:"5 Risk Treatment Strategies",
defAr:"تجنّب + تخفيض + تقاسم/نقل + قبول + المخاطر المتبقية. الملكية الأخلاقية لا تُنقل كلياً حتى مع التأمين",
defEn:"Avoidance + Reduction + Sharing/Transfer + Retention/Accept + Residual Risk. Moral ownership can't be fully transferred — even insured risks retain reputational/ethical exposure.",
tags:["Risk Management","Treatment"]},

{id:168,book:"wp",bookName:"Workplace Domain",cat:"Risk Management",
