<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="لعبة SHRM التفاعلية — تعلّم بالشرح المُجزّأ وأسئلة الاستيعاب">
<title>لعبة SHRM التفاعلية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0d1b2e;--gold:#c8a84b;--gold2:#e8c96a;
  --blue:#2563a8;--green:#1D9E75;--purple:#7c3aed;--orange:#d97706;--red:#dc2626;
  --bg:#f4f1ea;--card:#fff;--border:#e0d9cc;--text:#1a1a1a;--muted:#6b6357;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:30px;}

/* TOP HUD */
.hud{position:sticky;top:0;z-index:40;background:var(--navy);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hud .chip{display:flex;align-items:center;gap:5px;font-weight:800;font-size:14px;background:rgba(255,255,255,.08);padding:5px 11px;border-radius:30px;}
.hud .chip.heart{color:#ff9a9a;}.hud .chip.xp{color:var(--gold2);}.hud .chip.streak{color:#ffd27a;}
.hud .home-b{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}

/* SCREENS */
.screen{display:none;padding:16px;animation:fade .35s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* MAP / WORLDS */
.hero-h{text-align:center;padding:14px 8px 6px;}
.hero-h h1{font-size:1.5rem;font-weight:900;color:var(--navy);}
.hero-h p{font-size:.9rem;color:var(--muted);margin-top:3px;}
.level-bar{background:#ece6da;border-radius:20px;height:12px;margin:14px 6px 4px;overflow:hidden;}
.level-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:20px;transition:width .6s;}
.level-lbl{text-align:center;font-size:12px;color:var(--muted);margin-bottom:14px;}
.world{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;border-right:6px solid var(--c,var(--gold));}
.world:active{transform:scale(.985);}
.world:hover{box-shadow:0 10px 26px rgba(13,27,46,.1);}
.world .wtop{display:flex;align-items:center;gap:13px;}
.world .wico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--cl,#eef);flex-shrink:0;}
.world .wname{font-size:1.12rem;font-weight:900;color:var(--navy);}
.world .wsub{font-size:.8rem;color:var(--muted);}
.world .wprog{margin-top:13px;height:8px;background:#ece6da;border-radius:20px;overflow:hidden;}
.world .wprog>span{display:block;height:100%;background:var(--c,var(--gold));border-radius:20px;transition:width .5s;}
.world .wpct{font-size:11px;color:var(--muted);margin-top:5px;font-weight:700;}

/* LESSON LIST */
.back-b{background:none;border:none;color:var(--blue);font-weight:800;font-size:14px;cursor:pointer;margin-bottom:10px;padding:6px 0;}
.lesson-node{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-bottom:11px;cursor:pointer;transition:transform .15s;}
.lesson-node:active{transform:scale(.985);}
.lesson-node.locked{opacity:.5;cursor:not-allowed;}
.lesson-node.done{border-color:var(--green);}
.ln-ico{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--cl,#eef);}
.lesson-node.done .ln-ico{background:var(--green);color:#fff;}
.ln-info h3{font-size:1.02rem;font-weight:800;color:var(--navy);}
.ln-info p{font-size:.8rem;color:var(--muted);}
.ln-status{margin-right:auto;font-size:20px;}

/* LESSON PLAY */
.play-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.play-x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;}
.pbar{flex:1;height:14px;background:#ece6da;border-radius:20px;overflow:hidden;}
.pbar>span{display:block;height:100%;background:var(--green);border-radius:20px;transition:width .4s;}
.seg-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 22px;min-height:240px;animation:fade .3s;}
.seg-tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 12px;border-radius:20px;margin-bottom:14px;}
.tag-teach{background:rgba(37,99,168,.12);color:var(--blue);}
.tag-quiz{background:rgba(200,168,75,.18);color:#9a7d1f;}
.seg-card h2{font-size:1.25rem;font-weight:900;color:var(--navy);margin-bottom:12px;line-height:1.4;}
.seg-ar{font-size:1.02rem;color:#2a2a2a;margin-bottom:12px;}
.seg-en{font-size:.9rem;color:var(--muted);direction:ltr;text-align:left;border-right:3px solid var(--gold);padding-right:0;padding-left:12px;border-left:3px solid var(--gold);border-right:none;background:#faf7f0;border-radius:8px;padding:10px 12px;}
.q-text{font-size:1.15rem;font-weight:800;color:var(--navy);margin-bottom:18px;line-height:1.5;}
.opts{display:flex;flex-direction:column;gap:11px;}
.opt{background:#faf8f3;border:2px solid var(--border);border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:600;cursor:pointer;text-align:right;transition:all .15s;font-family:inherit;color:var(--text);}
.opt:active{transform:scale(.99);}
.opt.sel{border-color:var(--blue);background:#eef4fb;}
.opt.correct{border-color:var(--green);background:#e8f7f0;color:#0f6b48;}
.opt.wrong{border-color:var(--red);background:#fdeeee;color:#a01c1c;}
.opt:disabled{cursor:default;}
.feedback{margin-top:16px;border-radius:14px;padding:14px 16px;font-size:.94rem;animation:fade .25s;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#e8f7f0;border:1px solid var(--green);color:#0f6b48;}
.feedback.no{background:#fdeeee;border:1px solid var(--red);color:#9a1c1c;}
.feedback b{display:block;margin-bottom:4px;}

.btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:1.05rem;font-weight:800;cursor:pointer;margin-top:16px;transition:transform .12s,opacity .15s;}
.btn:active{transform:translateY(1px);}
.btn-go{background:var(--navy);color:#fff;}
.btn-ok{background:var(--green);color:#fff;}
.btn-dis{background:#d8d2c6;color:#fff;cursor:default;}

/* COMPLETE / FAIL */
.result{text-align:center;padding:40px 18px;animation:fade .4s;}
.result .big{font-size:4rem;margin-bottom:6px;animation:pop .5s;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.result h2{font-size:1.6rem;font-weight:900;color:var(--navy);margin-bottom:8px;}
.result p{color:var(--muted);margin-bottom:20px;}
.result .stats{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.result .rstat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 20px;min-width:90px;}
.result .rstat .n{font-size:1.6rem;font-weight:900;color:var(--gold);}
.result .rstat .l{font-size:11px;color:var(--muted);}
.confetti{position:fixed;top:-10px;font-size:18px;animation:fall linear forwards;z-index:60;pointer-events:none;}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg);opacity:.4;}}
.muted-note{text-align:center;font-size:12px;color:var(--muted);padding:14px;}
a.home-link{color:var(--blue);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hud">
    <button class="home-b" onclick="goMap()" title="الخريطة">🏠</button>
    <div style="display:flex;gap:8px;">
      <span class="chip streak">🔥 <span id="hStreak">0</span></span>
      <span class="chip xp">⭐ <span id="hXp">0</span></span>
      <span class="chip heart">❤️ <span id="hHearts">5</span></span>
    </div>
  </div>

  <!-- MAP -->
  <div class="screen active" id="screen-map">
    <div class="hero-h">
      <h1>🎮 لعبة SHRM</h1>
      <p>تعلّم بالشرح المُجزّأ وأسئلة الاستيعاب الفورية</p>
    </div>
    <div class="level-bar"><span id="lvlFill"></span></div>
    <div class="level-lbl">المستوى <b id="lvlNum">1</b> · <span id="lvlXp">0</span> نقطة</div>
    <div id="worldList"></div>
    <div class="muted-note">تقدّمك يُحفظ تلقائياً على هذا الجهاز · <a class="home-link" href="index.html">← العودة للـ Hub</a></div>
  </div>

  <!-- LESSON LIST -->
  <div class="screen" id="screen-lessons">
    <button class="back-b" onclick="goMap()">→ كل العوالم</button>
    <div class="hero-h" id="worldHead"></div>
    <div id="lessonList"></div>
  </div>

  <!-- PLAY -->
  <div class="screen" id="screen-play">
    <div class="play-top">
      <button class="play-x" onclick="quitLesson()">✕</button>
      <div class="pbar"><span id="playProg"></span></div>
    </div>
    <div id="segHost"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result"></div>

</div>

<script>
/* ════════════ GAME CONTENT ════════════
   لإضافة دروس: أضيفي كائن درس داخل lessons لأي عالم.
   نوع المقطع: {t:'teach',h,ar,en?}  أو  {t:'quiz',q,opts:[],a:idx,ex}
*/
const WORLDS = [
 {id:'comp', name:'الكفاءات', sub:'الكفاءات السلوكية التسع', icon:'📘', color:'#2563a8', cl:'#e7f0fb', lessons:[
   {id:'c1', title:'القيادة', icon:'👑', segments:[
     {t:'teach',h:'تطوّر نظريات القيادة',ar:'من «السمات» (القائد يُولد بصفات) إلى «السلوكية» (شبكة Blake-Mouton: الإنتاج × الناس) إلى «الظرفية» التي تربط الفعالية بالموقف.',en:'Trait → Behavioral (Blake-Mouton) → Contingency/Situational.'},
     {t:'quiz',q:'وفق فيدلر للطوارئ، ماذا نغيّر لتحسين الفعالية؟',opts:['أسلوب القائد','الموقف ليلائم أسلوب القائد الثابت','شخصية الموظفين'],a:1,ex:'أسلوب القائد ثابت (يُقاس بـ LPC)، فنغيّر الموقف ليلائمه.'},
     {t:'quiz',q:'في شبكة Blake-Mouton، النمط الأمثل (9,9) يُسمّى:',opts:['قيادة الفريق','السلطة-الطاعة','نادي الريف'],a:0,ex:'9,9 = قيادة الفريق: اهتمام عالٍ بالإنتاج والناس معاً.'},
     {t:'quiz',q:'القيادة الظرفية (هيرسي-بلانشارد) تختلف عن فيدلر في أن:',opts:['تتجاهل الموقف','الأسلوب ثابت','القائد يغيّر أسلوبه حسب نضج الموظف'],a:2,ex:'هيرسي-بلانشارد: القائد يغيّر أسلوبه؛ فيدلر: الأسلوب ثابت.'},
     {t:'teach',h:'الأساليب والقيادة الخادمة',ar:'جولمان: ستة أساليب يبدّل بينها القائد. القيادة الخادمة تضع نموَّ الفريق وتمكينه أولاً.',en:'Goleman: 6 styles. Servant leadership: team growth first.'},
     {t:'quiz',q:'مدير يزيل عوائق فريقه ويؤمّن موارده بدل الأوامر. أي أسلوب؟',opts:['القسري','الخادم','التبادلي'],a:1,ex:'تمكين الفريق أولاً = القيادة الخادمة.'},
     {t:'quiz',q:'قائد يُلهم رؤيةً ويغيّر قيم فريقه نحوها:',opts:['تبادلي','قسري','تحويلي'],a:2,ex:'التحويلية تُلهم وتغيّر القيم؛ التبادلية تبادل مكافأة مقابل أداء.'}
   ]},

     {t:'teach',h:'ماسلو وهيرزبرغ',ar:'ماسلو: خمس حاجات يُشبَع الأدنى قبل الأعلى. هيرزبرغ: عوامل الصحة تمنع الاستياء، والمحفّزات تخلق الرضا.',en:'Maslow 5 levels; Herzberg: hygiene vs motivators.'},
     {t:'quiz',q:'تحسين الراتب وظروف العمل (عوامل الصحة) يؤدّي إلى:',opts:['لا أثر','رضا وحماس عالٍ','منع الاستياء فقط'],a:2,ex:'عوامل الصحة تمنع الاستياء ولا تخلق الرضا — الرضا من المحفّزات.'},
     {t:'quiz',q:'مدير يفترض أن الموظفين كسالى ويحتاجون رقابة صارمة. هذا يعكس:',opts:['نظرية Y','نظرية Z','نظرية X'],a:2,ex:'نظرية X (ماكجريجور) ترى الموظفين كسالى؛ Y تراهم طموحين.'},

     {t:'quiz',q:'رفع رقابة مشدّدة عن موظف تحسّن أداؤه مثال على:',opts:['عقاب','تعزيز سلبي','إطفاء'],a:1,ex:'التعزيز السلبي = إزالة مُنفّر لتقوية سلوك مرغوب، وليس عقاباً.'},
     {t:'quiz',q:'موظف يشعر أنه يبذل أكثر من زميله بنفس الأجر فينخفض حماسه. أي نظرية؟',opts:['نظرية التعزيز','نظرية العدالة (آدامز)','هرم ماسلو'],a:1,ex:'نظرية العدالة: الإحساس بعدم الإنصاف في نسبة المخرجات/المدخلات يخفض الدافعية.'}

     {t:'quiz',q:'مهارة الإصغاء التي تعيد صياغة كلام المتحدّث للتأكّد من الفهم تُسمّى:',opts:['الإصغاء الفعّال','الإصغاء السلبي','الإصغاء الانتقائي'],a:0,ex:'الإصغاء الفعّال: انتباه كامل + إعادة صياغة + تأجيل الحكم.'},

   ]},

   {id:'c4', title:'الفطنة التجارية والتحليل', icon:'📊', segments:[

     {t:'quiz',q:'أداة تعطي النتيجة نفسها عند التكرار لكنها لا تقيس المطلوب فعلاً:',opts:['موثوقة لكن غير صحيحة','الاثنان معاً','صحيحة لكن غير موثوقة'],a:0,ex:'يمكن أن تكون موثوقة دون أن تكون صحيحة.'},
     {t:'quiz',q:'أداة قرار جماعي تجمع آراء خبراء عبر جولات مجهولة متكرّرة:',opts:['العصف الذهني','RACI','أسلوب دلفي'],a:2,ex:'دلفي: جولات خبراء مجهولة للوصول لتوافق دون هيمنة.'}
   ]}
 ]},

 {id:'people', name:'People', sub:'إدارة المواهب والمكافآت', icon:'👥', color:'#1D9E75', cl:'#e6f7ef', lessons:[
   {id:'p1', title:'الاستراتيجية والاستقطاب', icon:'🎯', segments:[

   {id:'p2', title:'الانخراط والاحتفاظ', icon:'💚', segments:[

     {t:'quiz',q:'وفق نموذج خصائص الوظيفة، أي بُعد يرفع الدافعية الداخلية؟',opts:['صرامة الرقابة','الاستقلالية (Autonomy)','طول ساعات العمل'],a:1,ex:'الاستقلالية وتنوّع المهارات والتغذية الراجعة ترفع الدافعية الداخلية.'},

     {t:'quiz',q:'إثراء الوظيفة (Job Enrichment) يعني:',opts:['إضافة عمق ومسؤولية واستقلالية للوظيفة','زيادة عدد المهام المتشابهة أفقياً','خفض الأجر'],a:0,ex:'الإثراء توسيع رأسي (مسؤولية/استقلالية)، بعكس التوسيع الأفقي.'},

     {t:'quiz',q:'معدّل الدوران يُحسب بـ:',opts:['الإيرادات ÷ الموظفين','(عدد المغادرين ÷ متوسط عدد الموظفين) × 100','ساعات العمل ÷ 200,000'],a:1,ex:'النسبة المئوية للمغادرين خلال فترة.'},

   ]},

/* ════════════ STATE ════════════ */
const KEY='shrm-game-v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
let S=Object.assign({xp:0,done:{},streak:0,lastDay:null},load());

// daily streak
(function(){const t=new Date().toDateString();
 if(S.lastDay!==t){const y=new Date(Date.now()-864e5).toDateString();
   S.streak=(S.lastDay===y)?(S.streak||0)+1:1;S.lastDay=t;save(S);} })();

let cur={world:null,lesson:null,idx:0,correct:0,total:0,hearts:5,answered:false};

/* ════════════ HUD ════════════ */
function hud(){
  document.getElementById('hXp').textContent=S.xp;
  document.getElementById('hStreak').textContent=S.streak||0;
  document.getElementById('hHearts').textContent=cur.hearts;
  const lvl=Math.floor(S.xp/100)+1, into=S.xp%100;
  document.getElementById('lvlNum').textContent=lvl;
  document.getElementById('lvlXp').textContent=S.xp;
  document.getElementById('lvlFill').style.width=into+'%';
}

/* ════════════ NAV ════════════ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goMap(){cur.hearts=5;renderMap();show('screen-map');hud();}

function lessonsDone(w){return w.lessons.filter(l=>S.done[l.id]).length;}

function renderMap(){
  const host=document.getElementById('worldList');host.innerHTML='';
  WORLDS.forEach(w=>{
    const done=lessonsDone(w),tot=w.lessons.length,pct=Math.round(done/tot*100);
    const el=document.createElement('div');el.className='world';
    el.style.setProperty('--c',w.color);el.style.setProperty('--cl',w.cl);
    el.onclick=()=>openWorld(w.id);
    el.innerHTML=`<div class="wtop"><div class="wico" style="--cl:${w.cl}">${w.icon}</div>
      <div><div class="wname">${w.name}</div><div class="wsub">${w.sub} · ${tot} ${tot===1?'درس':'دروس'}</div></div></div>
      <div class="wprog"><span style="width:${pct}%"></span></div>
      <div class="wpct">${done}/${tot} مكتمل · ${pct}%</div>`;
    host.appendChild(el);
  });
}

function openWorld(wid){
  const w=WORLDS.find(x=>x.id===wid);cur.world=w;
  document.getElementById('worldHead').innerHTML=`<h1>${w.icon} ${w.name}</h1><p>${w.sub}</p>`;
  const host=document.getElementById('lessonList');host.innerHTML='';
  w.lessons.forEach((l,i)=>{
    const done=!!S.done[l.id];
    const locked=i>0 && !S.done[w.lessons[i-1].id];
    const qn=l.segments.filter(s=>s.t==='quiz').length;
    const el=document.createElement('div');
    el.className='lesson-node'+(done?' done':'')+(locked?' locked':'');
    el.innerHTML=`<div class="ln-ico" style="--cl:${w.cl}">${done?'✓':l.icon}</div>
      <div class="ln-info"><h3>${l.title}</h3><p>${qn} أسئلة استيعاب · ${done?'مكتمل ⭐':(locked?'🔒 أكملي الدرس السابق':'ابدئي')}</p></div>
      <div class="ln-status">${done?'⭐':(locked?'🔒':'▶')}</div>`;
    if(!locked) el.onclick=()=>startLesson(w,l);
    host.appendChild(el);
  });
  show('screen-lessons');
}

/* ════════════ PLAY ════════════ */
function startLesson(w,l){
  cur={world:w,lesson:l,idx:0,correct:0,total:0,hearts:5,answered:false};
  hud();renderSeg();show('screen-play');
}
function renderSeg(){
  const segs=cur.lesson.segments, seg=segs[cur.idx];
  document.getElementById('playProg').style.width=Math.round(cur.idx/segs.length*100)+'%';
  const host=document.getElementById('segHost');
  if(seg.t==='teach'){
    host.innerHTML=`<div class="seg-card"><span class="seg-tag tag-teach">📖 شرح</span>
      <h2>${seg.h}</h2><div class="seg-ar">${seg.ar}</div>
      ${seg.en?`<div class="seg-en">${seg.en}</div>`:''}
      <button class="btn btn-go" onclick="nextSeg()">متابعة ←</button></div>`;
  } else {
    cur.answered=false;
    host.innerHTML=`<div class="seg-card"><span class="seg-tag tag-quiz">❓ سؤال استيعاب</span>
      <div class="q-text">${seg.q}</div>
      <div class="opts" id="opts">${seg.opts.map((o,i)=>`<button class="opt" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <button class="btn btn-dis" id="contBtn" disabled>اختاري إجابة</button></div>`;
  }
}
function answer(i){
  if(cur.answered) return; cur.answered=true;
  const seg=cur.lesson.segments[cur.idx], opts=[...document.querySelectorAll('#opts .opt')];
  opts.forEach(o=>o.disabled=true);
  const ok=i===seg.a; cur.total++;
  opts[i].classList.add(ok?'correct':'wrong');
  if(!ok) opts[seg.a].classList.add('correct');
  const fb=document.getElementById('fb');
  if(ok){cur.correct++;S.xp+=10;save(S);
    fb.className='feedback ok show';fb.innerHTML='<b>✅ صحيح! +10 نقاط</b>'+seg.ex;
  }else{cur.hearts--;
    fb.className='feedback no show';fb.innerHTML='<b>❌ غير صحيح</b>'+seg.ex;
  }
  hud();
  const cb=document.getElementById('contBtn');
  cb.disabled=false;cb.className='btn '+(ok?'btn-ok':'btn-go');
  cb.textContent='متابعة ←';cb.onclick=()=>{ if(cur.hearts<=0){return failLesson();} nextSeg(); };
  if(cur.hearts<=0){cb.textContent='انتهت القلوب — إعادة';cb.onclick=failLesson;}
}
function nextSeg(){
  cur.idx++;
  if(cur.idx>=cur.lesson.segments.length) return completeLesson();
  renderSeg();
}
function quitLesson(){ if(confirm('الخروج من الدرس؟ لن يُحفظ إكماله.')) openWorld(cur.world.id); }

function completeLesson(){
  const first=!S.done[cur.lesson.id];
  if(first){S.xp+=20;} S.done[cur.lesson.id]=true; save(S); hud();
  const acc=cur.total?Math.round(cur.correct/cur.total*100):100;
  confetti();
  document.getElementById('screen-result').innerHTML=`<div class="result">
    <div class="big">🏆</div><h2>أحسنتِ! اكتمل الدرس</h2>
    <p>${cur.lesson.title} — ${cur.world.name}</p>
    <div class="stats">
      <div class="rstat"><div class="n">${cur.correct}/${cur.total}</div><div class="l">إجابات صحيحة</div></div>
      <div class="rstat"><div class="n">${acc}%</div><div class="l">الدقّة</div></div>
      <div class="rstat"><div class="n">+${cur.correct*10+(first?20:0)}</div><div class="l">نقاط</div></div>
    </div>
    <button class="btn btn-ok" onclick="openWorld('${cur.world.id}')">التالي ←</button>
    <button class="btn btn-go" onclick="goMap()">العودة للخريطة</button>
  </div>`;
  show('screen-result');
}
function failLesson(){
  document.getElementById('screen-result').innerHTML=`<div class="result">
    <div class="big">💔</div><h2>انتهت القلوب</h2>
    <p>لا بأس — التكرار هو سرّ الإتقان. حاولي هذا الدرس مجدّداً.</p>
    <div class="stats"><div class="rstat"><div class="n">${cur.correct}</div><div class="l">إجابات صحيحة</div></div></div>
    <button class="btn btn-ok" onclick="startLesson(cur.world,cur.lesson)">إعادة المحاولة ↻</button>
    <button class="btn btn-go" onclick="goMap()">العودة للخريطة</button>
  </div>`;
  // keep XP earned; only lesson completion withheld
  show('screen-result');
}

function confetti(){const e=['🎉','⭐','🏅','✨','🎊'];for(let i=0;i<24;i++){const c=document.createElement('div');c.className='confetti';c.textContent=e[i%e.length];c.style.left=Math.random()*100+'vw';c.style.animationDuration=(2+Math.random()*2)+'s';c.style.fontSize=(14+Math.random()*16)+'px';document.body.appendChild(c);setTimeout(()=>c.remove(),4000);} }

/* init */
renderMap();hud();
</script>
</body>
</html>
